<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=block" rel="stylesheet" />

<link rel="icon" href="https://i.ibb.co/N2ZhwrRn/Gemini-Generated-Image-h4mxnvh4mxnvh4mx-2.gif">

<style>

:root {
  --primary: #2F5FE0;
  --primary-dark: #1E3FA6;
  --primary-gradient: linear-gradient(135deg, #3B6BEA 0%, #2F5FE0 100%);
  --primary-light: #EEF3FF;
  --primary-glow: rgba(47, 95, 224, 0.22);
  --accent: #E08A2F;
  --accent-soft: #FBF1E6;
  --success: #15966A;
  --success-soft: #E4F6EF;
  --bg: #F4F5F7;
  --surface: #FFFFFF;
  --text-main: #16181D;
  --text-muted: #6B7280;
  --border: #E7E8EC;
  --radius: 18px;
  --radius-sm: 12px;
  --radius-lg: 24px;
  --safe-bottom: 96px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  height: 100%;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  font-family: 'Inter', sans-serif;
  color: var(--text-main);
  background: var(--bg);
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

button,
input {
  font: inherit;
}

button {
  -webkit-tap-highlight-color: transparent;
}

/* MOBILE APP FRAME */
.app-container {
  width: 100%;
  max-width: 430px;
  height: 100vh;
  height: 100dvh;
  margin: 0 auto;
  position: relative;
  isolation: isolate;
  overflow-x: hidden;
  overflow-y: auto;
  background: var(--surface);
  box-shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

@media (min-width: 520px) {
  body {
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 22px 0;
  }

  .app-container {
    height: calc(100vh - 44px);
    height: calc(100dvh - 44px);
    border-radius: 34px;
    border: 1px solid rgba(255,255,255,0.82);
  }
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 12px 12px 10px;
  background: rgba(248, 250, 252, 0.86);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border-bottom: 1px solid rgba(226, 232, 240, 0.76);
}

.logo {
  flex: 0 0 auto;
  width: 42px;
  height: 42px;
  object-fit: cover;
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(47, 95, 224, 0.14);
  border: 2px solid rgba(255,255,255,0.8);
}

.search-box {
  flex: 1;
  min-width: 0;
  position: relative;
}

.search-box input {
  width: 100%;
  height: 42px;
  padding: 0 14px 0 40px;
  border-radius: 999px;
  border: 1px solid rgba(226, 232, 240, 0.95);
  background: rgba(255, 255, 255, 0.86);
  color: var(--text-main);
  font-size: 13px;
  font-weight: 500;
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 8px 18px rgba(15, 23, 42, 0.04);
  transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
}

.search-box input::placeholder {
  color: #94A3B8;
}

.search-box input:focus {
  border-color: rgba(47, 95, 224, 0.42);
  background: #FFFFFF;
  box-shadow: 0 0 0 4px rgba(47, 95, 224, 0.08), 0 10px 20px rgba(47, 95, 224, 0.08);
}

.search-box .material-symbols-rounded {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: #94A3B8;
  font-size: 20px;
  pointer-events: none;
  transition: color 0.22s ease;
}

.search-box:focus-within .material-symbols-rounded {
  color: var(--primary);
}

.notification {
  flex: 0 0 auto;
  position: relative;
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  color: var(--primary-dark);
  background: #FFFFFF;
  border: 1px solid rgba(226, 232, 240, 0.95);
  box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
  cursor: pointer;
  transition: transform 0.18s ease, background 0.18s ease;
}

.notification:active {
  transform: scale(0.94);
  background: var(--primary-light);
}

.notification .badge {
  position: absolute;
  top: 8px;
  right: 9px;
  width: 9px;
  height: 9px;
  display: none;
  border-radius: 50%;
  background: #EF4444;
  border: 2px solid #FFFFFF;
  animation: pulse 1.7s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.38); }
  70% { box-shadow: 0 0 0 7px rgba(239, 68, 68, 0); }
  100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
}

/* ROOM LIST - mobile shows one property below another */
.main-content {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  width: 100%;
  padding: 12px 12px calc(var(--safe-bottom) + 14px);
}

.card {
  width: 100%;
  min-width: 0;
  overflow: hidden;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: 0 4px 14px rgba(16, 24, 40, 0.05);
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}

.card:active {
  transform: scale(0.98);
  box-shadow: 0 2px 8px rgba(16, 24, 40, 0.06);
}

/* Decreased image height to make cards compact vertically */
.card-img-wrapper {
  position: relative;
  width: 100%;
  height: clamp(110px, 32vw, 130px);
  overflow: hidden;
  background: #EAECEF;
}

.card-img-wrapper img,
.card-img-wrapper img.slide {
  flex: 0 0 100%;
  width: 100%;
  height: 100%;
  object-fit: cover; /* Ensures fully visible and auto fit */
  display: block;
}

.card-img-wrapper .slides-track {
  display: flex;
  width: 100%;
  height: 100%;
  transition: transform 0.55s ease;
  will-change: transform;
}

.card-img-wrapper::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 58%;
  background: linear-gradient(to top, rgba(15, 23, 42, 0.62), rgba(15, 23, 42, 0.02));
  pointer-events: none;
}

.price-badge {
  position: absolute;
  left: 8px;
  bottom: 8px;
  z-index: 2;
  max-width: calc(100% - 16px);
  padding: 5px 9px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.92);
  color: #0F172A;
  border: 1px solid rgba(255,255,255,0.7);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 6px 16px rgba(15, 23, 42, 0.18);
  font-size: 13px;
  font-weight: 800;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Reduced padding for compact cards */
.card-content {
  padding: 8px 10px;
}

.title {
  margin-bottom: 4px;
  color: var(--text-main);
  font-size: 13px;
  font-weight: 800;
  line-height: 1.25;
  letter-spacing: -0.02em;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.owner-name {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 6px;
  min-width: 0;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.owner-name .material-symbols-rounded {
  font-size: 15px;
}

.owner-avatar {
  width: 20px;
  height: 20px;
  flex: 0 0 auto;
  border-radius: 50%;
  object-fit: cover;
  border: 1.5px solid #FFFFFF;
  box-shadow: 0 2px 6px rgba(15, 23, 42, 0.12);
}

.location {
  display: flex;
  align-items: flex-start;
  gap: 4px;
  margin-bottom: 6px;
  min-height: auto;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.location .material-symbols-rounded {
  font-size: 15px;
  color: var(--primary);
  vertical-align: -3px;
}

.details-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 6px;
}

.detail-tag {
  max-width: 100%;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 4px 6px;
  border-radius: 999px;
  background: #F1F5F9;
  color: #475569;
  font-size: 10.5px;
  font-weight: 700;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.detail-tag.highlight {
  color: #047857;
  background: #ECFDF5;
}

.detail-tag .material-symbols-rounded {
  flex: 0 0 auto;
  font-size: 13px;
}

.card-actions {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 5px;
  margin-top: 6px;
  padding-top: 8px;
  border-top: 1px solid rgba(226, 232, 240, 0.82);
}

.btn-action {
  min-width: 0;
  min-height: 32px;
  padding: 6px 4px;
  border: 0;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.18s ease, filter 0.18s ease;
}

.btn-action .material-symbols-rounded {
  font-size: 15px !important;
}

.btn-action:active {
  transform: scale(0.94);
}

.btn-call,
.btn-wa {
  color: var(--success);
  background: var(--success-soft);
}

.btn-chat {
  grid-column: 1 / -1;
  color: #FFFFFF;
  background: var(--primary-gradient);
  box-shadow: 0 8px 16px var(--primary-glow);
}

.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 70px 18px;
  color: var(--text-muted);
}

/* BOTTOM NAVIGATION */
.bottom-nav {
  position: fixed;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  z-index: 1000;
  width: 100%;
  max-width: 430px;
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  gap: 2px;
  padding: 10px 10px max(16px, env(safe-area-inset-bottom));
  border-top: 1px solid rgba(226, 232, 240, 0.82);
  border-radius: 24px 24px 0 0;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 -14px 34px rgba(15, 23, 42, 0.08);
}

.nav-item {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  color: #94A3B8;
  font-size: 10.5px;
  font-weight: 800;
  cursor: pointer;
  position: relative;
  transition: color 0.22s ease, transform 0.18s ease;
}

.nav-item:active {
  transform: scale(0.94);
}

.nav-item.active {
  color: var(--primary);
}

/* Enlarged icon wrapper and icon size */
.nav-item .icon-wrapper {
  position: relative;
  min-width: 46px;
  height: 32px;
  padding: 3px 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  transition: background 0.22s ease;
}

.nav-item.active .icon-wrapper {
  background: var(--primary-light);
}

.nav-item .material-symbols-rounded {
  font-size: 28px;
}

.nav-item.post-btn {
  margin-top: -18px;
}

/* Enlarged Add Post Button */
.nav-item.post-btn .material-symbols-rounded {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 58px;
  height: 58px;
  margin-bottom: 0;
  border-radius: 20px;
  color: #FFFFFF;
  background: var(--primary-gradient);
  border: 5px solid #FFFFFF;
  box-shadow: 0 14px 24px var(--primary-glow);
  font-size: 34px;
}

.nav-item.post-btn span:last-child {
  margin-top: 1px;
  color: var(--primary);
}

#msgBadge {
  position: absolute;
  top: -5px;
  right: -6px;
  min-width: 18px;
  height: 18px;
  padding: 0 4px;
  border-radius: 999px;
  background: #EF4444;
  color: #FFFFFF;
  border: 2px solid #FFFFFF;
  box-shadow: 0 4px 10px rgba(239, 68, 68, 0.32);
  font-size: 10px;
  line-height: 14px;
  text-align: center;
  font-weight: 900;
}

/* LIVE LOCATION SUGGESTIONS */
.search-suggestions {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: 0;
  z-index: 1400;
  display: none;
  max-height: 260px;
  overflow-y: auto;
  padding: 6px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.98);
  border: 1px solid rgba(226, 232, 240, 0.95);
  box-shadow: 0 18px 38px rgba(15, 23, 42, 0.15);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}

.search-suggestions.show {
  display: block;
}

.suggestion-item {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 10px;
  border-radius: 14px;
  cursor: pointer;
  transition: background 0.18s ease, transform 0.18s ease;
}

.suggestion-item:hover,
.suggestion-item:active {
  background: var(--primary-light);
}

.suggestion-item .material-symbols-rounded {
  position: static;
  transform: none;
  color: var(--primary);
  font-size: 20px;
  flex: 0 0 auto;
}

.suggestion-main {
  color: var(--text-main);
  font-size: 13px;
  font-weight: 800;
  line-height: 1.2;
}

.suggestion-sub {
  margin-top: 2px;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  line-height: 1.25;
}

.suggestion-empty {
  padding: 12px;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 700;
}

.suggestion-section-title {
  padding: 7px 10px 5px;
  color: #94A3B8;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.search-status {
  grid-column: 1 / -1;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 10px 12px;
  border-radius: 16px;
  background: #EEF2FF;
  color: #1E3FA6;
  font-size: 12px;
  font-weight: 700;
  line-height: 1.35;
  border: 1px solid rgba(165, 180, 252, 0.55);
}

.search-status .material-symbols-rounded {
  font-size: 18px;
  flex: 0 0 auto;
}

/* SEPARATE PROPERTY FILTERS */
.filter-bar {
  position: sticky;
  top: 65px;
  z-index: 950;
  display: flex;
  gap: 8px;
  width: 100%;
  padding: 8px 12px 10px;
  background: rgba(248, 250, 252, 0.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(226, 232, 240, 0.65);
  overflow-x: auto;
  scrollbar-width: none;
}

.filter-bar::-webkit-scrollbar {
  display: none;
}

.filter-select,
.filter-reset {
  flex: 0 0 auto;
  height: 36px;
  border: 1px solid rgba(226, 232, 240, 0.95);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.94);
  color: var(--text-main);
  box-shadow: 0 8px 16px rgba(15, 23, 42, 0.04);
  font-size: 12px;
  font-weight: 800;
  outline: none;
}

.filter-select {
  max-width: 138px;
  padding: 0 30px 0 12px;
  cursor: pointer;
}

.filter-reset {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 0 12px;
  color: var(--primary);
  cursor: pointer;
}

.filter-reset .material-symbols-rounded {
  font-size: 16px;
}

.filter-select:focus,
.filter-reset:active {
  border-color: rgba(47, 95, 224, 0.42);
  background: #FFFFFF;
  box-shadow: 0 0 0 4px rgba(47, 95, 224, 0.08);
}

@media (min-width: 900px) {
  .filter-bar {
    top: 83px;
    padding: 10px 40px;
    gap: 12px;
  }

  .filter-select,
  .filter-reset {
    height: 40px;
    font-size: 13px;
  }

  .filter-select {
    max-width: 180px;
  }

  .panel-open .filter-bar {
    margin-right: 30%;
    width: 70%;
  }

  .nav-left .filter-bar {
    margin-right: 120px;
    width: calc(100% - 120px);
  }

  .panel-open.nav-left .filter-bar {
    margin-right: 0;
    margin-left: 30%;
    width: 70%;
  }
}

/* NOTIFICATION PANEL - keeps your existing inline JS behavior, improves the visual */
#notificationPanel {
  border-radius: 26px 0 0 26px;
}

#notificationList > div {
  margin: 8px 10px;
  border-radius: 16px;
  border: 1px solid rgba(226, 232, 240, 0.85);
}

/* DESKTOP OVERRIDE: strict reset to keep desktop layout exactly as it was */
@media (min-width: 900px) {
  .side-panel {
    display: none;
    position: fixed;
    top: 22px;
    right: 22px;
    bottom: 22px;
    width: min(420px, 34vw);
    max-width: 420px;
    overflow: hidden;
    z-index: 1500;
    border-radius: 30px;
    background: var(--surface);
    border: 1px solid rgba(226, 232, 240, 0.9);
    box-shadow: 0 24px 70px rgba(15, 23, 42, 0.18);
  }

  .side-panel .panel-close {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 1510;
    width: 36px;
    height: 36px;
    border: 0;
    border-radius: 50%;
    color: var(--text-muted);
    background: rgba(255,255,255,0.9);
    box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
    cursor: pointer;
  }

  .side-panel iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  body {
    display: block;
    padding: 0;
    background-color: #E2E8F0;
    min-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
  }

  .app-container {
    max-width: none;
    width: 100%;
    height: auto;
    min-height: 100vh;
    margin: 0;
    border-radius: 0;
    border: 0;
    box-shadow: none;
    background: var(--bg);
    overflow-y: auto;
  }

  .app-container::before,
  .app-container::after {
    display: none;
  }

  .header {
    padding: 20px 40px;
    width: 100%;
    margin: 0;
    max-width: none;
    gap: 16px;
  }

  .search-box input {
    height: auto;
    padding: 12px 16px 12px 44px;
    font-size: 14px;
  }

  .main-content {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 24px;
    padding: 24px 24px calc(var(--safe-bottom) + 20px) 24px;
    width: 100%;
    margin: 0;
  }

  .card {
    margin: 0;
    border-radius: 0;
  }

  .card-img-wrapper {
    height: 320px;
    aspect-ratio: auto;
  }

  .card-img-wrapper img {
    border-radius: 0;
  }

  .card-content {
    padding: 20px;
  }

  .title {
    font-size: 20px;
    margin-bottom: 6px;
  }

  .owner-name {
    font-size: 13px;
    margin-bottom: 16px;
  }

  .owner-avatar {
    width: 28px;
    height: 28px;
  }

  .location {
    font-size: 14px;
    margin-bottom: 16px;
    min-height: auto;
  }

  .detail-tag {
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
  }

  .card-actions {
    display: flex;
    gap: 12px;

/* SMOOTH EXPERIENCE UPDATE: faster paint, softer tap/scroll, low layout shift */
html {
  scroll-behavior: smooth;
}

.app-container,
.main-content,
.search-suggestions,
#notificationPanel {
  overscroll-behavior: contain;
}

.card {
  contain: layout paint style;
  content-visibility: auto;
  contain-intrinsic-size: 320px 420px;
  transform: translateZ(0);
  will-change: transform;
}

.card-img-wrapper img,
.card-img-wrapper img.slide,
.owner-avatar,
.logo {
  transform: translateZ(0);
  backface-visibility: hidden;
}

.card.preparing-open {
  transform: scale(0.985);
  opacity: 0.92;
}

.feed-skeleton-card {
  width: 100%;
  overflow: hidden;
  border-radius: var(--radius);
  background: rgba(255,255,255,0.94);
  border: 1px solid rgba(226,232,240,0.84);
  box-shadow: 0 12px 28px rgba(15,23,42,0.06);
}

.feed-skeleton-img {
  height: clamp(185px, 56vw, 230px);
  background: linear-gradient(90deg, #E2E8F0 0%, #F1F5F9 45%, #E2E8F0 100%);
  background-size: 220% 100%;
  animation: feedShimmer 1.1s linear infinite;
}

.feed-skeleton-body {
  padding: 12px;
}

.feed-skeleton-line {
  height: 12px;
  margin-bottom: 10px;
  border-radius: 999px;
  background: linear-gradient(90deg, #E2E8F0 0%, #F8FAFC 45%, #E2E8F0 100%);
  background-size: 220% 100%;
  animation: feedShimmer 1.1s linear infinite;
}

.feed-skeleton-line.short { width: 46%; }
.feed-skeleton-line.medium { width: 68%; }
.feed-skeleton-line.long { width: 88%; }

@keyframes feedShimmer {
  from { background-position: 220% 0; }
  to { background-position: -220% 0; }
}

.instant-cache-flash {
  animation: instantCacheIn 0.18s ease both;
}

@keyframes instantCacheIn {
  from { opacity: 0.72; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
  }
}

<script>
/* Notification-flash guard — runs before anything else paints.
   Forces the notification panel/overlay closed with transitions disabled,
   so a stale bfcache/localStorage state can never visibly flash open
   when arriving at or returning to this page. */
(function () {
  'use strict';
  function forceClosedInstantly() {
    var panel = document.getElementById('notificationPanel');
    var overlay = document.getElementById('notificationOverlay');
    var app = document.querySelector('.app-container');
    [panel, overlay, app, document.body].forEach(function (el) {
      if (el) el.classList.add('tingo-no-transition');
    });
    if (panel) { panel.classList.remove('open'); panel.setAttribute('aria-hidden', 'true'); }
    if (overlay) { overlay.classList.remove('open'); overlay.setAttribute('aria-hidden', 'true'); }
    document.body.classList.remove('notification-open');
    if (app) app.classList.remove('notification-open');
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        [panel, overlay, app, document.body].forEach(function (el) {
          if (el) el.classList.remove('tingo-no-transition');
        });
      });
    });
  }
  forceClosedInstantly();
  document.addEventListener('DOMContentLoaded', forceClosedInstantly);
  window.addEventListener('pageshow', forceClosedInstantly);
})();
</script>

  <script id="tingo-home-prepaint-state">
  (function () {
    'use strict';
    const STATE_KEY = 'tingo_home_ui_state_v2';
    const OPTIONS_KEY = 'tingo_home_filter_options_v2';

    function readJson(key, fallback) {
      try {
        const value = localStorage.getItem(key);
        return value ? JSON.parse(value) : fallback;
      } catch (_) {
        return fallback;
      }
    }

    const saved = readJson(STATE_KEY, {}) || {};
    const mode = saved.mode === 'needed' ? 'needed' : 'available';
    window.__TINGO_HOME_PREPAINT_STATE = {
      mode,
      type: typeof saved.type === 'string' ? saved.type : '',
      brokerage: typeof saved.brokerage === 'string' ? saved.brokerage : ''
    };

    const typeSelect = document.getElementById('filterType');
    const brokerageSelect = document.getElementById('filterBrokerage');
    const optionCache = readJson(OPTIONS_KEY, {}) || {};
    const cachedTypes = Array.isArray(optionCache[mode]) ? optionCache[mode] : [];

    if (typeSelect) {
      const label = mode === 'needed' ? 'All required room types' : 'All room types';
      typeSelect.innerHTML = '<option value="">' + label + '</option>' + cachedTypes.map(function (value) {
        const escaped = String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        return '<option value="' + escaped + '">' + escaped + '</option>';
      }).join('');
      if (cachedTypes.includes(window.__TINGO_HOME_PREPAINT_STATE.type)) {
        typeSelect.value = window.__TINGO_HOME_PREPAINT_STATE.type;
      }
    }

    if (brokerageSelect) {
      brokerageSelect.innerHTML = [
        '<option value="">All brokerage options</option>',
        '<option value="__brokerage_applicable__">Brokerage applicable</option>',
        '<option value="__no_brokerage__">No brokerage</option>'
      ].join('');
      if (mode === 'needed') {
        brokerageSelect.value = '';
        brokerageSelect.classList.add('hidden-for-mode');
      } else if (window.__TINGO_HOME_PREPAINT_STATE.brokerage === '__brokerage_applicable__' || window.__TINGO_HOME_PREPAINT_STATE.brokerage === '__no_brokerage__') {
        brokerageSelect.value = window.__TINGO_HOME_PREPAINT_STATE.brokerage;
      }
    }

    document.getElementById('modeAvailableBtn')?.classList.toggle('active', mode === 'available');
    document.getElementById('modeNeededBtn')?.classList.toggle('active', mode === 'needed');
  })();

function applyFiltersToQuery(query) {
  const filters = getActiveFilters();

  if (filters.type) {
    query = query.ilike("type", `%${filters.type}%`);
  }

  if (filters.brokerage) {
    query = query.ilike("brokerage_type", `%${filters.brokerage}%`);
  }

  return query;
}

function roomMatchesActiveFilters(room) {
  const filters = getActiveFilters();
  if (filters.type && !includesText(room.type, filters.type)) return false;
  if (filters.brokerage && !includesText(room.brokerage_type, filters.brokerage)) return false;
  return true;
}

function normalizeOptionText(value) {
  return cleanSearchTerm(value);
}

function fillSelectOptions(selectId, values, defaultLabel) {
  const select = document.getElementById(selectId);
  if (!select) return;

  const current = select.value;
  const uniqueValues = [...new Set((values || [])
    .map(normalizeOptionText)
    .filter(Boolean)
  )].sort((a, b) => a.localeCompare(b));

  select.innerHTML = `<option value="">${defaultLabel}</option>` + uniqueValues
    .map(value => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`)
    .join("");

  if (current && uniqueValues.includes(current)) {
    select.value = current;
  }
}

async function loadFilterOptions() {
  const { data, error } = await db
    .from("room_posts")
    .select("type, brokerage_type")
    .eq("status", "active")
    .limit(1000);

  if (error) {
    console.warn("Filter option loading error", error);
    return;
  }

  fillSelectOptions("filterType", (data || []).map(room => room.type), "All types");
  fillSelectOptions("filterBrokerage", (data || []).map(room => room.brokerage_type || "No Brokerage"), "All brokerage");
}

function bindFilterEvents() {
  ["filterType", "filterBrokerage"].forEach(id => {
    const element = document.getElementById(id);
    if (!element) return;
    element.addEventListener("change", () => {
      selectedSearchPlace = null;
      hideSuggestionBox();
      loadRooms(getCurrentSearchText());
    });
  });

  const clearBtn = document.getElementById("clearFilters");
  if (clearBtn) {
    clearBtn.addEventListener("click", () => {
      ["filterType", "filterBrokerage"].forEach(id => {
        const element = document.getElementById(id);
        if (element) element.value = "";
      });
      selectedSearchPlace = null;
      loadRooms(getCurrentSearchText());
    });
  }
}

function cleanSearchTerm(value) {
  return String(value || "")
    .replace(/[,%()]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function includesText(value, searchText) {
  return String(value || "").toLowerCase().includes(String(searchText || "").toLowerCase());
}

function getPlaceLabel(place) {
  const address = place.address || {};
  return address.suburb || address.neighbourhood || address.quarter || address.city_district || address.village || address.town || address.city || place.name || String(place.display_name || "").split(",")[0] || "Location";
}

function getPlaceSubLabel(place) {
  const address = place.address || {};
  const parts = [address.city || address.town || address.county, address.state].filter(Boolean);
  return parts.length ? parts.join(", ") : (place.display_name || LOCATION_CONTEXT);
}

function showSuggestionBox(html) {
  const box = document.getElementById("searchSuggestions");
  if (!box) return;
  box.innerHTML = html;
  box.classList.add("show");
}

function hideSuggestionBox() {
  const box = document.getElementById("searchSuggestions");
  if (!box) return;
  box.classList.remove("show");
}

function buildDatabaseSuggestions(rows, searchText) {
  const suggestions = [];
  const seen = new Set();

  function add(label, subLabel, icon, value) {
    const cleanLabel = cleanSearchTerm(label);
    if (!cleanLabel) return;
    const key = `${subLabel}:${cleanLabel}`.toLowerCase();
    if (seen.has(key)) return;
    seen.add(key);
    suggestions.push({
      source: "database",
      label: cleanLabel,
      subLabel,
      icon,
      value: cleanSearchTerm(value || cleanLabel)
    });
  }

  (rows || []).forEach(room => {
    if (includesText(room.location, searchText)) {
      add(room.location, "Location from listed properties", "location_on");
    }
  });

  return suggestions.slice(0, 8);
}

async function fetchDatabaseSuggestions(searchText) {
  let query = db
    .from("room_posts")
    .select("location, type, brokerage_type")
    .eq("status", "active")
    .ilike("location", `%${searchText}%`);

  query = applyFiltersToQuery(query);

  const { data, error } = await query.limit(60);

  if (error) {
    console.warn("Database suggestion error", error);
    return [];
  }

  return buildDatabaseSuggestions(data || [], searchText);
}

async function fetchMapSuggestions(searchText) {
  if (searchText.length < 1) return [];

  const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=6&countrycodes=in&q=${encodeURIComponent(searchText + " " + LOCATION_CONTEXT)}`;
  const response = await fetch(url, { headers: { "Accept": "application/json" } });
  const places = await response.json();

  const unique = [];
  const seen = new Set();

  (places || []).forEach(place => {
    const label = getPlaceLabel(place);
    const key = label.toLowerCase();
    if (!label || seen.has(key)) return;
    seen.add(key);
    unique.push({
      source: "map",
      label,
      subLabel: getPlaceSubLabel(place),
      icon: "travel_explore",
      lat: Number(place.lat),
      lon: Number(place.lon),
      displayName: place.display_name || label
    });
  });

  return unique.slice(0, 5);
}

function renderSuggestionList(databaseSuggestions, mapSuggestions) {
  const parts = [];

  if (databaseSuggestions.length) {
    parts.push(`<div class="suggestion-section-title">Listed locations</div>`);
    parts.push(databaseSuggestions.map((item, index) => `
      <div class="suggestion-item" data-source="database" data-index="${index}">
        <span class="material-symbols-rounded">${escapeHtml(item.icon)}</span>
        <div>
          <div class="suggestion-main">${escapeHtml(item.label)}</div>
          <div class="suggestion-sub">${escapeHtml(item.subLabel)}</div>
        </div>
      </div>
    `).join(""));
  }

  if (mapSuggestions.length) {
    parts.push(`<div class="suggestion-section-title">Nearby location ideas</div>`);
    parts.push(mapSuggestions.map((place, index) => `
      <div class="suggestion-item" data-source="map" data-index="${index}">
        <span class="material-symbols-rounded">${escapeHtml(place.icon)}</span>
        <div>
          <div class="suggestion-main">${escapeHtml(place.label)}</div>
          <div class="suggestion-sub">${escapeHtml(place.subLabel)}</div>
        </div>
      </div>
    `).join(""));
  }

  if (!parts.length) {
    return `<div class="suggestion-empty">No listed location found yet. Continue typing or pick a nearby location suggestion.</div>`;
  }

  return parts.join("");
}

function attachSuggestionEvents(databaseSuggestions, mapSuggestions) {
  const box = document.getElementById("searchSuggestions");
  if (!box) return;

  box.querySelectorAll(".suggestion-item").forEach(item => {
    item.addEventListener("click", () => {
      const source = item.dataset.source;
      const index = Number(item.dataset.index);

      if (source === "database") {
        const suggestion = databaseSuggestions[index];
        selectedSearchPlace = null;
        document.getElementById("search").value = suggestion.value || suggestion.label;
        hideSuggestionBox();
        loadRooms(suggestion.value || suggestion.label);
        return;
      }

      const place = mapSuggestions[index];
      selectedSearchPlace = place;
      document.getElementById("search").value = place.label;
      hideSuggestionBox();
      loadRooms(place.label, place);
    });
  });
}

async function fetchLocationSearchSuggestions(value) {
  const searchText = cleanSearchTerm(value);
  const box = document.getElementById("searchSuggestions");

  if (!box || searchText.length < 1) {
    hideSuggestionBox();
    return;
  }

  const requestId = ++suggestionRequestId;

  try {
    const databaseSuggestions = await fetchDatabaseSuggestions(searchText);
    let mapSuggestions = [];

    // Database comes first. Map/location ideas are added only as a helper for nearby-area fallback.
    if (searchText.length >= 2 && databaseSuggestions.length < 6) {
      try {
        mapSuggestions = await fetchMapSuggestions(searchText);
      } catch (mapErr) {
        console.warn("Map suggestion error", mapErr);
      }
    }

    if (requestId !== suggestionRequestId) return;

    showSuggestionBox(renderSuggestionList(databaseSuggestions, mapSuggestions));
    attachSuggestionEvents(databaseSuggestions, mapSuggestions);
  } catch (err) {
    console.warn("Location suggestion error", err);
    hideSuggestionBox();
  }
}

// Kept as an alias so any old call still works.
function fetchLocationSuggestions(value) {
  return fetchLocationSearchSuggestions(value);
}

async function geocodeLocation(text) {
  const locationText = cleanSearchTerm(text);
  if (!locationText) return null;

  const cacheKey = "geo_" + locationText.toLowerCase();
  try {
    const cached = JSON.parse(localStorage.getItem(cacheKey) || "null");
    if (cached && cached.lat && cached.lon) return cached;
  } catch (e) {}

  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=in&q=${encodeURIComponent(locationText + " " + LOCATION_CONTEXT)}`;
    const response = await fetch(url, { headers: { "Accept": "application/json" } });
    const data = await response.json();
    if (!data || !data[0]) return null;

    const result = {
      label: getPlaceLabel(data[0]),
      lat: Number(data[0].lat),
      lon: Number(data[0].lon)
    };

    localStorage.setItem(cacheKey, JSON.stringify(result));
    return result;
  } catch (err) {
    console.warn("Geocoding error", err);
    return null;
  }
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function distanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const toRad = deg => deg * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function roomHasCoordinates(room) {
  const lat = Number(room.latitude || room.lat);
  const lon = Number(room.longitude || room.lng || room.lon);
  if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
  return { lat, lon };
}

async function getRoomCoordinates(room) {
  const existing = roomHasCoordinates(room);
  if (existing) return existing;
  if (!room.location) return null;
  return await geocodeLocation(room.location);
}

async function findNearbyRooms(search, selectedPlace = null) {
  const target = selectedPlace || await geocodeLocation(search);
  if (!target || !Number.isFinite(target.lat) || !Number.isFinite(target.lon)) return [];

  const { data, error } = await db
    .from("room_posts")
    .select("*")
    .eq("status", "active")
    .order("created_at", { ascending: false });

  if (error || !data) return [];

  const nearby = [];

  for (const room of data) {
    const coords = await getRoomCoordinates(room);
    if (!coords) continue;

    const km = distanceKm(target.lat, target.lon, coords.lat, coords.lon);
    room._distanceKm = km;
    nearby.push(room);

    // Be gentle with OpenStreetMap/Nominatim when room locations need geocoding.
    if (!roomHasCoordinates(room)) await sleep(250);
  }

  nearby.sort((a, b) => a._distanceKm - b._distanceKm);

  let filtered = nearby.filter(room => room._distanceKm <= 10);
  if (!filtered.length) filtered = nearby.filter(room => room._distanceKm <= 18);

  return filtered.slice(0, 12);
}



/* SAFE PUBLIC OWNER PROFILE LOOKUP
   users table stays locked. This reads only the public_user_profiles view. */
async function attachOwnerProfiles(items) {
  const rows = Array.isArray(items) ? items : [];
  const ids = [...new Set(rows.map(item => item && item.user_id).filter(Boolean))];
  if (!ids.length) return rows;

  const { data, error } = await db
    .from("public_user_profiles")
    .select("id,name,avatar_url,gender")
    .in("id", ids);

  if (error) {
    console.warn("Owner profile load error", error);
    return rows;
  }

  const profileMap = new Map((data || []).map(profile => [String(profile.id), profile]));
  return rows.map(item => {
    const profile = profileMap.get(String(item.user_id)) || null;
    return {
      ...item,
      user: profile,
      users: profile,
      owner: profile
    };
  });
}

/* LOAD ROOMS */
async function loadRooms(search = "", selectedPlace = null) {
  const cleanSearch = cleanSearchTerm(search);
  let query = db.from("room_posts")
    .select("*")
    .eq("status", "active");

  if (cleanSearch) {
    // Top search is only for location/area. Other property details are controlled by filters below.
    query = query.ilike("location", `%${cleanSearch}%`);
  }

  query = applyFiltersToQuery(query);

  const { data, error } = await query.order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    showAppPopup(error.message, "Error");
    return;
  }

  if (cleanSearch && (!data || data.length === 0)) {
    const nearbyRooms = (await findNearbyRooms(cleanSearch, selectedPlace)).filter(roomMatchesActiveFilters);

    if (nearbyRooms.length > 0) {
      renderRooms(await attachOwnerProfiles(nearbyRooms), `No exact property found in “${cleanSearch}”. Showing nearby area properties with your selected filters.`);
      return;
    }
  }

  renderRooms(await attachOwnerProfiles(data));
}

    container.innerHTML += `

      </div>`;
    return;
  }

  rooms.forEach(room => {
    let img = "https://via.placeholder.com/400x300?text=No+Image";
    let imagesArr = [];

    if (room.images && room.images.length > 0) {
      imagesArr = room.images.split(",").map(s => s.trim()).filter(Boolean);
      if (imagesArr.length > 0) img = imagesArr[0];
    } else {

    }
    
    let brokerageText = "";
    let isNoBrokerage = false;
    if (room.brokerage_type === "No Brokerage" || !room.brokerage_type) {
      brokerageText = "No Brokerage";
      isNoBrokerage = true;
    } else if (room.brokerage_amount) {
      brokerageText = `Brokerage: ₹${room.brokerage_amount}`;
    } else {
      brokerageText = `Brokerage: ${room.brokerage_type}`; 
    }

    let actions = "";

    if (room.show_contact && room.contact_number) {
      actions += `
        <button class="btn-action btn-call" onclick="triggerAction(event, 'call', '${room.id}', '${room.contact_number}')">
          <span class="material-symbols-rounded" style="font-size: 18px;">call</span> Call
        </button>
      `;
    }

    if (room.show_whatsapp && room.whatsapp_number) {
      actions += `
        <button class="btn-action btn-wa" onclick="triggerAction(event, 'wa', '${room.id}', '${room.whatsapp_number}')">
          <span class="material-symbols-rounded" style="font-size: 18px;">chat</span> WhatsApp
        </button>
      `;
    }

        <span class="material-symbols-rounded" style="font-size: 18px;">forum</span> Chat
      </button>

    const ownerObj = room.users || room.user || room.owner || {};
    const ownerName = ownerObj.name || 'Posted by user';
    const ownerAvatar = (ownerObj.avatar_url && ownerObj.avatar_url.trim()) ? ownerObj.avatar_url : getDefaultAvatar(ownerObj.gender);

    // build slides markup (sliding track)
    const slidesHtml = imagesArr.map((src) => `
        <img class="slide" src="${src}" alt="${room.title}">`).join('');

    container.innerHTML += `
      <div class="card" onclick="openRoom('${room.id}')">
        <div class="card-img-wrapper">
          <div class="slides-track">${slidesHtml}</div>
          <div class="price-badge">₹${room.rent}</div>
        </div>
        <div class="card-content">

          </div>

          <div class="details-row">
            <div class="detail-tag">
              <span class="material-symbols-rounded">apartment</span>
              ${room.type}
            </div>
            <div class="detail-tag">
              <span class="material-symbols-rounded">security</span>

            </div>

/* Initialize card sliders (auto-advance) */
function initCardSliders() {
  // horizontal right-to-left sliding, autoplay every 1s
  document.querySelectorAll('.card-img-wrapper').forEach(wrapper => {
    // clear existing interval if present
    if (wrapper._sliderInterval) {
      clearInterval(wrapper._sliderInterval);
      wrapper._sliderInterval = null;
    }

    const track = wrapper.querySelector('.slides-track');
    if (!track) return;
    const slides = track.querySelectorAll('img.slide');
    const len = slides.length;
    if (!len || len <= 1) return;

    let idx = 0;
    // ensure starting position
    track.style.transform = `translateX(-${idx * 100}%)`;

    // autoplay every 1s (1000ms)
    wrapper._sliderInterval = setInterval(() => {
      idx = (idx + 1) % len;
      track.style.transform = `translateX(-${idx * 100}%)`;
    }, 1000);

    // pause on hover (desktop)
    wrapper.addEventListener('mouseenter', () => {
      if (wrapper._sliderInterval) {
        clearInterval(wrapper._sliderInterval);
        wrapper._sliderInterval = null;
      }
    });

    wrapper.addEventListener('mouseleave', () => {
      if (wrapper._sliderInterval) return;
      wrapper._sliderInterval = setInterval(() => {
        idx = (idx + 1) % len;
        track.style.transform = `translateX(-${idx * 100}%)`;
      }, 1000);
    });
  });
}

// Re-init sliders after rendering rooms
const originalRenderRooms = renderRooms;
renderRooms = function(rooms, statusText = "") {
  originalRenderRooms(rooms, statusText);
  initCardSliders();
}

/* NAVIGATION — SMOOTH, SINGLE-STEP, NOTIFICATION-SAFE */
let __tingoNavigationLocked = false;

function go(page) {
  // Always close notification UI before any navigation.
  // This prevents the notification panel/overlay from appearing first
  // when the Map button is pressed from the reusable bottom navigation.
  try {
    if (typeof closeNotifications === 'function') closeNotifications();
    document.body.classList.remove('notification-open');
    document.querySelector('.app-container')?.classList.remove('notification-open');
  } catch (_) {}

  // Prevent duplicate clicks while the destination is opening.
  if (__tingoNavigationLocked) return;
  __tingoNavigationLocked = true;

  const target = String(page || '').trim() || 'index.html';
  const isHome = target === 'index.html' || target.endsWith('/index.html');
  const isMap = target === 'map.html' || target.endsWith('/map.html');

  requestAnimationFrame(() => {
    if (window.innerWidth >= 900) {
      if (isHome) {
        closePanel();
      } else {
        openPanel(isMap ? 'map.html' : target);
      }
      setTimeout(() => { __tingoNavigationLocked = false; }, 260);
    } else {
      // Use one direct navigation. No notification/panel transition is allowed
      // to run before the new page starts loading. A short themed fade masks
      // the moment between unload and the next page's first paint so it reads
      // as an intentional transition rather than a blank flash.
      tingoFadeThenNavigate(isMap ? 'map.html' : target);
    }
  });
}

function tingoFadeThenNavigate(destination) {
  let overlay = document.getElementById('tingoNavFade');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'tingoNavFade';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:999999;background:#F4F5F7;opacity:0;pointer-events:none;transition:opacity 90ms ease;';
    document.body.appendChild(overlay);
  }
  requestAnimationFrame(() => { overlay.style.opacity = '1'; });
  setTimeout(() => { window.location.replace(destination); }, 90);
}

// Some versions of button.html communicate navigation through postMessage.
// Handle that path here as well so the Map button follows the same safe flow.
window.addEventListener('message', (event) => {
  const data = event?.data;
  if (!data || typeof data !== 'object') return;

  const requestedPage = data.page || data.href || data.navigateTo || data.target;
  if (typeof requestedPage !== 'string') return;

  const normalized = requestedPage.trim().toLowerCase();
  if (normalized === 'map.html' || normalized.endsWith('/map.html')) {
    go('map.html');
  }
});

function openPanel(page) {
  try {
    const panel = document.getElementById('sidePanel');
    const frame = document.getElementById('panelFrame');
    const app = document.querySelector('.app-container');
    // remove nav-left when panel opens
    app.classList.remove('nav-left');
    app.classList.add('panel-open');
    panel.setAttribute('aria-hidden', 'false');
    // Ensure full absolute URL for relative pages
    frame.src = page;
  } catch (e) { console.error(e); window.location.href = page; }
}

function closePanel() {
  const panel = document.getElementById('sidePanel');
  const frame = document.getElementById('panelFrame');
  const app = document.querySelector('.app-container');
  app.classList.remove('panel-open');
  panel.setAttribute('aria-hidden', 'true');
  // unload iframe to free resources
  frame.src = 'about:blank';
  // re-evaluate left-nav positioning after panel closed
  try { updateNavLeft(); } catch (e) { /* ignore */ }
}

function updateNavLeft() {
  const app = document.querySelector('.app-container');
  const isIndex = location.pathname.endsWith('index.html') || location.pathname === '/' || location.pathname === '';
  if (window.innerWidth >= 900 && isIndex && !app.classList.contains('panel-open')) {
    app.classList.add('nav-left');
  } else {
    app.classList.remove('nav-left');
  }
}

window.addEventListener('resize', updateNavLeft);
window.addEventListener('load', updateNavLeft);

/* LOGIN CHECK */
function checkLogin(page) {
  const user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    showAppPopup("Login required", "Please login");
    if (window.innerWidth >= 900) {
      // open login in panel and include redirect target
      openPanel(`user.html?redirect=${encodeURIComponent(page)}`);
    } else {
      window.location.href = `user.html?redirect=${encodeURIComponent(page)}`;

let notificationChannel = null;
let notificationItems = [];
let notificationKnownIds = new Set();
let notificationsInitialised = false;
let notificationAudioContext = null;
let notificationMarkTimer = null;
let notificationSwipeState = null;

function getLoggedInUser() {
  try {
    const raw = localStorage.getItem("user");
    return raw ? JSON.parse(raw) : null;
  } catch (error) {
    console.warn("Unable to read logged-in user", error);
    return null;
  }
}

function notificationSeenKey(userId) {
  return `tingo_seen_notification_ids_${userId}`;
}

function getSeenNotificationIds(userId) {
  try {
    const value = JSON.parse(localStorage.getItem(notificationSeenKey(userId)) || "[]");
    return new Set(Array.isArray(value) ? value.map(String) : []);
  } catch (_) {
    return new Set();
  }
}

function saveSeenNotificationIds(userId, ids) {
  try {
    const compactIds = Array.from(ids).slice(-500);
    localStorage.setItem(notificationSeenKey(userId), JSON.stringify(compactIds));
  } catch (error) {
    console.warn("Unable to save notification seen state", error);
  }
}

function getWelcomeNotification(user) {
  if (!user?.id) return null;

  const createdKey = `tingo_welcome_notification_created_${user.id}`;
  let createdAt = localStorage.getItem(createdKey);
  if (!createdAt) {
    createdAt = new Date().toISOString();
    try { localStorage.setItem(createdKey, createdAt); } catch (_) {}
  }

  return {
    id: `tingo-welcome-${user.id}`,
    user_id: user.id,
    title: "Welcome to TingoRooms 👋",
    message: "Find rooms and roommates with a safer, simpler and more secure experience. Your latest room, chat and account updates will appear here.",
    created_at: createdAt,
    is_read: false,
    _localWelcome: true
  };
}

function combineNotifications(databaseItems, user) {
  const seenIds = getSeenNotificationIds(user.id);
  const rows = Array.isArray(databaseItems) ? databaseItems.map(item => ({
    ...item,
    is_read: item.is_read === true || seenIds.has(String(item.id))
  })) : [];

  const hasDatabaseWelcome = rows.some(item =>
    String(item.title || "").toLowerCase().includes("welcome to tingorooms")
  );

  if (!hasDatabaseWelcome) {
    const welcome = getWelcomeNotification(user);
    if (welcome) {
      welcome.is_read = seenIds.has(String(welcome.id));
      rows.push(welcome);
    }
  }

  return rows.sort((a, b) => {
    const aTime = new Date(a.created_at || 0).getTime() || 0;
    const bTime = new Date(b.created_at || 0).getTime() || 0;
    return bTime - aTime;
  });
}

function isNotificationPanelOpen() {
  return document.getElementById("notificationPanel")?.classList.contains("open") || false;
}

function updateNotificationBadge(listOrCount) {
  const badge = document.getElementById("notificationBadge");
  if (!badge) return;

  const count = Array.isArray(listOrCount)
    ? listOrCount.filter(item => item.is_read !== true).length
    : Math.max(0, Number(listOrCount) || 0);

  badge.textContent = count > 99 ? "99+" : String(count);
  badge.setAttribute("aria-label", `${count} unread notification${count === 1 ? "" : "s"}`);
  badge.classList.toggle("has-unread", count > 0);

  const subheading = document.getElementById("notificationSubheading");
  if (subheading) {
    subheading.textContent = count > 0
      ? `${count} new notification${count === 1 ? "" : "s"}`
      : "You are all caught up";
  }
}

function formatNotificationTime(value) {
  if (!value) return "Just now";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return "Recently";

  const diffSeconds = Math.max(0, Math.floor((Date.now() - date.getTime()) / 1000));
  if (diffSeconds < 60) return "Just now";
  if (diffSeconds < 3600) return `${Math.floor(diffSeconds / 60)}m ago`;
  if (diffSeconds < 86400) return `${Math.floor(diffSeconds / 3600)}h ago`;
  if (diffSeconds < 604800) return `${Math.floor(diffSeconds / 86400)}d ago`;

  return date.toLocaleDateString(undefined, { day: "numeric", month: "short", year: date.getFullYear() !== new Date().getFullYear() ? "numeric" : undefined });
}

function getNotificationIcon(item) {
  const text = `${item?.title || ""} ${item?.message || ""}`.toLowerCase();
  if (item?._localWelcome || text.includes("welcome")) return "waving_hand";
  if (text.includes("chat") || text.includes("message")) return "forum";
  if (text.includes("approved") || text.includes("active")) return "verified";
  if (text.includes("room") || text.includes("listing")) return "home_work";
  if (text.includes("security") || text.includes("login")) return "shield_person";
  return "notifications_active";
}

function ensureNotificationAudioContext() {
  try {
    if (!notificationAudioContext) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (AudioContextClass) notificationAudioContext = new AudioContextClass();
    }
    if (notificationAudioContext?.state === "suspended") {
      notificationAudioContext.resume().catch(() => {});
    }
  } catch (_) {}
  return notificationAudioContext;
}

function playNotificationSound() {
  const context = ensureNotificationAudioContext();
  if (!context || context.state !== "running") return;

  const now = context.currentTime;
  const notes = [659.25, 783.99, 1046.50];
  notes.forEach((frequency, index) => {
    const oscillator = context.createOscillator();
    const gain = context.createGain();
    const start = now + (index * 0.095);
    const end = start + 0.16;

    oscillator.type = index === 2 ? "sine" : "triangle";
    oscillator.frequency.setValueAtTime(frequency, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(0.12, start + 0.018);
    gain.gain.exponentialRampToValueAtTime(0.0001, end);

    oscillator.connect(gain);
    gain.connect(context.destination);
    oscillator.start(start);
    oscillator.stop(end + 0.02);
  });

  try { navigator.vibrate?.([35, 30, 45]); } catch (_) {}
}

async function markAllNotificationsSeen(user = getLoggedInUser()) {
  if (!user?.id || notificationItems.length === 0) return;

  const seenIds = getSeenNotificationIds(user.id);
  notificationItems.forEach(item => {
    if (item?.id != null) seenIds.add(String(item.id));
    item.is_read = true;
  });
  saveSeenNotificationIds(user.id, seenIds);
  renderNotifications(notificationItems);

  const unreadDatabaseIds = notificationItems
    .filter(item => !item._localWelcome && item?.id != null)
    .map(item => item.id);

  if (unreadDatabaseIds.length > 0) {
    const { error } = await db
      .from("notifications")
      .update({ is_read: true })
      .eq("user_id", user.id)
      .eq("is_read", false);

    if (error) console.warn("Notification read status is stored locally; database update was not available.", error.message);
  }
}

async function loadNotifications(options = {}) {
  const user = getLoggedInUser();
  if (!user?.id) {
    notificationItems = [];
    updateNotificationBadge(0);
    if (isNotificationPanelOpen()) renderNotifications([]);
    return;
  }

  const { markSeen = isNotificationPanelOpen(), announceNew = true } = options;
  const { data, error } = await db
    .from("notifications")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending: false });

  if (error) {
    console.error("Unable to load notifications", error);
    if (isNotificationPanelOpen()) {
      const container = document.getElementById("notificationList");
      if (container) {
        container.innerHTML = `
          <div class="notification-empty-state">
            <div class="notification-empty-icon error"><span class="material-symbols-rounded">cloud_off</span></div>
            <div class="notification-empty-title">Could not load updates</div>
            <div class="notification-empty-message">Check your connection and try again.</div>
            <button type="button" class="notification-retry-btn" onclick="loadNotifications({ markSeen: isNotificationPanelOpen(), announceNew: false })">Try again</button>
          </div>
        `;
      }
    }
    return;
  }

  const combined = combineNotifications(data || [], user);
  const databaseIds = combined.filter(item => !item._localWelcome && item?.id != null).map(item => String(item.id));
  const newlyArrived = notificationsInitialised
    ? databaseIds.filter(id => !notificationKnownIds.has(id))
    : [];

  databaseIds.forEach(id => notificationKnownIds.add(id));
  notificationItems = combined;
  renderNotifications(notificationItems);

  if (announceNew && newlyArrived.length > 0) playNotificationSound();
  notificationsInitialised = true;

  clearTimeout(notificationMarkTimer);
  if (markSeen && isNotificationPanelOpen()) {
    notificationMarkTimer = setTimeout(() => markAllNotificationsSeen(user), 420);
  }
}

  const panel = document.getElementById("notificationPanel");
  const overlay = document.getElementById("notificationOverlay");
  const button = document.getElementById("notificationButton");
  const app = document.querySelector(".app-container");

  clearTimeout(notificationMarkTimer);

  const params = new URLSearchParams(window.location.search);

function bindNotificationSwipe() {
  const panel = document.getElementById("notificationPanel");
  const overlay = document.getElementById("notificationOverlay");
  if (!panel || panel.dataset.swipeBound === "1") return;
  panel.dataset.swipeBound = "1";

  panel.addEventListener("touchstart", event => {
    if (!isNotificationPanelOpen() || !event.touches?.length) return;
    const touch = event.touches[0];
    notificationSwipeState = {
      startX: touch.clientX,
      startY: touch.clientY,
      currentX: touch.clientX,
      startTime: Date.now(),
      dragging: false
    };
  }, { passive: true });

  panel.addEventListener("touchmove", event => {
    if (!notificationSwipeState || !event.touches?.length) return;
    const touch = event.touches[0];
    const dx = Math.max(0, touch.clientX - notificationSwipeState.startX);
    const dy = touch.clientY - notificationSwipeState.startY;
    notificationSwipeState.currentX = touch.clientX;

    if (!notificationSwipeState.dragging) {
      if (Math.abs(dy) > Math.abs(dx) + 8) return;
      if (dx < 6) return;
      notificationSwipeState.dragging = true;
    }

    event.preventDefault();
    panel.style.transition = "none";
    panel.style.transform = `translateX(${Math.min(dx, panel.offsetWidth)}px)`;
    if (overlay) overlay.style.opacity = String(Math.max(0, 1 - (dx / Math.max(panel.offsetWidth, 1))));
  }, { passive: false });

  panel.addEventListener("touchend", () => {
    if (!notificationSwipeState) return;
    const dx = Math.max(0, notificationSwipeState.currentX - notificationSwipeState.startX);
    const elapsed = Math.max(1, Date.now() - notificationSwipeState.startTime);
    const velocity = dx / elapsed;
    const shouldClose = notificationSwipeState.dragging && (dx > panel.offsetWidth * 0.24 || velocity > 0.55);

    panel.style.transition = "";
    panel.style.transform = "";
    if (overlay) overlay.style.opacity = "";
    notificationSwipeState = null;

    if (shouldClose) closeNotifications();
  }, { passive: true });

  panel.addEventListener("touchcancel", () => {
    panel.style.transition = "";
    panel.style.transform = "";
    if (overlay) overlay.style.opacity = "";
    notificationSwipeState = null;
  }, { passive: true });
}

function initNotificationUI() {
  updateNotificationBadge(0);
  bindNotificationSwipe();
  document.addEventListener("keydown", event => {
    if (event.key === "Escape" && isNotificationPanelOpen()) closeNotifications();
  });
  document.addEventListener("pointerdown", ensureNotificationAudioContext, { once: true, passive: true });
}

function subscribeNotifications() {
  const user = getLoggedInUser();
  if (!user?.id) return;

  if (notificationChannel) {
    try { db.removeChannel(notificationChannel); } catch (_) {}
  }

  notificationChannel = db.channel(`notifications-${user.id}`)
    .on("postgres_changes", {
      event: "INSERT",
      schema: "public",
      table: "notifications",
      filter: `user_id=eq.${user.id}`
    }, () => {
      loadNotifications({ markSeen: isNotificationPanelOpen(), announceNew: true });
    })
    .subscribe();
}

/* UPDATED HOME FEED: dynamic type + brokerage filters, Available/Needed mode, and improved sticky switch */
function getActiveFilters() {
  const type = document.getElementById("filterType")?.value || "";
  const brokerage = document.getElementById("filterBrokerage")?.value || "";
  return { type, brokerage };
}

function hasActiveFilters() {
  const filters = getActiveFilters();
  return Boolean(filters.type || filters.brokerage);
}

function updateFilterUI() {
  const filters = getActiveFilters();
  const typeFilter = document.getElementById("filterType");
  const brokerageFilter = document.getElementById("filterBrokerage");
  const clearBtn = document.getElementById("clearFilters");

  typeFilter?.classList.toggle("filter-active", Boolean(filters.type));
  brokerageFilter?.classList.toggle("filter-active", Boolean(filters.brokerage));
  clearBtn?.classList.toggle("visible", hasActiveFilters());
}

function applyFiltersToQuery(query) {
  const filters = getActiveFilters();

  if (filters.type) {
    query = query.ilike("type", `%${filters.type}%`);
  }

  // Brokerage exists only on room_posts, so apply it only for Rooms Available.
  if (activePostMode === "available" && filters.brokerage) {
    if (filters.brokerage === "No Brokerage") {
      query = query.or("brokerage_type.ilike.%No Brokerage%,brokerage_type.is.null");
    } else {
      query = query.ilike("brokerage_type", `%${filters.brokerage}%`);
    }
  }

  return query;
}

function roomMatchesActiveFilters(room) {
  const filters = getActiveFilters();
  if (filters.type && !includesText(room.type, filters.type)) return false;

  if (activePostMode === "available" && filters.brokerage) {
    const roomBrokerage = room.brokerage_type || "No Brokerage";
    if (!includesText(roomBrokerage, filters.brokerage)) return false;
  }

  return true;
}

function getCurrentScrollTop() {
  const app = document.querySelector(".app-container");
  if (window.innerWidth >= 900) {
    return window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
  }
  return app ? app.scrollTop : 0;
}

function updateModeSwitchCompact() {
  const wrap = document.getElementById("modeSwitchWrap");
  if (!wrap) return;

  // Desktop has enough space, so keep the full Available/Needed switch sticky and always visible.
  if (window.innerWidth >= 900) {
    wrap.classList.remove("compact");
    modeSwitchLastScroll = getCurrentScrollTop();
    return;
  }

  const current = getCurrentScrollTop();
  const diff = current - modeSwitchLastScroll;

  // Expand immediately when user swipes/scrolls slightly upward, not only at the first post.
  if (diff < -3) {
    wrap.classList.remove("compact");
    modeSwitchExpandedUntil = Date.now() + 650;
  } else if (current <= 18) {
    wrap.classList.remove("compact");
  } else if (diff > 6 && current > 70 && Date.now() > modeSwitchExpandedUntil) {
    wrap.classList.add("compact");
  }

  modeSwitchLastScroll = Math.max(0, current);
}

function setupModeSwitchScroll() {
  const app = document.querySelector('.app-container');
  const root = window.innerWidth >= 900 ? window : app;
  const wrap = document.getElementById('modeSwitchWrap');
  if (!root || !wrap || wrap.dataset.smoothScrollBound === '1') return;

  wrap.dataset.smoothScrollBound = '1';
  let lastTop = getCurrentScrollTop();
  let frameId = 0;
  let hidden = false;

  const setVisible = (visible) => {
    const shouldHide = !visible && window.innerWidth < 900;
    if (hidden === shouldHide) return;
    hidden = shouldHide;
    wrap.classList.toggle('tingo-mode-tabs-hidden', shouldHide);
    wrap.classList.remove('compact', 'switch-hidden');
    document.querySelector('.app-container')?.classList.remove('tingo-top-hidden');
    if (shouldHide) hideSuggestionBox();
  };

  const update = () => {
    frameId = 0;
    const currentTop = getCurrentScrollTop();
    const delta = currentTop - lastTop;

    if (window.innerWidth >= 900 || currentTop <= 14) {
      setVisible(true);
    } else if (delta > 4 && currentTop > 36) {
      // User is scrolling upward through the page: hide the mode switch.
      setVisible(false);
    } else if (delta < -3) {
      // User is scrolling downward: bring the mode switch back.
      setVisible(true);
    }

    lastTop = Math.max(0, currentTop);
  };

  const requestUpdate = () => {
    if (frameId) return;
    frameId = requestAnimationFrame(update);
  };

  root.addEventListener('scroll', requestUpdate, { passive: true });
  window.addEventListener('resize', () => {
    lastTop = getCurrentScrollTop();
    setVisible(true);
  }, { passive: true });

  window.updateModeSwitchCompact = requestUpdate;
  setVisible(true);
}

async function findNearbyRooms(search, selectedPlace = null) {
  if (activePostMode === "needed") return [];

  const target = selectedPlace || await geocodeLocation(search);
  if (!target || !Number.isFinite(target.lat) || !Number.isFinite(target.lon)) return [];

  const { data, error } = await db
    .from("room_posts")
    .select("*")
    .eq("status", "active")
    .order("created_at", { ascending: false });

  if (error || !data) return [];

  const nearby = [];

  for (const room of data) {
    const coords = await getRoomCoordinates(room);
    if (!coords) continue;

    const km = distanceKm(target.lat, target.lon, coords.lat, coords.lon);
    room._distanceKm = km;
    nearby.push(room);

    if (!roomHasCoordinates(room)) await sleep(250);
  }

  nearby.sort((a, b) => a._distanceKm - b._distanceKm);

  let filtered = nearby.filter(room => room._distanceKm <= 10);
  if (!filtered.length) filtered = nearby.filter(room => room._distanceKm <= 18);

  return filtered.slice(0, 12);
}

/* ADVANCED SEARCH ENGINE + THEME POPUP */
const PUNE_CENTER = { lat: 18.5204, lon: 73.8567 };
const PUNE_SERVICE_RADIUS_KM = 55;
let appPopupTimer = null;

}

function isInsidePuneServiceArea(place) {
  if (!place || !Number.isFinite(Number(place.lat)) || !Number.isFinite(Number(place.lon))) return true;
  return distanceKm(PUNE_CENTER.lat, PUNE_CENTER.lon, Number(place.lat), Number(place.lon)) <= PUNE_SERVICE_RADIUS_KM;
}

function getPostTimestamp(item) {
  return item.updated_at || item.created_at || item.inserted_at || item.date || "";
}

function formatPostDate(item) {
  const raw = getPostTimestamp(item);
  if (!raw) return "Recently posted";
  const date = new Date(raw);
  if (Number.isNaN(date.getTime())) return "Recently posted";

  const now = new Date();
  const startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diffDays = Math.round((startToday - startDate) / 86400000);
  const prefix = item.updated_at && item.updated_at !== item.created_at ? "Updated" : "Posted";

  if (diffDays === 0) return `${prefix} today`;
  if (diffDays === 1) return `${prefix} yesterday`;

  return `${prefix} ${date.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" })}`;
}

function buildSearchStatus(searchText, rows, targetPlace) {
  if (!searchText) return "";
  const label = targetPlace?.label || targetPlace?.displayName || searchText;
  const hasExact = rows.some(row => Number(row._distanceKm) <= 1.25 || includesText(row.location, searchText));
  const closest = rows.find(row => Number.isFinite(Number(row._distanceKm)));

  if (targetPlace && !isInsidePuneServiceArea(targetPlace)) {
    return `We are currently serviceable in Pune only. Showing the closest Pune listings instead of “${searchText}”.`;
  }

  if (String(searchText).toLowerCase().includes("pune")) {
    return `We are currently serviceable in Pune. Showing Pune area posts nearest to your search.`;
  }

  if (hasExact) {
    return `Showing posts nearest to “${label}”.`;
  }

  if (closest) {
    return `No exact match found for “${searchText}”. Showing nearby listed areas first.`;
  }

  return `No exact match found for “${searchText}”. Showing related listed areas if available.`;
}

async function loadAllSearchRowsForMode() {

function textSearchRows(rows, searchText) {
  const term = cleanSearchTerm(searchText).toLowerCase();
  if (!term) return rows;
  const words = term.split(" ").filter(Boolean);

  function looseWordMatch(text, word) {
    if (!word) return false;
    if (text.includes(word)) return true;
    return text.split(/\s+/).some(part => part.startsWith(word) || word.startsWith(part));
  }

  return (rows || []).filter(item => {
    const haystack = cleanSearchTerm([
      item.location,
      item.title,
      item.description,
      item.type,
      item.brokerage_type,
      item.name,
      item.users?.name
    ].filter(Boolean).join(" ")).toLowerCase();

    if (haystack.includes(term)) return true;

    // Multi-word address search like "bhusari colony kothrud" should match
    // when all words are present anywhere in the detailed address/post text.
    if (words.length > 1 && words.every(word => looseWordMatch(haystack, word))) return true;

    // While typing, show related matches for useful 3+ character fragments.
    return words.some(word => word.length >= 3 && looseWordMatch(haystack, word));
  });
}

async function sortRowsByTarget(rows, target) {
  if (!target || !Number.isFinite(Number(target.lat)) || !Number.isFinite(Number(target.lon))) return [];
  const sorted = [];

  for (const row of rows || []) {
    const coords = await getRoomCoordinates(row);
    if (!coords) continue;
    const km = distanceKm(Number(target.lat), Number(target.lon), coords.lat, coords.lon);
    sorted.push({ ...row, _distanceKm: km });
    if (!roomHasCoordinates(row)) await sleep(140);
  }

  sorted.sort((a, b) => Number(a._distanceKm) - Number(b._distanceKm));
  return sorted;
}

async function getTargetFromSearch(searchText, selectedPlace = null) {
  if (selectedPlace && Number.isFinite(Number(selectedPlace.lat)) && Number.isFinite(Number(selectedPlace.lon))) return selectedPlace;
  const geo = await geocodeLocation(searchText);
  if (!geo) return null;
  return geo;
}

let tingoModeAwareLoadSeq = 0;

async function loadRooms(search = "", selectedPlace = null) {
  const cleanSearch = cleanSearchTerm(search);
  const requestedMode = activePostMode;
  const requestSeq = ++tingoModeAwareLoadSeq;
  const requestIsStale = () => requestSeq !== tingoModeAwareLoadSeq || requestedMode !== activePostMode;

  try {
    const allRows = await loadAllSearchRowsForMode();
    if (requestIsStale()) return;

    if (!cleanSearch) {
      renderRooms(allRows);
      return;
    }

    const target = await getTargetFromSearch(cleanSearch, selectedPlace || selectedSearchPlace);
    if (requestIsStale()) return;
    const exactRows = textSearchRows(allRows, cleanSearch);
    let finalRows = [];
    let statusText = "";
    const noun = activePostMode === "needed" ? "requirements" : "rooms";

    const rowKey = row => String(row?.id || `${row?.title || ''}|${row?.location || ''}|${row?.created_at || ''}`);
    const seenRows = new Set();
    const addUniqueRows = rows => {
      (rows || []).forEach(row => {
        const key = rowKey(row);
        if (!key || seenRows.has(key)) return;
        seenRows.add(key);
        finalRows.push(row);
      });
    };

    if (target) {
      if (!isInsidePuneServiceArea(target)) {
        showAppPopup("We are currently serviceable in Pune only. You can still view the closest Pune listings below.", "Service area");
      }

      const distanceSorted = await sortRowsByTarget(allRows, target);
      if (requestIsStale()) return;
      const distanceMap = new Map(distanceSorted.map(row => [rowKey(row), row]));
      const exactWithDistance = exactRows.map(row => distanceMap.get(rowKey(row)) || row);
      const nearbyRows = distanceSorted.filter(row => {
        const km = Number(row._distanceKm);
        return Number.isFinite(km) && km <= 35;
      });

      // Same behavior for Rooms Available and Rooms Needed:
      // exact/related rows + nearby rows, then final feed sorted nearest to farthest.
      addUniqueRows(exactWithDistance);
      addUniqueRows(nearbyRows);

      if (!finalRows.length) {
        addUniqueRows(distanceSorted);
      }

      finalRows.sort((a, b) => {
        const da = Number(a?._distanceKm);
        const db = Number(b?._distanceKm);
        const aHasDistance = Number.isFinite(da);
        const bHasDistance = Number.isFinite(db);
        if (aHasDistance && bHasDistance) return da - db;
        if (aHasDistance) return -1;
        if (bHasDistance) return 1;
        return new Date(getPostTimestamp(b) || 0) - new Date(getPostTimestamp(a) || 0);
      });

      if (exactRows.length && finalRows.length > exactRows.length) {
        statusText = `Showing nearest ${noun} for “${cleanSearch}”. Exact/related matches and nearby posts are sorted by distance.`;
      } else if (exactRows.length) {
        statusText = `Showing nearest matching ${noun} for “${cleanSearch}”.`;
      } else {
        statusText = buildSearchStatus(cleanSearch, finalRows, target);
      }
    } else {
      addUniqueRows(exactRows);
      statusText = finalRows.length
        ? `Showing related ${noun} for “${cleanSearch}”. Pick a location suggestion for more accurate nearby results.`
        : `No exact match found for “${cleanSearch}”. Try selecting one of the location suggestions.`;
    }

    const finalItems = await attachOwnerProfiles(finalRows.slice(0, 36));
    if (requestIsStale()) return;
    renderRooms(finalItems, statusText);
  } catch (error) {
    if (requestIsStale()) return;
    console.error(error);
    showAppPopup(error.message || "Something went wrong while loading posts.", "Search error");
  }
}

async function fetchDatabaseSuggestions(searchText) {
  const tableName = activePostMode === "needed" ? "room_requirements" : "room_posts";
  const term = cleanSearchTerm(searchText).toLowerCase();
  const safeTerm = term.replace(/[%_,]/g, " ").replace(/\s+/g, " ").trim();

  async function runSuggestionQuery(selectFields, useServerSearch = false) {
    let query = db.from(tableName).select(selectFields).limit(useServerSearch ? 120 : 450);
    if (activePostMode === "available") query = query.eq("status", "active");
    query = applyFiltersToQuery(query);

    // Server-side partial search makes suggestions appear while typing,
    // e.g. "katr" can return "Katraj" without waiting for exact spelling.
    if (useServerSearch && safeTerm) {
      query = query.or(`location.ilike.%${safeTerm}%,title.ilike.%${safeTerm}%,type.ilike.%${safeTerm}%`);
    }

    return await query;
  }

  async function loadSuggestionRows(selectFields) {
    let searched = { data: [], error: null };
    if (safeTerm) searched = await runSuggestionQuery(selectFields, true);
    if (!searched.error && searched.data && searched.data.length) return searched;

    // Fallback: load more rows and filter locally so partial/location words still show like YouTube suggestions.
    const broad = await runSuggestionQuery(selectFields, false);
    if (!broad.error) return broad;
    return searched.error ? searched : broad;
  }

  let { data, error } = await loadSuggestionRows("id, title, location, type, latitude, longitude");

  // If any older table does not have latitude/longitude, keep suggestions working without breaking the page.
  if (error) {
    const message = String(error.message || "").toLowerCase();
    if (message.includes("latitude") || message.includes("longitude") || message.includes("column") || message.includes("schema")) {
      const fallback = await loadSuggestionRows("id, title, location, type");
      data = fallback.data;
      error = fallback.error;
    }
  }

  if (error) {
    console.warn("Database suggestion error", error);
    return [];
  }

  const words = term.split(" ").filter(Boolean);
  const rows = (data || []).filter(row => {
    const text = [row.location, row.title, row.type].filter(Boolean).join(" ").toLowerCase();
    if (!term) return true;
    return text.includes(term) || words.some(word => {
      if (!word) return false;
      return text.includes(word) || text.split(/\s+/).some(part => part.startsWith(word) || word.startsWith(part));
    });
  });

  return buildDatabaseSuggestions(rows, searchText);
}

function buildDatabaseSuggestions(rows, searchText) {
  const suggestions = [];
  const seen = new Set();
  const term = cleanSearchTerm(searchText).toLowerCase();
  const words = term.split(" ").filter(Boolean);

  function cleanLower(value) {
    return cleanSearchTerm(value).toLowerCase();
  }

  function looseWordMatch(text, word) {
    if (!word) return false;
    if (text.includes(word)) return true;
    return text.split(/\s+/).some(part => part.startsWith(word) || word.startsWith(part));
  }

  function matches(value) {
    const text = cleanLower(value);
    if (!term) return true;
    if (text.includes(term)) return true;
    if (words.length > 1 && words.every(word => looseWordMatch(text, word))) return true;
    return words.some(word => word.length >= 3 && looseWordMatch(text, word));
  }

  function scoreLabel(label, isFullAddress = false) {
    const text = cleanLower(label);
    let score = isFullAddress ? 40 : 10;
    if (text === term) score += 100;
    if (text.startsWith(term)) score += 70;
    if (text.includes(term)) score += 45;
    words.forEach(word => {
      if (text.split(/\s+/).some(part => part.startsWith(word))) score += 12;
      else if (text.includes(word)) score += 6;
    });
    return score;
  }

  function add(label, subLabel, icon, value, row, score = 0) {
    const cleanLabel = cleanSearchTerm(label);
    if (!cleanLabel) return;
    const key = cleanLabel.toLowerCase();
    if (seen.has(key)) return;
    seen.add(key);
    const coords = roomHasCoordinates(row || {});
    suggestions.push({
      source: "database",
      label: cleanLabel,
      subLabel,
      icon,
      value: cleanSearchTerm(value || cleanLabel),
      lat: coords?.lat,
      lon: coords?.lon,
      displayName: row?.location || cleanLabel,
      _score: score
    });
  }

  (rows || []).forEach(row => {
    const location = row.location || "";
    const cleanLocation = cleanSearchTerm(location);
    const parts = String(location).split(",").map(part => cleanSearchTerm(part)).filter(Boolean);

    // Always prefer full detailed addresses when any part of the address matches.
    // Example: typing "bhusari colony kothrud" or just "kothrud" can show
    // "Bhusari Colony, Kothrud, Pune..." instead of only the broad area.
    if (cleanLocation && matches(cleanLocation)) {
      add(cleanLocation, activePostMode === "needed" ? "Requirement preferred address" : "Listed address — tap to search nearby", "location_on", cleanLocation, row, scoreLabel(cleanLocation, true));
    }

    // Also show useful address chunks below, like YouTube-style suggestions.
    const chunks = [];
    for (let i = 0; i < parts.length; i++) {
      chunks.push(parts[i]);
      if (parts[i + 1]) chunks.push(`${parts[i]}, ${parts[i + 1]}`);
      if (parts[i + 2]) chunks.push(`${parts[i]}, ${parts[i + 1]}, ${parts[i + 2]}`);
    }

    chunks.forEach(chunk => {
      if (matches(chunk)) {
        add(chunk, cleanLocation ? `From ${cleanLocation}` : "Saved location", "near_me", chunk, row, scoreLabel(chunk, false));
      }
    });

    if (row.title && matches(row.title)) {
      add(row.title, cleanLocation || "Listed post", activePostMode === "needed" ? "person_search" : "home_work", row.location || row.title, row, scoreLabel(row.title, false));
    }
  });

  suggestions.sort((a, b) => (b._score || 0) - (a._score || 0));
  return suggestions.slice(0, 14);
}

function attachSuggestionEvents(databaseSuggestions, mapSuggestions) {
  const box = document.getElementById("searchSuggestions");
  if (!box) return;

  box.querySelectorAll(".suggestion-item").forEach(item => {
    item.addEventListener("click", () => {
      const source = item.dataset.source;
      const index = Number(item.dataset.index);

      if (source === "database") {
        const suggestion = databaseSuggestions[index];
        selectedSearchPlace = Number.isFinite(Number(suggestion.lat)) && Number.isFinite(Number(suggestion.lon))
          ? { label: suggestion.label, displayName: suggestion.displayName, lat: Number(suggestion.lat), lon: Number(suggestion.lon) }
          : null;
        document.getElementById("search").value = suggestion.value || suggestion.label;
        hideSuggestionBox();
        loadRooms(suggestion.value || suggestion.label, selectedSearchPlace);
        return;
      }

      const place = mapSuggestions[index];
      selectedSearchPlace = place;
      document.getElementById("search").value = place.label;
      hideSuggestionBox();
      loadRooms(place.label, place);
    });
  });
}
