        function tingoIsInsidePuneDistrict(lt, ln) {
            const latNum = Number(lt);
            const lonNum = Number(ln);
            return Number.isFinite(latNum) && Number.isFinite(lonNum) &&
                lonNum >= TINGO_PUNE_BOUNDS.west && lonNum <= TINGO_PUNE_BOUNDS.east &&
                latNum >= TINGO_PUNE_BOUNDS.south && latNum <= TINGO_PUNE_BOUNDS.north;
        }

        function tingoCleanLocationText(value) {
            return String(value || "")
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function tingoNormalizeLocationQuery(value) {
            let text = tingoCleanLocationText(value);
            const replacements = [
                [/\bclg\b|\bcollage\b|\bcolg\b/g, "college"],
                [/\bchok\b|\bchouk\b|\bchowk\b/g, "chowk"],
                [/\bgali\b|\bgully\b|\blane\b/g, "galli"],
                [/\bbldg\b|\bbld\b/g, "building"],
                [/\bsoc\b|\bscty\b/g, "society"],
                [/\bapt\b|\baprt\b|\bapartment\b/g, "apartment"],
                [/\brd\b/g, "road"],
                [/\bnr\b/g, "near"],
                [/\bfata\b|\bphata\b/g, "phata"],
                [/\bpunee\b|\bpoona\b/g, "pune"],
                [/\bhavdhan\b|\bbavadhan\b|\bbavdan\b/g, "bavdhan"],
                [/\bbhukhum\b|\bbhukam\b/g, "bhukum"],
                [/\bkotharud\b/g, "kothrud"],
                [/\bhinjawadi\b/g, "hinjewadi"]
            ];
            replacements.forEach(([pattern, replacement]) => { text = text.replace(pattern, replacement); });
            return text.replace(/\s+/g, " ").trim();
        }

        function tingoLevenshtein(a, b) {
            a = tingoCleanLocationText(a);
            b = tingoCleanLocationText(b);
            if (a === b) return 0;
            if (!a.length) return b.length;
            if (!b.length) return a.length;
            const row = Array.from({ length: b.length + 1 }, (_, i) => i);
            for (let i = 1; i <= a.length; i++) {
                let previous = i - 1;
                row[0] = i;
                for (let j = 1; j <= b.length; j++) {
                    const old = row[j];
                    row[j] = Math.min(
                        row[j] + 1,
                        row[j - 1] + 1,
                        previous + (a[i - 1] === b[j - 1] ? 0 : 1)
                    );
                    previous = old;
                }
            }
            return row[b.length];
        }

        function tingoTextScore(term, haystack) {
            const q = tingoNormalizeLocationQuery(term);
            const h = tingoNormalizeLocationQuery(haystack);
            if (!q || !h) return 0;
            if (h === q) return 100;
            if (h.startsWith(q)) return 92;
            if (h.includes(q)) return 82;
            const words = q.split(" ").filter(Boolean);
            let score = 0;
            words.forEach(word => {
                if (h.includes(word)) score += 18;
                else if (word.length >= 4) {
                    const closest = h.split(" ").some(hw => Math.abs(hw.length - word.length) <= 2 && tingoLevenshtein(hw, word) <= 2);
                    if (closest) score += 10;
                }
            });
            return Math.min(score, 75);
        }

        function tingoIconForLocation(text) {
            const t = tingoCleanLocationText(text);
            if (/college|university|institute|school|academy|clg/.test(t)) return "school";
            if (/hospital|clinic|medical|doctor|health/.test(t)) return "local_hospital";
            if (/mall|market|store|shop|complex/.test(t)) return "storefront";
            if (/station|railway|metro|bus|depot|airport/.test(t)) return "directions_transit";
            if (/road|street|lane|galli|gully|chowk|phata|naka|circle|bridge/.test(t)) return "alt_route";
            if (/society|apartment|building|tower|residency|heights|villa|park|city|colony|nagar/.test(t)) return "apartment";
            return "location_on";
        }

        function tingoDeduplicateSuggestions(items) {
            const seen = new Set();
            const final = [];
            (items || []).forEach(item => {
                const latVal = Number(item.lat);
                const lonVal = Number(item.lon);
                if (!item || !item.label || !Number.isFinite(latVal) || !Number.isFinite(lonVal)) return;
                if (!tingoIsInsidePuneDistrict(latVal, lonVal)) return;
                const key = `${tingoCleanLocationText(item.label)}_${latVal.toFixed(4)}_${lonVal.toFixed(4)}`;
                if (seen.has(key)) return;
                seen.add(key);
                final.push({
                    source: item.source || "map",
                    label: item.label,
                    subLabel: item.subLabel || "Pune District, Maharashtra",
                    displayName: item.displayName || `${item.label}, ${item.subLabel || "Pune District, Maharashtra"}`,
                    lat: latVal,
                    lon: lonVal,
                    icon: item.icon || tingoIconForLocation(`${item.label} ${item.subLabel || ""}`),
                    score: item.score || 0
                });
            });
            return final;
        }

        function tingoLocalSuggestions(term, limit = 8) {
            const query = tingoNormalizeLocationQuery(term);
            if (!query) return [];
            return tingoDeduplicateSuggestions(TINGO_LOCAL_PUNE_PLACES.map(place => {
                const haystack = `${place.label} ${place.subLabel} ${place.aliases || ""}`;
                const score = tingoTextScore(query, haystack);
                return {
                    source: "local",
                    label: place.label,
                    subLabel: place.subLabel,
                    displayName: `${place.label}, ${place.subLabel}`,
                    lat: place.lat,
                    lon: place.lon,
                    icon: tingoIconForLocation(haystack),
                    score
                };
            }).filter(item => item.score > 0)).sort((a, b) => b.score - a.score).slice(0, limit);
        }

        function tingoCacheKey(term) {
            return TINGO_LOCATION_CACHE_PREFIX + tingoNormalizeLocationQuery(term).slice(0, 70);
        }

        function tingoReadLocationCache(term) {
            try {
                const key = tingoCacheKey(term);
                const raw = sessionStorage.getItem(key) || localStorage.getItem(key);
                if (!raw) return [];
                const payload = JSON.parse(raw);
                if (!payload || !Array.isArray(payload.items)) return [];
                if (Date.now() - Number(payload.time || 0) > 1000 * 60 * 60 * 24 * 14) return [];
                return payload.items;
            } catch (e) {
                return [];
            }
        }

        function tingoWriteLocationCache(term, items) {
            try {
                const payload = JSON.stringify({ time: Date.now(), items: (items || []).slice(0, 12) });
                sessionStorage.setItem(tingoCacheKey(term), payload);
                localStorage.setItem(tingoCacheKey(term), payload);
            } catch (e) {}
        }

        function tingoBuildNominatimSuggestion(place) {
            const address = place.address || {};
            const named = place.namedetails || {};
            const firstDisplay = String(place.display_name || "").split(",")[0];
            const label = named.name || place.name || address.building || address.house_name || address.amenity || address.shop || address.office || address.tourism || address.leisure || address.road || address.neighbourhood || firstDisplay;
            const roadLine = [address.house_number, address.road].filter(Boolean).join(" ");
            const areaLine = [address.neighbourhood || address.suburb || address.quarter || address.city_district || address.village || address.town || address.city || "Pune", address.county || address.state].filter(Boolean).join(", ");
            const subLabel = [roadLine, areaLine].filter(Boolean).join(" · ") || "Pune District, Maharashtra";
            return {
                source: "map",
                label: label || firstDisplay || "Location",
                subLabel,
                displayName: place.display_name || `${label}, ${subLabel}`,
                lat: Number(place.lat),
                lon: Number(place.lon),
                icon: tingoIconForLocation(`${label} ${subLabel} ${place.type || ""} ${place.class || ""}`),
                score: Number(place.importance || 0) * 10
            };
        }

        function tingoBuildPhotonSuggestion(feature) {
            const props = feature.properties || {};
            const coords = feature.geometry && feature.geometry.coordinates ? feature.geometry.coordinates : [];
            const labelParts = [props.name, props.housenumber && props.street ? `${props.housenumber} ${props.street}` : null, props.street].filter(Boolean);
            const label = labelParts[0] || "Location";
            const subLabel = [props.district || props.locality || props.city || props.county || "Pune", props.state || "Maharashtra"].filter(Boolean).join(", ");
            return {
                source: "map",
                label,
                subLabel,
                displayName: [props.name, props.street, props.locality || props.city || props.county, props.state].filter(Boolean).join(", "),
                lat: Number(coords[1]),
                lon: Number(coords[0]),
                icon: tingoIconForLocation(`${props.name || ""} ${props.street || ""} ${props.osm_value || ""}`),
                score: 20
            };
        }

        async function tingoFetchJson(url, signal) {
            const response = await fetch(url, { headers: { "Accept": "application/json" }, signal });
            if (!response.ok) throw new Error(`Location search failed ${response.status}`);
            return response.json();
        }

        async function tingoFetchPhoton(term, signal) {
            const normalized = tingoNormalizeLocationQuery(term);
            const variants = [...new Set([term, normalized, `${normalized} Pune`, `${normalized} Pune Maharashtra`].filter(Boolean))].slice(0, 3);
            const urls = variants.map(q => `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&lat=${TINGO_PUNE_CENTER.lat}&lon=${TINGO_PUNE_CENTER.lon}&limit=12&lang=en`);
            const results = await Promise.allSettled(urls.map(url => tingoFetchJson(url, signal)));
            const items = [];
            results.forEach(result => {
                if (result.status !== "fulfilled") return;
                (result.value.features || []).forEach(feature => items.push(tingoBuildPhotonSuggestion(feature)));
            });
            return items;
        }

        async function tingoFetchNominatim(term, signal) {
            const normalized = tingoNormalizeLocationQuery(term);
            const variants = [...new Set([term, normalized, `${normalized} Pune District Maharashtra India`, `${normalized} Pune Maharashtra India`].filter(Boolean))].slice(0, 3);
            const common = `format=json&addressdetails=1&namedetails=1&extratags=1&limit=12&countrycodes=in&viewbox=${encodeURIComponent(TINGO_PUNE_VIEWBOX)}&bounded=1`;
            const urls = variants.map(q => `https://nominatim.openstreetmap.org/search?${common}&q=${encodeURIComponent(q)}`);
            const results = await Promise.allSettled(urls.map(url => tingoFetchJson(url, signal)));
            const items = [];
            results.forEach(result => {
                if (result.status !== "fulfilled") return;
                (result.value || []).forEach(place => items.push(tingoBuildNominatimSuggestion(place)));
            });
            return items;
        }

        async function tingoLiveSuggestions(term, signal) {
            const cached = tingoReadLocationCache(term);
            if (cached.length) return cached;

            const [photon, nominatim] = await Promise.allSettled([
                tingoFetchPhoton(term, signal),
                tingoFetchNominatim(term, signal)
            ]);

            const merged = [
                ...(photon.status === "fulfilled" ? photon.value : []),
                ...(nominatim.status === "fulfilled" ? nominatim.value : [])
            ];

            const query = tingoNormalizeLocationQuery(term);
            const final = tingoDeduplicateSuggestions(merged).map(item => {
                item.score = (item.score || 0) + tingoTextScore(query, `${item.label} ${item.subLabel} ${item.displayName}`);
                return item;
            }).filter(item => item.score > 8 || tingoTextScore(query, item.displayName) > 8)
                .sort((a, b) => b.score - a.score)
                .slice(0, 14);

            if (final.length) tingoWriteLocationCache(term, final);
            return final;
        }

        function tingoRenderSuggestions(box, items, message = "") {
            if (!box) return;
            const unique = tingoDeduplicateSuggestions(items).slice(0, 12);
            const rows = unique.map((item, index) => `
                <div class="suggestion-item" data-index="${index}">
                    <span class="material-symbols-rounded">${escapeHtml(item.icon || "location_on")}</span>
                    <div>
                        <div class="suggestion-main">${escapeHtml(item.label)}</div>
                        <div class="suggestion-sub">${escapeHtml(item.subLabel)}</div>
                    </div>
                </div>
            `).join("");

            box.innerHTML = rows + (message ? `<div class="suggestion-empty">${escapeHtml(message)}</div>` : "");
            if (rows || message) box.classList.add("show");
            else box.classList.remove("show");
            box.__tingoItems = unique;
        }

        function tingoAttachClickHandler(input, box) {
            if (!box || box.__tingoClickBound) return;
            box.__tingoClickBound = true;
            box.addEventListener("click", (event) => {
                const row = event.target.closest(".suggestion-item");
                if (!row) return;
                const item = (box.__tingoItems || [])[Number(row.dataset.index)];
                if (!item) return;
                input.value = item.displayName || `${item.label}, ${item.subLabel}`;
                selectedSearchPlace = { lat: Number(item.lat), lon: Number(item.lon), label: item.label, displayName: input.value };
                box.classList.remove("show");
                loadRooms(input.value, selectedSearchPlace);
            });
        }

        // ─── Search suggestions setup ───
        let selectedSearchPlace = null;
        let suggestionRequestId = 0;
        const searchInput = document.getElementById('search');
        const suggestionsBox = document.getElementById('searchSuggestions');

        function setupTingoAutocomplete() {
            if (!searchInput || !suggestionsBox) return;
            let timer = null;
            let requestId = 0;
            let controller = null;

            tingoAttachClickHandler(searchInput, suggestionsBox);

            searchInput.addEventListener("input", () => {
                const term = searchInput.value.trim();
                requestId += 1;
                const thisRequest = requestId;
                clearTimeout(timer);
                if (controller) controller.abort();

                if (term.length < 2) {
                    suggestionsBox.classList.remove("show");
                    suggestionsBox.innerHTML = "";
                    suggestionsBox.__tingoItems = [];
                    return;
                }

                const local = tingoLocalSuggestions(term, 8);
                const cached = tingoReadLocationCache(term);
                const instant = tingoDeduplicateSuggestions([...local, ...cached]);
                tingoRenderSuggestions(suggestionsBox, instant, instant.length ? "Searching Pune district locations..." : "Searching Pune district locations...");

                timer = setTimeout(async () => {
                    controller = new AbortController();
                    try {
                        const live = await tingoLiveSuggestions(term, controller.signal);
                        if (thisRequest !== requestId) return;
                        const merged = tingoDeduplicateSuggestions([...local, ...live]);
                        if (merged.length) {
                            tingoRenderSuggestions(suggestionsBox, merged, "");
                        } else {
                            tingoRenderSuggestions(suggestionsBox, [], "No exact place found yet. Try society/building + area, for example ‘ABC Society Bavdhan’.");
                        }
                    } catch (error) {
                        if (error && error.name === "AbortError") return;
                        if (thisRequest !== requestId) return;
                        const fallback = tingoDeduplicateSuggestions([...local, ...cached]);
                        tingoRenderSuggestions(suggestionsBox, fallback, fallback.length ? "Showing saved suggestions. Keep typing for exact place." : "Live location search is slow. Check spelling or add Pune area name.");
                        console.warn("Tingo location search error", error);
                    }
                }, 160);
            });

            // Close suggestions on click outside
            document.addEventListener('click', (e) => {
                if (searchInput && suggestionsBox && !searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                    suggestionsBox.classList.remove("show");
                }
            });
        }

        // ─── Rest of the core feed functions ───
        let activePostMode = window.__TINGO_HOME_PREPAINT_STATE?.mode === 'needed' ? 'needed' : 'available';
        let tingoInitialFeedPainted = false;
        let tingoLoadRoomsSeq = 0;
        let tingoModeAwareLoadSeq = 0;
        let tingoLastFeedKey = '';
        let tingoFeedUpdateInProgress = false;
        const TINGO_FEED_CACHE_PREFIX = 'tingo_home_feed_v7';
        const TINGO_RAW_CACHE_PREFIX = 'tingo_home_rows_v7';
        const TINGO_PROFILE_CACHE_KEY = 'tingo_public_profiles_v5';
        const TINGO_CACHE_TTL = 120 * 1000;

        function tingoSafeJsonRead(key, fallback) {
            try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; } catch (_) { return fallback; }
        }

        function tingoSafeJsonWrite(key, value) {
            try { localStorage.setItem(key, JSON.stringify(value)); } catch (_) {}
        }

        function tingoNow() { return Date.now ? Date.now() : new Date().getTime(); }

        function tingoCacheKeyForFeed(search, selectedPlace) {
            const f = getActiveFilters();
            const placeKey = selectedPlace ? (selectedPlace.label || selectedPlace.displayName || (selectedPlace.lat ||
                '') + ',' + (selectedPlace.lon || '')) : '';
            return [TINGO_FEED_CACHE_PREFIX, activePostMode || 'available', normalizeSearchKey(cleanSearchTerm(search ||
                '')), normalizeSearchKey(f.type || ''), normalizeSearchKey(f.brokerage || ''), normalizeSearchKey(
                placeKey || '')].join('|');
        }

        function tingoClearFeedCaches() {
            try {
                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith(TINGO_FEED_CACHE_PREFIX) || key.startsWith(TINGO_RAW_CACHE_PREFIX)) {
                        localStorage.removeItem(key);
                    }
                });
            } catch (_) {}
        }

        function tingoShowFeedSkeleton() {
            const container = document.getElementById('roomList');
            if (!container || tingoInitialFeedPainted) return;
            const count = window.innerWidth >= 900 ? 6 : 4;
            container.innerHTML = Array.from({ length: count }).map(function() {
                return '<div class="feed-skeleton-card" aria-hidden="true">' +
                    '<div class="feed-skeleton-img"></div>' +
                    '<div class="feed-skeleton-body">' +
                    '<div class="feed-skeleton-line long"></div>' +
                    '<div class="feed-skeleton-line medium"></div>' +
                    '<div class="feed-skeleton-line short"></div>' +
                    '</div></div>';
            }).join('');
        }

        function tingoRenderCachedFeed(search, selectedPlace) {
            const key = tingoCacheKeyForFeed(search, selectedPlace);
            const cached = tingoSafeJsonRead(key);
            if (!cached || !Array.isArray(cached.items) || !cached.items.length) return false;
            tingoLastFeedKey = key;
            window.__tingoSkipNextFeedCacheWrite = true;
            renderRooms(cached.items, cached.statusText || '');
            window.__tingoSkipNextFeedCacheWrite = false;
            const container = document.getElementById('roomList');
            if (container) {
                container.classList.add('instant-cache-flash');
                setTimeout(function() { container.classList.remove('instant-cache-flash'); }, 220);
            }
            tingoInitialFeedPainted = true;
            return true;
        }

        function tingoBuildFeedSignature(items, statusText) {
            try {
                const compact = (Array.isArray(items) ? items : []).map(function(item) {
                    var p = item?.user || item?.users || item?.owner || {};
                    return {
                        id: item?.id || '',
                        updated_at: item?.updated_at || '',
                        created_at: item?.created_at || '',
                        status: item?.status || '',
                        title: item?.title || '',
                        location: item?.location || '',
                        type: item?.type || item?.category || '',
                        rent: item?.rent ?? '',
                        deposit: item?.deposit ?? '',
                        budget: item?.budget ?? item?.expected_rent ?? '',
                        brokerage_type: item?.brokerage_type || '',
                        images: item?.images || item?.image_urls || item?.image_url || '',
                        views: item?.views ?? item?.view_count ?? '',
                        distance: Number.isFinite(Number(item?._distanceKm)) ? Number(item._distanceKm).toFixed(
                            3) : '',
                        owner_id: p?.id || item?.user_id || '',
                        owner_name: p?.name || p?.full_name || '',
                        owner_avatar: p?.avatar_url || ''
                    };
                });
                return JSON.stringify({ mode: activePostMode || 'available', statusText: statusText || '',
                    items: compact });
            } catch (_) { return (activePostMode || 'available') + '|' + (statusText || '') + '|' + (Array.isArray(
                    items) ? items.length : 0); }
        }

        var __tingoOriginalRenderRooms = window.renderRooms;
        window.renderRooms = function(items, statusText) {
            var container = document.getElementById('roomList');
            var signature = tingoBuildFeedSignature(items, statusText);
            var same = Boolean(container && container.dataset.feedSignature === signature && container.children
            .length);
            if (!same) {
                __tingoOriginalRenderRooms(items, statusText);
                if (container) container.dataset.feedSignature = signature;
            }
            tingoInitialFeedPainted = true;
            if (!window.__tingoSkipNextFeedCacheWrite && tingoLastFeedKey && Array.isArray(items)) {
                tingoSafeJsonWrite(tingoLastFeedKey, {
                    savedAt: tingoNow(),
                    statusText: statusText,
                    items: items.slice(0, 48)
                });
            }
            if (container) container.classList.remove('feed-updating');
            tingoFeedUpdateInProgress = false;
        };

        // ─── attachOwnerProfiles with cache ───
        // IMPORTANT:
        // Never make the Home feed depend on public.users or a profile view.
        // A permission error on the owner-profile lookup must never block room_posts.
        // Cached profiles are used immediately. Profile hydration is optional and
        // runs in the background only when the public profile view is available.
        window.attachOwnerProfiles = async function(items) {
            var rows = Array.isArray(items) ? items : [];
            if (!rows.length) return rows;

            var cache = tingoSafeJsonRead(TINGO_PROFILE_CACHE_KEY, {}) || {};

            var mapped = rows.map(function(item) {
                var p = cache[String(item && item.user_id)] || null;
                return {
                    ...item,
                    user: p || item?.user || item?.users || item?.owner || null,
                    users: p || item?.users || item?.user || item?.owner || null,
                    owner: p || item?.owner || item?.user || item?.users || null
                };
            });

            // Do not block feed rendering on the users/profile relation.
            // This avoids the "permission denied for table users" problem when
            // returning to Home after another tab/panel was open.
            return mapped;
        };

        // ─── distance helpers ───
        function distanceKm(lat1, lon1, lat2, lon2) {
            var R = 6371;
            var toRad = function(d) { return d * Math.PI / 180; };
            var dLat = toRad(lat2 - lat1);
            var dLon = toRad(lon2 - lon1);
            var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function roomHasCoordinates(room) {
            var lat = Number(room.latitude || room.lat);
            var lon = Number(room.longitude || room.lng || room.lon);
            if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
            return { lat: lat, lon: lon };
        }

        async function geocodeLocation(text) {
            var loc = cleanSearchTerm(text);
            if (!loc) return null;
            var key = 'geo_v2_' + normalizeSearchKey(loc);
            try {
                var cached = JSON.parse(localStorage.getItem(key) || 'null');
                if (cached && Number.isFinite(Number(cached.lat)) && Number.isFinite(Number(cached.lon)))
                return cached;
            } catch (_) {}
            try {
                var url =
                    'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=in&q=' +
                    encodeURIComponent(loc + ' Pune Maharashtra India');
                var resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
                var data = await resp.json();
                if (!data || !data[0]) return null;
                var result = {
                    label: data[0].display_name ? String(data[0].display_name).split(',')[0] : loc,
                    displayName: data[0].display_name || loc,
                    lat: Number(data[0].lat),
                    lon: Number(data[0].lon)
                };
                try { localStorage.setItem(key, JSON.stringify(result)); } catch (_) {}
                return result;
            } catch (_) { return null; }
        }

        async function getRoomCoordinates(room) {
            var existing = roomHasCoordinates(room);
            if (existing) return existing;
            if (!room.location) return null;
            return await geocodeLocation(room.location);
        }

        // ─── app popup ───
        var appPopupTimer = null;

        function showAppPopup(message, title) {
            var popup = document.getElementById('appPopup');
            var titleEl = document.getElementById('appPopupTitle');
            var msgEl = document.getElementById('appPopupMessage');
            if (!popup || !msgEl) return;
            if (titleEl) titleEl.textContent = title || 'TingoRooms';
            msgEl.textContent = message;
            popup.classList.remove('hidden');
            clearTimeout(appPopupTimer);
            appPopupTimer = setTimeout(hideAppPopup, 4200);
        }

        function hideAppPopup() {
            var popup = document.getElementById('appPopup');
            if (popup) popup.classList.add('hidden');
        }

        function runManualSearch() {
            var input = document.getElementById('search');
            var value = input ? input.value.trim() : '';
            hideSuggestionBox();
            loadRooms(value, selectedSearchPlace);
        }

        // ─── hide/show suggestion box ───
        function hideSuggestionBox() {
            var box = document.getElementById('searchSuggestions');
            if (box) box.classList.remove('show');
        }

        // ─── applyFiltersToQuery ───
        window.applyFiltersToQuery = function(query) {
            var f = getActiveFilters();
            if (f.type) query = query.ilike('type', '%' + f.type + '%');
            return query;
        };

        window.roomMatchesActiveFilters = function(room) {
            var f = getActiveFilters();
            if (f.type && !includesText(room?.type, f.type)) return false;
            if (window.activePostMode !== 'available' || !f.brokerage) return true;
            var noBroker = tingoIsNoBrokerage(room?.brokerage_type);
            if (f.brokerage === '__no_brokerage__') return noBroker;
            if (f.brokerage === '__brokerage_applicable__') return !noBroker;
            return true;
        };

        // ─── loadAllSearchRowsForMode ───
        window.loadAllSearchRowsForMode = async function() {
            var key = TINGO_RAW_CACHE_PREFIX + '|' + (activePostMode || 'available') + '|' + normalizeSearchKey(
                getActiveFilters().type || '');
            var cached = tingoSafeJsonRead(key);
            if (cached && Array.isArray(cached.rows) && (tingoNow() - Number(cached.savedAt || 0)) < TINGO_CACHE_TTL) {
                return cached.rows;
            }
            if (activePostMode === 'needed') {
                var q1 = db.from('room_requirements').select('*');
                q1 = applyFiltersToQuery(q1);
                var r1 = await q1;
                var rows = (r1.data || []).filter(function(item) { return !String(item.status || '').toLowerCase()
                        .startsWith('inactive'); });
                var attached = await window.attachOwnerProfiles(rows);
                tingoSafeJsonWrite(key, { savedAt: tingoNow(), rows: attached });
                return attached;
            }
            var q2 = db.from('room_posts').select('*').eq('status', 'active');
            q2 = applyFiltersToQuery(q2);
            var r2 = await q2.order('created_at', { ascending: false });
            var attached2 = await window.attachOwnerProfiles(r2.data || []);
            tingoSafeJsonWrite(key, { savedAt: tingoNow(), rows: attached2 });
            return attached2;
        };

        // ─── textSearchRows (fuzzy) ───
        window.textSearchRows = function(rows, searchText) {
            var term = cleanSearchTerm(searchText);
            if (!term) return rows;
            var words = term.split(' ').filter(Boolean);

            function looseMatch(text, word) {
                if (!word) return false;
                var t = normalizeSearchKey(text);
                if (t.includes(normalizeSearchKey(word))) return true;
                return t.split(/\s+/).some(function(part) {
                    if (!part) return false;
                    if (part.startsWith(normalizeSearchKey(word)) || normalizeSearchKey(word).startsWith(part))
                        return true;
                    if (normalizeSearchKey(word).length < 3 || part.length < 3) return false;
                    return part.indexOf(normalizeSearchKey(word)) !== -1;
                });
            }

            return (rows || []).filter(function(item) {
                var haystack = [item.location, item.title, item.description, item.type, item.brokerage_type,
                    item.name, item.users?.name
                ].filter(Boolean).join(' ');
                var text = normalizeSearchKey(haystack);
                if (text.includes(normalizeSearchKey(term))) return true;
                if (words.length > 1 && words.every(function(w) { return looseMatch(text, w); })) return true;
                return words.some(function(w) { return w.length >= 3 && looseMatch(text, w); });
            });
        };

        // ─── sortRowsByTarget ───
        window.sortRowsByTarget = async function(rows, target) {
            if (!target || !Number.isFinite(Number(target.lat)) || !Number.isFinite(Number(target.lon)))
            return rows || [];
            var sorted = [];
            for (var i = 0; i < (rows || []).length; i++) {
                var row = rows[i];
                var coords = await getRoomCoordinates(row);
                if (!coords) { sorted.push(row); continue; }
                var km = distanceKm(Number(target.lat), Number(target.lon), coords.lat, coords.lon);
                sorted.push({ ...row, _distanceKm: km });
                if (!roomHasCoordinates(row)) await sleep(140);
            }
            sorted.sort(function(a, b) {
                var da = Number(a._distanceKm);
                var db = Number(b._distanceKm);
                if (Number.isFinite(da) && Number.isFinite(db)) return da - db;
                if (Number.isFinite(da)) return -1;
                if (Number.isFinite(db)) return 1;
                return 0;
            });
            return sorted;
        };

        // ─── getTargetFromSearch ───
        window.getTargetFromSearch = async function(search, selectedPlace) {
            if (selectedPlace && Number.isFinite(Number(selectedPlace.lat)) && Number.isFinite(Number(selectedPlace
                .lon))) return selectedPlace;
            return await geocodeLocation(search);
        };

        // ─── loadRooms (main) with background refresh ───
        window.loadRooms = async function(search, selectedPlace) {
            var cleanSearch = cleanSearchTerm(search || '');
            var requestedMode = activePostMode;
            var requestSeq = ++tingoModeAwareLoadSeq;

            function isStale() { return requestSeq !== tingoModeAwareLoadSeq || requestedMode !== activePostMode; }

            if (tingoFeedUpdateInProgress && !search && !selectedPlace) return;
            tingoFeedUpdateInProgress = true;

            var container = document.getElementById('roomList');
            if (container && container.children.length > 0) {
                container.classList.add('feed-updating');
            }

            try {
                var allRows = await window.loadAllSearchRowsForMode();
                if (isStale()) { tingoFeedUpdateInProgress = false; if (container) container.classList.remove(
                        'feed-updating'); return; }

                if (!cleanSearch) {
                    renderRooms(allRows);
                    tingoFeedUpdateInProgress = false;
                    if (container) container.classList.remove('feed-updating');
                    return;
                }

                var target = await window.getTargetFromSearch(cleanSearch, selectedPlace || selectedSearchPlace);
                if (isStale()) { tingoFeedUpdateInProgress = false; if (container) container.classList.remove(
                        'feed-updating'); return; }

                var exactRows = window.textSearchRows(allRows, cleanSearch);
                var finalRows = [];
                var seen = new Set();

                function addUnique(rows) {
                    (rows || []).forEach(function(row) {
                        var key = String(row?.id || row?.title + '|' + row?.location || '');
                        if (!key || seen.has(key)) return;
                        seen.add(key);
                        finalRows.push(row);
                    });
                }

                if (target) {
                    var distanceSorted = await window.sortRowsByTarget(allRows, target);
                    if (isStale()) { tingoFeedUpdateInProgress = false; if (container) container.classList
                            .remove('feed-updating'); return; }
                    var distMap = {};
                    distanceSorted.forEach(function(row) {
                        var key = String(row?.id || row?.title + '|' + row?.location || '');
                        if (key) distMap[key] = row;
                    });
                    var exactWithDist = exactRows.map(function(row) {
                        var key = String(row?.id || row?.title + '|' + row?.location || '');
                        return distMap[key] || row;
                    });
                    var nearby = distanceSorted.filter(function(row) {
                        var km = Number(row._distanceKm);
                        return Number.isFinite(km) && km <= 35;
                    });
                    addUnique(exactWithDist);
                    addUnique(nearby);
                    if (!finalRows.length) addUnique(distanceSorted);

                    finalRows.sort(function(a, b) {
                        var da = Number(a?._distanceKm);
                        var db = Number(b?._distanceKm);
                        var aHas = Number.isFinite(da);
                        var bHas = Number.isFinite(db);
                        if (aHas && bHas) return da - db;
                        if (aHas) return -1;
                        if (bHas) return 1;
                        return new Date(getPostTimestamp(b) || 0) - new Date(getPostTimestamp(a) || 0);
                    });
                } else {
                    addUnique(exactRows);
                }

                var finalItems = await window.attachOwnerProfiles(finalRows.slice(0, 36));
                if (isStale()) { tingoFeedUpdateInProgress = false; if (container) container.classList.remove(
                        'feed-updating'); return; }
                var statusText = '';
                var noun = activePostMode === 'needed' ? 'requirements' : 'rooms';
                if (target && finalItems.length) {
                    statusText = 'Showing nearest ' + noun + ' for "' + cleanSearch + '".';
                } else if (exactRows.length) {
                    statusText = 'Showing matching ' + noun + ' for "' + cleanSearch + '".';
                } else if (finalItems.length) {
                    statusText = 'No exact match for "' + cleanSearch + '". Showing related ' + noun + '.';
                }
                renderRooms(finalItems, statusText);
            } catch (error) {
                if (isStale()) { tingoFeedUpdateInProgress = false; if (container) container.classList.remove(
                        'feed-updating'); return; }
                console.error(error);
                showAppPopup(error.message || 'Unable to load posts right now.', 'Network issue');
                tingoFeedUpdateInProgress = false;
                if (container) container.classList.remove('feed-updating');
            }
        };

        // ─── renderRooms (delegates to card renderers) ───
        var __origRenderRooms = window.renderRooms;
        window.renderRooms = function(items, statusText) {
            var container = document.getElementById('roomList');
            var noun = activePostMode === 'needed' ? 'requirements' : 'rooms';
            container.innerHTML = statusText ?
                '<div class="search-status"><span class="material-symbols-rounded">travel_explore</span><span>' +
                escapeHtml(statusText) + '</span></div>' :
                '';

            if (!items || !items.length) {
                container.innerHTML +=
                    '<div class="no-results">' +
                    '<span class="material-symbols-rounded">search_off</span>' +
                    '<p>No ' + noun + ' found for your search.</p>' +
                    '<p>Try adjusting your search or type filter.</p>' +
                    '</div>';
                return;
            }

            var isDesktop = window.innerWidth >= 900;
            var html = '';
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                if (activePostMode === 'needed') {
                    html += renderRequirementCard(item, isDesktop);
                } else {
                    html += renderAvailableCard(item, isDesktop);
                }
            }
            container.innerHTML += html;

            if (activePostMode === 'available' && !isDesktop) {
                if (!container.querySelector('.ig-safe-banner')) {
                    var banner = document.createElement('div');
                    banner.className = 'ig-safe-banner';
                    banner.innerHTML =
                        '<div class="ig-safe-banner-icon"><span class="material-symbols-rounded">verified_user</span></div>' +
                        '<div><div class="ig-safe-banner-title">Secure. Verified. Hassle-Free.</div>' +
                        '<div class="ig-safe-banner-sub">All listings are verified for your safety</div></div>';
                    container.appendChild(banner);
                }
            }

            if (isDesktop) {
                setTimeout(initCardSliders, 60);
            }

            container.classList.remove('feed-updating');
            tingoFeedUpdateInProgress = false;
        };

        // ─── Card renderers ───
        window.renderAvailableCard = function(room, isDesktop) {
            if (isDesktop) return renderDesktopAvailableCard(room);
            return renderMobileAvailableCard(room);
        };

        window.renderRequirementCard = function(req, isDesktop) {
            if (isDesktop) return renderDesktopRequirementCard(req);
            return renderMobileRequirementCard(req);

                escapeHtml(formatListingRent(room.deposit || 0)) + '</div>' +

        function renderDesktopRequirementCard(req) {

                    '\',\'requirement\')"><span class="material-symbols-rounded">call</span> Call</button>';
            }
            if (req.show_whatsapp && req.whatsapp_number) {
                actions +=

        // ─── initCardSliders (desktop only) ───
        window.initCardSliders = function() {
            if (window.innerWidth < 900) return;
            document.querySelectorAll('.card-img-wrapper').forEach(function(wrapper) {
                if (wrapper._sliderInterval) {
                    clearInterval(wrapper._sliderInterval);
                    wrapper._sliderInterval = null;
                }
                var track = wrapper.querySelector('.slides-track');
                if (!track) return;
                var slides = track.querySelectorAll('img.slide');
                if (slides.length <= 1) return;
                var idx = 0;
                track.style.transform = 'translateX(-' + (idx * 100) + '%)';
                wrapper._sliderInterval = setInterval(function() {
                    idx = (idx + 1) % slides.length;
                    track.style.transform = 'translateX(-' + (idx * 100) + '%)';
                }, 4000);
                wrapper.addEventListener('mouseenter', function() {
                    if (wrapper._sliderInterval) {
                        clearInterval(wrapper._sliderInterval);
                        wrapper._sliderInterval = null;
                    }
                }, { passive: true });
                wrapper.addEventListener('mouseleave', function() {
                    if (wrapper._sliderInterval) return;
                    wrapper._sliderInterval = setInterval(function() {
                        idx = (idx + 1) % slides.length;
                        track.style.transform = 'translateX(-' + (idx * 100) + '%)';
                    }, 4000);
                }, { passive: true });
            });
        };

        // ─── loadFilterOptions ───
        window.loadFilterOptions = async function() {
            var typeSelect = document.getElementById('filterType');
            var brokerageSelect = document.getElementById('filterBrokerage');
            if (!typeSelect) return;

            var selectedType = typeSelect.value || window.__TINGO_HOME_PREPAINT_STATE?.type || '';
            var selectedBrokerage = brokerageSelect?.value || window.__TINGO_HOME_PREPAINT_STATE?.brokerage || '';
            var defaultLabel = activePostMode === 'needed' ? 'All required room types' : 'All room types';

            var requestedMode = activePostMode;
            var result;
            if (requestedMode === 'needed') {
                var r1 = await db.from('room_requirements').select('type,status').limit(1000);
                result = r1;
            } else {
                var r2 = await db.from('room_posts').select('type,brokerage_type,status').eq('status', 'active')
                    .limit(1000);
                if (r2.error) r2 = await db.from('room_posts').select('type,brokerage_type').limit(1000);
                result = r2;
            }

            if (result.error) {
                console.warn('Filter option loading error', result.error);
                updateFilterUI();
                return;
            }

            var rows = (result.data || []).filter(function(row) {
                var status = String(row?.status || 'active').trim().toLowerCase();
                return !status || status === 'active' || (!status.includes('inactive') && !status.includes(
                    'disabled') && !status.includes('rejected'));
            });

            var typeValues = [...new Set(rows.map(function(row) { return cleanSearchTerm(row.type); }).filter(
                Boolean))].sort();
            var typeHtml = '<option value="">' + escapeHtml(defaultLabel) + '</option>' + typeValues.map(function(
                v) {
                return '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>';
            }).join('');
            typeSelect.innerHTML = typeHtml;
            if (selectedType && typeValues.includes(selectedType)) typeSelect.value = selectedType;

            if (brokerageSelect) {
                var brokerValues = [...new Set(rows.map(function(row) { return row.brokerage_type || 'No Brokerage'; })
                    .filter(Boolean))].sort();
                var brokerHtml = '<option value="">All brokerage options</option>' +
                    '<option value="__brokerage_applicable__">Brokerage applicable</option>' +
                    '<option value="__no_brokerage__">No brokerage</option>';
                brokerageSelect.innerHTML = brokerHtml;
                if (activePostMode === 'needed') {
                    brokerageSelect.value = '';
                    brokerageSelect.classList.add('hidden-for-mode');
                } else {
                    brokerageSelect.classList.remove('hidden-for-mode');
                    if (selectedBrokerage && (selectedBrokerage === '__brokerage_applicable__' || selectedBrokerage ===
                            '__no_brokerage__')) {
                        brokerageSelect.value = selectedBrokerage;
                    }
                }
            }

            updateFilterUI();
        };

        // ─── bindFilterEvents ───
        window.bindFilterEvents = function() {
            ['filterType', 'filterBrokerage'].forEach(function(id) {
                var el = document.getElementById(id);
                if (!el || el.dataset.stableFilterBound === '1') return;
                el.dataset.stableFilterBound = '1';
                el.addEventListener('change', function() {
                    selectedSearchPlace = null;
                    hideSuggestionBox();
                    updateFilterUI();
                    loadRooms(getCurrentSearchText(), null);
                });
            });
            var clearBtn = document.getElementById('clearFilters');
            if (clearBtn && clearBtn.dataset.stableFilterBound !== '1') {
                clearBtn.dataset.stableFilterBound = '1';
                clearBtn.addEventListener('click', function() {
                    var type = document.getElementById('filterType');
                    var brokerage = document.getElementById('filterBrokerage');
                    if (type) type.value = '';
                    if (brokerage) brokerage.value = '';
                    selectedSearchPlace = null;
                    hideSuggestionBox();
                    updateFilterUI();
                    loadRooms(getCurrentSearchText(), null);
                });
            }
        };

        // ─── setPostMode ───
        window.setPostMode = function(mode) {
            var nextMode = mode === 'needed' ? 'needed' : 'available';
            if (nextMode === activePostMode) return Promise.resolve();
            activePostMode = nextMode;
            tingoModeAwareLoadSeq += 1;
            tingoLoadRoomsSeq += 1;

            document.getElementById('modeAvailableBtn')?.classList.toggle('active', activePostMode === 'available');
            document.getElementById('modeNeededBtn')?.classList.toggle('active', activePostMode === 'needed');

            var typeFilter = document.getElementById('filterType');
            var brokerageFilter = document.getElementById('filterBrokerage');
            if (typeFilter) typeFilter.value = '';
            if (brokerageFilter) brokerageFilter.value = '';

            selectedSearchPlace = null;
            hideSuggestionBox();
            updateFilterUI();
            tingoClearFeedCaches();

            var roomList = document.getElementById('roomList');
            if (roomList) {
                roomList.removeAttribute('data-feed-signature');
                roomList.innerHTML = '';
            }
            tingoInitialFeedPainted = false;

            var feedPromise = Promise.resolve(loadRooms(getCurrentSearchText(), null));
            var filterPromise = Promise.resolve(loadFilterOptions()).catch(function(err) {
                console.warn('Filter options could not be refreshed after tab change', err);
            });
            return Promise.allSettled([feedPromise, filterPromise]);
        };

        // ─── Home feed refresh after returning from another tab/panel ───
        var tingoHomeReturnRefreshTimer = null;
        var tingoHomeReturnRefreshRunning = false;

        window.refreshHomeFeedAfterNavigation = async function() {
            if (tingoHomeReturnRefreshRunning) return;
            tingoHomeReturnRefreshRunning = true;

            try {
                clearTimeout(tingoHomeReturnRefreshTimer);

                var container = document.getElementById('roomList');
                if (container) {
                    container.removeAttribute('data-feed-signature');
                }

                // Always show cached posts first if available.
                var hasCache = false;
                try {
                    hasCache = Boolean(tingoRenderCachedFeed(
                        getCurrentSearchText(),
                        selectedSearchPlace
                    ));
                } catch (_) {}

                if (!hasCache && typeof tingoShowFeedSkeleton === 'function') {
                    tingoShowFeedSkeleton();
                }

                // Reset the stale request lock left by the previous tab.
                tingoFeedUpdateInProgress = false;

                // Reload only the public listing tables.
                // Owner/profile lookup is optional and can never block this.
                await window.loadRooms(
                    getCurrentSearchText(),
                    selectedSearchPlace
                );

                if (typeof loadNotifications === 'function') {
                    loadNotifications();
                }
                if (typeof checkNewMessages === 'function') {
                    checkNewMessages();
                }
            } catch (e) {
                console.warn('Home feed refresh error:', e);
            } finally {
                tingoHomeReturnRefreshRunning = false;
            }
        };

        // ─── navigation helpers ───
        window.go = function(page) {
            try { if (typeof closeNotifications === 'function') closeNotifications(); } catch (_) {}
            var target = String(page || '').trim() || 'index.html';
            if (window.innerWidth >= 900) {
                if (target === 'index.html' || target.endsWith('/index.html')) {
                    closePanel();
                } else {
                    openPanel(target);

            } else {
                window.location.replace(target);
            }

        function openPanel(page) {
            try {
                var panel = document.getElementById('sidePanel');
                var frame = document.getElementById('panelFrame');
                var app = document.querySelector('.app-container');
                app.classList.remove('nav-left');
                app.classList.add('panel-open');
                panel.setAttribute('aria-hidden', 'false');
                frame.src = page;
            } catch (_) { window.location.href = page; }
        }

        function closePanel() {
            var panel = document.getElementById('sidePanel');
            var frame = document.getElementById('panelFrame');
            var app = document.querySelector('.app-container');

            app.classList.remove('panel-open');
            panel.setAttribute('aria-hidden', 'true');

            // Stop the previous tab/iframe completely.
            frame.src = 'about:blank';

            try { updateNavLeft(); } catch (_) {}

            // When the user returns to Home from Chat/Map/Profile,
            // refresh the feed without rebuilding the whole page.
            // This fixes the stale/empty Home feed after tab switching.
            setTimeout(function() {
                try {
                    if (typeof window.refreshHomeFeedAfterNavigation === 'function') {
                        window.refreshHomeFeedAfterNavigation();
                    }
                } catch (e) {
                    console.warn('Home feed refresh after navigation failed', e);
                }
            }, 40);
        }

        function updateNavLeft() {
            var app = document.querySelector('.app-container');
            var isIndex = location.pathname.endsWith('index.html') || location.pathname === '/' || location
            .pathname === '';
            if (window.innerWidth >= 900 && isIndex && !app.classList.contains('panel-open')) {
                app.classList.add('nav-left');
            } else {
                app.classList.remove('nav-left');
            }
        }

        window.closePanel = closePanel;
        window.openPanel = openPanel;
        window.updateNavLeft = updateNavLeft;

        // ─── auth guard bridge ───
        async function getVerifiedIndexUser(reason) {
            if (window.TingoAuthGuard) {
                var result = await window.TingoAuthGuard.validate({ reason: reason, force: true, silent: true });
                return result?.valid ? result.user : null;
            }
            try {
                var sess = await db.auth.getSession();
                if (!sess?.data?.session) return null;
                return JSON.parse(localStorage.getItem('user') || 'null');
            } catch (_) { return null; }
        }

        // ─── msg badge from chat ───
        window.checkNewMessages = async function() {
            var user = getLoggedInUser();
            if (!user) return;
            try {
                var result = await db.from('messages').select('sender_id,room_id').eq('receiver_id', user.id).eq(
                    'is_read', false);
                if (!result.data) { setMsgBadge(0); return; }
                var unique = new Set();
                result.data.forEach(function(m) { unique.add(m.sender_id + '_' + m.room_id); });
                setMsgBadge(unique.size);
            } catch (_) { setMsgBadge(0); }
        };

        function setMsgBadge(count) {
            var badge = document.getElementById('msgBadge');
            if (!badge) return;
            var number = Number(count || 0);
            if (number > 0) {
                badge.innerText = number > 99 ? '99+' : String(number);
                badge.style.display = 'block';
            } else {
                badge.innerText = '';
                badge.style.display = 'none';
            }
        }

        window.setMsgBadge = setMsgBadge;

        // ─── openChatList ───
        window.openChatList = function() {
            var user = getLoggedInUser();
            if (!user) {
                window.location.href = 'user.html?redirect=chatlist';
                return;
            }
            window.go('chat.html');
        };

        function getLoggedInUser() {
            try { return JSON.parse(localStorage.getItem('user') || 'null'); } catch (_) { return null; }
        }

        // ─── notification system ───
        var notificationItems = [];
        var notificationKnownIds = new Set();
        var notificationsInitialised = false;
        var notificationChannel = null;

        function updateNotificationBadge(count) {
            var badge = document.getElementById('notificationBadge');
            if (!badge) return;
            var c = Math.max(0, count || 0);
            badge.textContent = c > 99 ? '99+' : String(c);
            badge.setAttribute('aria-label', c + ' unread notification' + (c === 1 ? '' : 's'));
            badge.classList.toggle('has-unread', c > 0);
            var sub = document.getElementById('notificationSubheading');
            if (sub) sub.textContent = c > 0 ? c + ' new notification' + (c === 1 ? '' : 's') :
            'You are all caught up';
        }

        function renderNotifications(list) {
            var container = document.getElementById('notificationList');
            if (!container) return;
            var safe = Array.isArray(list) ? list : [];
            if (!safe.length) {
                container.innerHTML =
                    '<div class="notification-empty-state"><div class="notification-empty-icon"><span class="material-symbols-rounded">notifications_off</span></div><div class="notification-empty-title">No notifications yet</div><div class="notification-empty-message">New room, chat and account updates will appear here.</div></div>';
                updateNotificationBadge(0);
                return;
            }
            var unreadCount = safe.filter(function(item) { return !item.is_read; }).length;
            var cards = safe.map(function(item) {
                var unread = !item.is_read;
                var icon = 'notifications_active';
                var title = String(item.title || 'TingoRooms update');
                var msg = String(item.message || 'You have a new update.');
                var time = item.created_at ? formatPostDate(item) : 'Just now';
                return '<article class="notification-card ' + (unread ? 'unread' : '') +
                    '"><div class="notification-card-icon"><span class="material-symbols-rounded">' +
                    icon + '</span></div>' +
                    '<div class="notification-card-content">' +
                    '<div class="notification-card-topline">' +
                    '<div class="notification-card-title">' + escapeHtml(title) + '</div>' +
                    (unread ? '<span class="notification-new-pill">NEW</span>' : '') +
                    '</div>' +
                    '<div class="notification-card-message">' + escapeHtml(msg) + '</div>' +
                    '<div class="notification-card-time"><span class="material-symbols-rounded">schedule</span>' +
                    escapeHtml(time) + '</div>' +
                    '</div></article>';
            }).join('');
            container.innerHTML = cards;
            updateNotificationBadge(unreadCount);
        }

        function loadNotifications() {
            var user = getLoggedInUser();
            if (!user?.id) { updateNotificationBadge(0); return; }
            db.from('notifications').select('*').eq('user_id', user.id).order('created_at', { ascending: false })
                .then(function(result) {
                    if (result.error) { console.warn('Notification load error', result.error); return; }
                    var rows = result.data || [];
                    var seen = new Set();
                    notificationItems = rows.map(function(item) {
                        seen.add(String(item.id));
                        return { ...item, is_read: item.is_read || false };
                    });
                    notificationKnownIds = seen;
                    notificationsInitialised = true;
                    renderNotifications(notificationItems);
                });
        }

        function subscribeNotifications() {
            var user = getLoggedInUser();
            if (!user?.id) return;
            if (notificationChannel) { try { db.removeChannel(notificationChannel); } catch (_) {} }
            notificationChannel = db.channel('notifications-' + user.id)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications',
                    filter: 'user_id=eq.' + user.id }, function() {
                    loadNotifications();
                })
                .subscribe();
        }

        function isNotificationPanelOpen() {
            return document.getElementById('notificationPanel')?.classList.contains('open') || false;
        }

        function showNotificationsPanel() {
            var panel = document.getElementById('notificationPanel');
            var overlay = document.getElementById('notificationOverlay');
            if (!panel || !overlay) return;
            panel.classList.add('open');
            overlay.classList.add('open');
            panel.setAttribute('aria-hidden', 'false');
            overlay.setAttribute('aria-hidden', 'false');
            document.body.classList.add('notification-open');
            document.querySelector('.app-container')?.classList.add('notification-open');
            loadNotifications();
        }

        function closeNotifications() {
            var panel = document.getElementById('notificationPanel');
            var overlay = document.getElementById('notificationOverlay');
            panel?.classList.remove('open');
            overlay?.classList.remove('open');
            panel?.setAttribute('aria-hidden', 'true');
            overlay?.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('notification-open');
            document.querySelector('.app-container')?.classList.remove('notification-open');
        }

        window.closeNotifications = closeNotifications;
        window.openNotifications = function() {
            var user = getLoggedInUser();
            if (!user?.id) {
                try {
                    localStorage.setItem('tingo_open_notifications_after_login', '1');
                    localStorage.setItem('tingo_post_login_redirect', 'index.html?openNotifications=1');
                } catch (_) {}
                sendToLogin('index.html?openNotifications=1');
                return;
            }
            if (isNotificationPanelOpen()) { closeNotifications(); return; }
            showNotificationsPanel();
        };

        function initNotificationUI() {
            updateNotificationBadge(0);
            var panel = document.getElementById('notificationPanel');
            var overlay = document.getElementById('notificationOverlay');
            if (panel) {
                panel.addEventListener('touchstart', function(e) {
                    if (!isNotificationPanelOpen() || !e.touches?.length) return;
                    var startX = e.touches[0].clientX;
                    var startY = e.touches[0].clientY;
                    var dragging = false;
                    var currentX = startX;
                    var onMove = function(ev) {
                        if (!ev.touches?.length) return;
                        var touch = ev.touches[0];
                        var dx = Math.max(0, touch.clientX - startX);
                        var dy = touch.clientY - startY;
                        currentX = touch.clientX;
                        if (!dragging) { if (Math.abs(dy) > Math.abs(dx) + 8 || dx < 6) return;
                            dragging = true; }
                        ev.preventDefault();
                        panel.style.transition = 'none';
                        panel.style.transform = 'translateX(' + Math.min(dx, panel.offsetWidth) + 'px)';
                        if (overlay) overlay.style.opacity = String(Math.max(0, 1 - (dx / Math.max(panel
                            .offsetWidth, 1))));
                    };
                    var onEnd = function() {
                        var dx = Math.max(0, currentX - startX);
                        var shouldClose = dragging && dx > panel.offsetWidth * 0.24;
                        panel.style.transition = '';
                        panel.style.transform = '';
                        if (overlay) overlay.style.opacity = '';
                        document.removeEventListener('touchmove', onMove);
                        document.removeEventListener('touchend', onEnd);
                        if (shouldClose) closeNotifications();
                    };
                    document.addEventListener('touchmove', onMove, { passive: false });
                    document.addEventListener('touchend', onEnd, { passive: true });
                }, { passive: true });
            }
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && isNotificationPanelOpen()) closeNotifications();
            });
        }

        function maybeOpenNotificationsAfterLogin(user) {
            if (!user?.id) return;
            var params = new URLSearchParams(window.location.search);
            var byUrl = params.get('openNotifications') === '1';
            var byStorage = localStorage.getItem('tingo_open_notifications_after_login') === '1';
            if (!byUrl && !byStorage) return;
            try {
                localStorage.removeItem('tingo_open_notifications_after_login');
                localStorage.removeItem('tingo_post_login_redirect');
            } catch (_) {}
            if (byUrl && window.history?.replaceState) {
                params.delete('openNotifications');
                var clean = params.toString();
                window.history.replaceState({}, document.title, window.location.pathname + (clean ? '?' + clean :
                    '') + window.location.hash);
            }
            setTimeout(showNotificationsPanel, 180);
        }

        document.addEventListener('tingo:auth-state', function(event) {
            var detail = event.detail || {};
            if (!detail.valid || !detail.user?.id) {
                updateNotificationBadge(0);
                return;
            }
            subscribeNotifications();
            loadNotifications();
            checkNewMessages();
            maybeOpenNotificationsAfterLogin(detail.user);
        });

        // ─── initSmoothHomePage ───
        window.initSmoothHomePage = function() {
            setupTingoAutocomplete(); // enhanced location suggestions
            loadFilterOptions();
            bindFilterEvents();
            var hasCache = tingoRenderCachedFeed(getCurrentSearchText(), selectedSearchPlace);
            if (!hasCache) tingoShowFeedSkeleton();
            loadRooms(getCurrentSearchText(), selectedSearchPlace);
            subscribeNotifications();
            initNotificationUI();
            checkNewMessages();
            updateNavLeft();
            setInterval(function() {
                if (document.hidden) return;
                if (!getCurrentSearchText() && !hasActiveFilters()) {
                    loadRooms();
                }
                loadNotifications();
                checkNewMessages();
            }, 45000);
        };

        // Returning to the already-open Home document from another tab/panel.
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState !== 'visible') return;
            clearTimeout(tingoHomeReturnRefreshTimer);
            tingoHomeReturnRefreshTimer = setTimeout(function() {
                if (window.innerWidth >= 900 && !document.querySelector('.app-container')?.classList.contains('panel-open')) {
                    if (typeof window.refreshHomeFeedAfterNavigation === 'function') {
                        window.refreshHomeFeedAfterNavigation();
                    }
                }
            }, 120);
        });

        // ─── pageshow / bfcache ───
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                tingoInitialFeedPainted = false;
                var container = document.getElementById('roomList');
                if (container) {
                    container.removeAttribute('data-feed-signature');
                }
                var hasCache = tingoRenderCachedFeed(getCurrentSearchText(), selectedSearchPlace);
                if (!hasCache) tingoShowFeedSkeleton();
                loadRooms(getCurrentSearchText(), selectedSearchPlace);
                loadNotifications();
                checkNewMessages();
                updateNavLeft();
                closeNotifications();
            }
            document.querySelectorAll('.card.preparing-open').forEach(function(c) {
                c.classList.remove('preparing-open');
            });
        }, { passive: true });

        // ─── DOMContentLoaded boot ───
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                if (!window.__tingoHomeBooted) {
                    window.__tingoHomeBooted = true;
                    initSmoothHomePage();
                }
            }, { once: true });
        } else {
            if (!window.__tingoHomeBooted) {
                window.__tingoHomeBooted = true;
                initSmoothHomePage();
            }
        }

        // ─── mode switch scroll (mobile) ───
        var modeWrap = document.getElementById('modeSwitchWrap');
        var appContainer = document.querySelector('.app-container');
        if (modeWrap && appContainer) {
            var lastScroll = 0;
            var ticking = false;

            function updateModeVisibility() {
                ticking = false;
                if (window.innerWidth >= 900) {
                    modeWrap.classList.remove('tingo-mode-tabs-hidden', 'switch-hidden');
                    lastScroll = appContainer.scrollTop || 0;
                    return;
                }
                var current = appContainer.scrollTop || 0;
                var delta = current - lastScroll;
                if (current <= 12) {
                    modeWrap.classList.remove('tingo-mode-tabs-hidden', 'switch-hidden');
                } else if (delta > 3) {
                    modeWrap.classList.add('tingo-mode-tabs-hidden');
                    modeWrap.classList.remove('switch-hidden');
                } else if (delta < -3) {
                    modeWrap.classList.remove('tingo-mode-tabs-hidden', 'switch-hidden');
                }
                lastScroll = current;
            }

            appContainer.addEventListener('scroll', function() {
                if (ticking) return;
                ticking = true;
                requestAnimationFrame(updateModeVisibility);
            }, { passive: true });

            window.addEventListener('resize', function() {
                lastScroll = appContainer.scrollTop || 0;
                modeWrap.classList.remove('tingo-mode-tabs-hidden', 'switch-hidden');
            }, { passive: true });

            modeWrap.classList.remove('tingo-mode-tabs-hidden', 'switch-hidden');
        }

        // ─── expose for inline onclick ───
        window.activePostMode = activePostMode;
        window.loadRooms = loadRooms;
        window.renderRooms = renderRooms;
        window.loadFilterOptions = loadFilterOptions;
        window.bindFilterEvents = bindFilterEvents;
        window.setPostMode = setPostMode;
        window.showAppPopup = showAppPopup;
        window.hideAppPopup = hideAppPopup;
        window.runManualSearch = runManualSearch;
        window.getCurrentSearchText = getCurrentSearchText;
        window.hasActiveFilters = hasActiveFilters;
        window.updateFilterUI = updateFilterUI;
        window.tingoClearFeedCaches = tingoClearFeedCaches;
        window.tingoRenderCachedFeed = tingoRenderCachedFeed;
        window.tingoShowFeedSkeleton = tingoShowFeedSkeleton;
        window.getVerifiedIndexUser = getVerifiedIndexUser;
        window.sendToLogin = sendToLogin;
        window.getLoggedInUser = getLoggedInUser;
        window.loadNotifications = loadNotifications;
        window.subscribeNotifications = subscribeNotifications;
        window.closeNotifications = closeNotifications;
        window.showNotificationsPanel = showNotificationsPanel;
        window.initNotificationUI = initNotificationUI;
        window.maybeOpenNotificationsAfterLogin = maybeOpenNotificationsAfterLogin;
        window.initCardSliders = initCardSliders;
        window.openChatList = openChatList;
        window.setMsgBadge = setMsgBadge;
        window.checkNewMessages = checkNewMessages;
        window.hideSuggestionBox = hideSuggestionBox;
        window.showSuggestionBox = function(html) {
            var box = document.getElementById('searchSuggestions');
            if (!box) return;
            box.innerHTML = html;
            box.classList.add('show');
        };
    </script>

    <!-- ════════════════════════════════════════════════════════ -->

    <script src="tingo_auth_guard.js">

    <!--  SIDE PANEL (desktop)  -->
    <!-- ════════════════════════════════════════════════════════ -->
    <div class="side-panel" id="sidePanel" aria-hidden="true">
        <button class="panel-close" id="panelClose" onclick="closePanel()" title="Close">✕</button>
        <iframe id="panelFrame" src="about:blank" title="Panel content"></iframe>
    </div>

    <style>
        .side-panel {
            display: none;
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 30%;
            max-width: 420px;
            background: var(--surface);
            box-shadow: -2px 0 20px rgba(0, 0, 0, 0.08);
            z-index: 1500;
            overflow: hidden;
            border-left: 1px solid var(--border);
            border-radius: 0;
        }
        .side-panel .panel-close {
            position: absolute;
            top: 12px;
            left: 12px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-muted);
            z-index: 1510;
            width: auto;
            height: auto;
            border-radius: 0;
            box-shadow: none;
        }
        .side-panel iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .panel-open .side-panel {
            display: block;
        }
        .panel-open .main-content,
        .panel-open .header,
        .panel-open .filter-bar,
        .panel-open .mode-switch-wrap {
            margin-right: 30%;
            width: 70%;
        }
        .nav-left .bottom-nav-embedded {
            right: 24px;
            left: auto;
            top: 120px;
            transform: none;
        }
        .nav-left .main-content,
        .nav-left .header,
        .nav-left .filter-bar,
        .nav-left .mode-switch-wrap {
            margin-right: 120px;
            margin-left: 0;
            width: calc(100% - 120px);
        }
        .panel-open.nav-left .bottom-nav-embedded {
            left: 24px;
            right: auto;
        }
        .panel-open.nav-left .main-content,
        .panel-open.nav-left .header,
        .panel-open.nav-left .filter-bar,
        .panel-open.nav-left .mode-switch-wrap {
            margin-right: 0;
            margin-left: 30%;
            width: 70%;
        }
        @media (max-width: 899px) {
            .side-panel {
                display: none !important;
            }
            .panel-open .main-content,
            .panel-open .header,
            .panel-open .filter-bar,
            .panel-open .mode-switch-wrap,
            .panel-open.nav-left .main-content,
            .panel-open.nav-left .header,
            .panel-open.nav-left .filter-bar,
            .panel-open.nav-left .mode-switch-wrap {
                margin-right: 0 !important;
                margin-left: 0 !important;
                width: 100% !important;
            }
        }
    </style>
