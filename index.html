/* =========================================
   SMOOTH UI PERFORMANCE UPDATE
   Cache-first feed + reduced polling + visible-card sliders
   ========================================= */
const TINGO_FEED_CACHE_PREFIX = "tingo_home_feed_v5";
const TINGO_RAW_CACHE_PREFIX = "tingo_home_rows_v5";
const TINGO_PROFILE_CACHE_KEY = "tingo_public_profiles_v3";
const TINGO_FILTER_CACHE_KEY = "tingo_filter_html_v3";
const TINGO_SUGGESTION_CACHE_PREFIX = "tingo_suggestions_v4";
const TINGO_CACHE_TTL = 90 * 1000;
const TINGO_FILTER_CACHE_TTL = 10 * 60 * 1000;
let tingoLoadRoomsSeq = 0;
let tingoFeedRealtimeChannel = null;
let tingoLastFeedKey = "";
let tingoInitialFeedPainted = false;

function tingoSafeJsonRead(key, fallback = null) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}

function tingoSafeJsonWrite(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

function tingoNow() {
  return Date.now ? Date.now() : new Date().getTime();
}

function tingoCacheKeyForFeed(search = "", selectedPlace = null) {
  const filters = getActiveFilters ? getActiveFilters() : { type: "", brokerage: "" };
  const placeKey = selectedPlace ? (selectedPlace.label || selectedPlace.displayName || `${selectedPlace.lat || ""},${selectedPlace.lon || ""}`) : "";
  return [
    TINGO_FEED_CACHE_PREFIX,
    activePostMode || "available",
    normalizeSearchKey(cleanSearchTerm(search || "")),
    normalizeSearchKey(filters.type || ""),
    normalizeSearchKey(filters.brokerage || ""),
    normalizeSearchKey(placeKey || "")
  ].join("|");
}

function tingoRawRowsCacheKey() {
  const filters = getActiveFilters ? getActiveFilters() : { type: "", brokerage: "" };
  return [
    TINGO_RAW_CACHE_PREFIX,
    activePostMode || "available",
    normalizeSearchKey(filters.type || ""),
    normalizeSearchKey(filters.brokerage || "")
  ].join("|");
}

function tingoClearFeedCaches() {
  try {
    Object.keys(localStorage).forEach(key => {
      if (key.startsWith(TINGO_FEED_CACHE_PREFIX) || key.startsWith(TINGO_RAW_CACHE_PREFIX) || key.startsWith(TINGO_SUGGESTION_CACHE_PREFIX)) {
        localStorage.removeItem(key);
      }
    });
  } catch (e) {}
}

function tingoShowFeedSkeleton() {
  const container = document.getElementById("roomList");
  if (!container || tingoInitialFeedPainted) return;
  const count = window.innerWidth >= 900 ? 6 : 4;
  container.innerHTML = Array.from({ length: count }).map(() => `
    <div class="feed-skeleton-card" aria-hidden="true">
      <div class="feed-skeleton-img"></div>
      <div class="feed-skeleton-body">
        <div class="feed-skeleton-line long"></div>
        <div class="feed-skeleton-line medium"></div>
        <div class="feed-skeleton-line short"></div>
      </div>
    </div>
  `).join("");
}

function tingoRenderCachedFeed(search = "", selectedPlace = null) {
  const key = tingoCacheKeyForFeed(search, selectedPlace);
  const cached = tingoSafeJsonRead(key);
  if (!cached || !Array.isArray(cached.items)) return false;

  tingoLastFeedKey = key;
  window.__tingoSkipNextFeedCacheWrite = true;
  renderRooms(cached.items, cached.statusText || "");
  window.__tingoSkipNextFeedCacheWrite = false;

  const container = document.getElementById("roomList");
  if (container) {
    container.classList.add("instant-cache-flash");
    setTimeout(() => container.classList.remove("instant-cache-flash"), 220);
  }

  tingoInitialFeedPainted = true;
  return true;
}

const tingoOriginalAttachOwnerProfiles = attachOwnerProfiles;
attachOwnerProfiles = async function(items) {
  const rows = Array.isArray(items) ? items : [];
  if (!rows.length) return rows;

  const profileCache = tingoSafeJsonRead(TINGO_PROFILE_CACHE_KEY, {}) || {};
  const ids = [...new Set(rows.map(item => item && item.user_id).filter(Boolean).map(String))];
  const missingIds = ids.filter(id => !profileCache[id]);

  if (missingIds.length) {
    try {
      const { data, error } = await db
        .from("public_user_profiles")
        .select("id,name,avatar_url,gender")
        .in("id", missingIds);

      if (!error && data) {
        data.forEach(profile => {
          if (profile && profile.id) profileCache[String(profile.id)] = profile;
        });
        tingoSafeJsonWrite(TINGO_PROFILE_CACHE_KEY, profileCache);
      }
    } catch (e) {
      console.warn("Cached owner profile load skipped", e);
    }
  }

  return rows.map(item => {
    const profile = profileCache[String(item && item.user_id)] || null;
    return {
      ...item,
      user: item.user || item.users || item.owner || profile,
      users: item.users || item.user || item.owner || profile,
      owner: item.owner || item.user || item.users || profile
    };
  });
};

    if (cached && Array.isArray(cached.rows) && (tingoNow() - Number(cached.savedAt || 0)) < TINGO_CACHE_TTL) {
      return cached.rows;
    }

    const rows = await tingoOriginalLoadAllSearchRowsForMode();
    tingoSafeJsonWrite(key, { savedAt: tingoNow(), rows });
    return rows;
  };
}

function tingoEnsureSliderObserver() {
  if (window.__tingoSliderObserver) return window.__tingoSliderObserver;
  window.__tingoSliderObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const wrapper = entry.target;
      const track = wrapper.querySelector('.slides-track');
      const slides = track ? track.querySelectorAll('img.slide') : [];
      if (!track || slides.length <= 1) return;

      function stopSlider() {
        if (wrapper._sliderInterval) {
          clearInterval(wrapper._sliderInterval);
          wrapper._sliderInterval = null;
        }
      }

      function startSlider() {
        if (wrapper._sliderInterval) return;
        let idx = Number(wrapper.dataset.sliderIndex || 0);
        wrapper._sliderInterval = setInterval(() => {
          if (document.hidden) return;
          idx = (idx + 1) % slides.length;
          wrapper.dataset.sliderIndex = String(idx);
          track.style.transform = `translateX(-${idx * 100}%)`;
        }, 2400);
      }

      if (entry.isIntersecting) startSlider();
      else stopSlider();
    });
  }, { root: document.querySelector('.app-container') || null, rootMargin: '160px 0px', threshold: 0.01 });
  return window.__tingoSliderObserver;
}

initCardSliders = function() {
  const observer = tingoEnsureSliderObserver();
  document.querySelectorAll('.card-img-wrapper').forEach(wrapper => {
    if (wrapper.dataset.sliderBound === '1') return;
    wrapper.dataset.sliderBound = '1';
    wrapper.dataset.sliderIndex = '0';
    const track = wrapper.querySelector('.slides-track');
    if (track) track.style.transform = 'translateX(0)';
    observer.observe(wrapper);

    wrapper.addEventListener('mouseenter', () => {
      if (wrapper._sliderInterval) {
        clearInterval(wrapper._sliderInterval);
        wrapper._sliderInterval = null;
      }
    }, { passive: true });

    wrapper.addEventListener('mouseleave', () => {
      observer.unobserve(wrapper);
      observer.observe(wrapper);
    }, { passive: true });
  });
};

const tingoOriginalRenderRooms = renderRooms;
renderRooms = function(items, statusText = "") {
  tingoOriginalRenderRooms(items, statusText);
  tingoInitialFeedPainted = true;

  if (!window.__tingoSkipNextFeedCacheWrite && tingoLastFeedKey && Array.isArray(items)) {

      items: items.slice(0, 48)

const tingoOriginalLoadRooms = loadRooms;
loadRooms = async function(search = "", selectedPlace = null) {
  const seq = ++tingoLoadRoomsSeq;
  const key = tingoCacheKeyForFeed(search, selectedPlace);
  tingoLastFeedKey = key;

  const hasCache = tingoRenderCachedFeed(search, selectedPlace);
  if (!hasCache) tingoShowFeedSkeleton();

  try {
    await tingoOriginalLoadRooms(search, selectedPlace);
  } catch (error) {
    console.error(error);
    if (!hasCache) showAppPopup(error.message || "Unable to load posts right now.", "Network issue");
  } finally {
    if (seq === tingoLoadRoomsSeq) tingoInitialFeedPainted = true;
  }
};

const tingoOriginalLoadFilterOptions = loadFilterOptions;
loadFilterOptions = async function() {
  const cached = tingoSafeJsonRead(TINGO_FILTER_CACHE_KEY);
  const typeSelect = document.getElementById("filterType");
  const brokerageSelect = document.getElementById("filterBrokerage");

  if (cached && (tingoNow() - Number(cached.savedAt || 0)) < TINGO_FILTER_CACHE_TTL) {
    if (typeSelect && cached.typeHtml) typeSelect.innerHTML = cached.typeHtml;
    if (brokerageSelect && cached.brokerageHtml) brokerageSelect.innerHTML = cached.brokerageHtml;
    if (typeof updateFilterUI === "function") updateFilterUI();
  }

  await tingoOriginalLoadFilterOptions();
  tingoSafeJsonWrite(TINGO_FILTER_CACHE_KEY, {
    savedAt: tingoNow(),
    typeHtml: typeSelect ? typeSelect.innerHTML : "",
    brokerageHtml: brokerageSelect ? brokerageSelect.innerHTML : ""
  });
};

const tingoOriginalFetchDatabaseSuggestions = fetchDatabaseSuggestions;
fetchDatabaseSuggestions = async function(searchText) {
  const term = cleanSearchTerm(searchText);
  const key = `${TINGO_SUGGESTION_CACHE_PREFIX}|${activePostMode}|${normalizeSearchKey(term)}|${normalizeSearchKey(getActiveFilters().type || "")}|${normalizeSearchKey(getActiveFilters().brokerage || "")}`;
  const cached = tingoSafeJsonRead(key);
  if (cached && Array.isArray(cached.items) && (tingoNow() - Number(cached.savedAt || 0)) < TINGO_CACHE_TTL) {
    return cached.items;
  }

  const items = await tingoOriginalFetchDatabaseSuggestions(searchText);
  tingoSafeJsonWrite(key, { savedAt: tingoNow(), items });
  return items;
};

function tingoScheduleFeedRefresh() {

function formatListingRent(value) {
  const raw = String(value ?? '').trim();
  if (!raw) return '₹0';
  const numeric = raw.replace(/[^0-9.]/g, '');
  if (numeric && !Number.isNaN(Number(numeric))) {
    return '₹' + Number(numeric).toLocaleString('en-IN', { maximumFractionDigits: 0 });
  }
  if (raw.startsWith('₹') || /[a-zA-Z]/.test(raw)) return raw;
  return `₹${raw}`;
}

function getListingViews(item) {
  const value = item?.views_count ?? item?.view_count ?? item?.views ?? item?.visit_count ?? item?.viewed_count ?? 0;
  const numberValue = Number(value);
  return Number.isFinite(numberValue) && numberValue >= 0 ? Math.round(numberValue) : 0;
}

function getListingBadgeText(item) {
  const brokerage = String(item?.brokerage_type || '').trim().toLowerCase();
  if (!brokerage || brokerage === 'no brokerage' || brokerage === 'no_brokerage' || brokerage.includes('no broker')) {
    return 'INDEPENDENT';
  }
  if (brokerage.includes('owner')) return 'OWNER';
  if (brokerage.includes('broker')) return 'BROKER';
  return String(item?.brokerage_type || 'INDEPENDENT').trim().toUpperCase();
}

function getCompactType(value, fallback = '1 Room ...') {
  const text = cleanSearchTerm(value || fallback);
  if (!text) return fallback;
  return text.length > 18 ? `${text.slice(0, 17).trim()}...` : text;
}

   FINAL RENDER OVERRIDE: desktop original, mobile complete split card.
   ===================================================== */
function tingoIsDesktopFeed() {
  return window.innerWidth >= 900;
}

function tingoFormatMoney(value, fallback = '0') {
  const raw = String(value ?? '').trim();
  if (!raw) return formatListingRent(fallback);
  return formatListingRent(raw);
}

function tingoOwnerName(item, fallback = 'Posted by user') {
  const ownerObj = item?.users || item?.user || item?.owner || {};
  return item?.name || ownerObj?.name || fallback;
}

function tingoBrokerageText(room) {
  const type = String(room?.brokerage_type || '').trim();
  const amount = String(room?.brokerage_amount || '').trim();
  if (!type || type.toLowerCase() === 'no brokerage' || type.toLowerCase().includes('no broker')) return 'No Brokerage';
  if (amount) return `${type}: ${tingoFormatMoney(amount)}`;
  return type;
}

function tingoIsNoBrokerage(room) {
  const type = String(room?.brokerage_type || '').trim().toLowerCase();
  return !type || type === 'no brokerage' || type.includes('no broker');
}

function tingoActionButtons(item, source) {
  const safeId = escapeHtml(item?.id || '');
  const safeUserId = escapeHtml(item?.user_id || '');
  const sourceType = source === 'requirement' ? 'requirement' : 'available';
  let actions = '';

  if (item?.show_contact && item?.contact_number) {
    actions += `<button class="mobile-action-btn call" type="button" onclick="triggerAction(event, 'call', '${safeId}', '${escapeHtml(item.contact_number)}', '${sourceType}')"><span class="material-symbols-rounded">call</span>Call</button>`;
  }

  if (item?.show_whatsapp && item?.whatsapp_number) {
    actions += `<button class="mobile-action-btn whatsapp" type="button" onclick="triggerAction(event, 'wa', '${safeId}', '${escapeHtml(item.whatsapp_number)}', '${sourceType}')"><span class="material-symbols-rounded">chat</span>WhatsApp</button>`;
  }

  if (safeUserId) {
    actions += `<button class="mobile-action-btn message" type="button" onclick="startChat(event, '${safeId}', '${safeUserId}')"><span class="material-symbols-rounded">forum</span>Message</button>`;
  }

  if (!actions) {
    actions = `<button class="mobile-action-btn message" type="button" onclick="event.stopPropagation(); openRoom('${safeId}', '${sourceType === 'requirement' ? 'requirement' : 'available'}')"><span class="material-symbols-rounded">visibility</span>Details</button>`;
  }
  return actions;
}

function tingoLazyDesktopAvailable(room) {
  if (typeof tingoOriginalRenderAvailableCard === 'function') {
    let html = tingoOriginalRenderAvailableCard(room);
    html = html.replace(/<img class="slide"(?![^>]*loading=)/g, '<img class="slide" loading="lazy" decoding="async"');
    html = html.replace(/<img class="owner-avatar"(?![^>]*loading=)/g, '<img class="owner-avatar" loading="lazy" decoding="async"');
    return html;
  }
  return '';
}

function tingoDesktopRequirementCard(req) {
  let actions = '';
  if (req.show_contact && req.contact_number) {
    actions += `<button class="btn-action btn-call" onclick="triggerAction(event, 'call', '${escapeHtml(req.id)}', '${escapeHtml(req.contact_number)}', 'requirement')"><span class="material-symbols-rounded">call</span>Call</button>`;
  }
  if (req.show_whatsapp && req.whatsapp_number) {
    actions += `<button class="btn-action btn-wa" onclick="triggerAction(event, 'wa', '${escapeHtml(req.id)}', '${escapeHtml(req.whatsapp_number)}', 'requirement')"><span class="material-symbols-rounded">chat</span>WhatsApp</button>`;
  }
  actions += `<button class="btn-action btn-chat" onclick="startChat(event, '${escapeHtml(req.id)}', '${escapeHtml(req.user_id)}')"><span class="material-symbols-rounded">forum</span>Chat</button>`;

  const ownerName = tingoOwnerName(req);
  const distanceTag = Number.isFinite(Number(req._distanceKm)) ? `<div class="detail-tag distance-meta"><span class="material-symbols-rounded">near_me</span>${Number(req._distanceKm).toFixed(Number(req._distanceKm) < 10 ? 1 : 0)} km away</div>` : '';

  return `
    <div class="card requirement-card" onclick="openRoom('${escapeHtml(req.id)}', 'requirement')">
      <div class="requirement-hero">
        <div class="requirement-label"><span class="material-symbols-rounded" style="font-size:15px;">person_search</span>Room Needed</div>
        <div class="requirement-vector"><span class="material-symbols-rounded">travel_explore</span></div>
        <div class="title">${escapeHtml(req.title || 'Room requirement')}</div>
        <div class="requirement-desc">${escapeHtml(req.description || 'Looking for a suitable room or roommate.')}</div>
      </div>
      <div class="card-content">
        <div class="owner-name"><span class="material-symbols-rounded">account_circle</span> ${escapeHtml(ownerName)}</div>
        <div class="location"><span class="material-symbols-rounded">location_on</span>${escapeHtml(req.location || 'Preferred location not added')}</div>
        <div class="details-row">
          <div class="detail-tag highlight"><span class="material-symbols-rounded">apartment</span>${escapeHtml(req.type || 'Any type')}</div>
          <div class="detail-tag"><span class="material-symbols-rounded">verified</span>${escapeHtml(req.status || 'pending')}</div>
          <div class="detail-tag posted-meta"><span class="material-symbols-rounded">schedule</span>${escapeHtml(formatPostDate(req))}</div>
          ${distanceTag}
        </div>
        <div class="card-actions">${actions}</div>
      </div>
    </div>
  `;
}

function tingoMobileAvailableCard(room) {
  let imagesArr = [];
  if (room.images && room.images.length > 0) imagesArr = room.images.split(',').map(s => s.trim()).filter(Boolean);
  if (!imagesArr.length) imagesArr = ['https://via.placeholder.com/600x420?text=No+Image'];

  const ownerName = tingoOwnerName(room);
  const titleText = room.title || room.type || 'Room For Rent';
  const locationText = room.location || 'Address not added';
  const rentText = tingoFormatMoney(room.rent || 0);
  const depositText = tingoFormatMoney(room.deposit || 0);
  const categoryText = cleanSearchTerm(room.category || room.type || 'Room');
  const brokerageText = tingoBrokerageText(room);
  const badgeText = getListingBadgeText(room);
  const views = getListingViews(room);
  const slidesHtml = imagesArr.map(src => `<img class="slide" loading="lazy" decoding="async" src="${escapeHtml(src)}" alt="${escapeHtml(titleText)}">`).join('');
  const distancePill = Number.isFinite(Number(room._distanceKm)) ? `<div class="mobile-info-pill"><span class="material-symbols-rounded">near_me</span>${Number(room._distanceKm).toFixed(Number(room._distanceKm) < 10 ? 1 : 0)} km</div>` : '';

  return `
    <div class="card mobile-full-listing-card" onclick="openRoom('${escapeHtml(room.id)}', 'available')">
      <div class="mobile-card-top">
        <div class="mobile-card-thumb card-img-wrapper">
          <div class="slides-track">${slidesHtml}</div>
          <div class="mobile-owner-icon" aria-hidden="true"><span class="material-symbols-rounded">person</span></div>
          <div class="mobile-image-badge">${escapeHtml(badgeText)}</div>
        </div>

        <div class="mobile-card-info">
          <div class="mobile-title-row">
            <div class="mobile-card-title">${escapeHtml(titleText)}</div>
            <div class="mobile-views"><span class="material-symbols-rounded">visibility</span>${escapeHtml(views)}</div>
          </div>

          <div class="mobile-owner-line"><span class="material-symbols-rounded">account_circle</span><span>Uploaded by ${escapeHtml(ownerName)}</span></div>
          <div class="mobile-address-line"><span class="material-symbols-rounded">location_on</span><span class="mobile-address-text">${escapeHtml(locationText)}</span></div>

          <div class="mobile-price-row">
            <div class="mobile-rent-box"><span class="mobile-info-label">Rent</span><span class="mobile-rent-value">${escapeHtml(rentText)}/mo</span></div>
            <div class="mobile-deposit-box"><span class="mobile-info-label">Deposit</span><span class="mobile-deposit-value">${escapeHtml(depositText)}</span></div>
          </div>

          <div class="mobile-info-grid">
            <div class="mobile-info-pill"><span class="material-symbols-rounded">apartment</span>${escapeHtml(categoryText)}</div>
            <div class="mobile-info-pill ${tingoIsNoBrokerage(room) ? 'highlight' : ''}"><span class="material-symbols-rounded">handshake</span>${escapeHtml(brokerageText)}</div>
            ${distancePill}
          </div>
        </div>
      </div>
      <div class="mobile-card-actions">${tingoActionButtons(room, 'available')}</div>
    </div>
  `;
}

function tingoMobileRequirementCard(req) {
  const ownerName = tingoOwnerName(req);
  const titleText = req.title || 'Room Needed';
  const locationText = req.location || 'Preferred address not added';
  const budgetText = tingoFormatMoney(req.budget || req.rent || req.expected_rent || 0);
  const depositText = req.deposit ? tingoFormatMoney(req.deposit) : 'Not added';
  const categoryText = cleanSearchTerm(req.category || req.type || 'Any type');
  const statusText = req.status || 'pending';
  const views = getListingViews(req);
  const distancePill = Number.isFinite(Number(req._distanceKm)) ? `<div class="mobile-info-pill"><span class="material-symbols-rounded">near_me</span>${Number(req._distanceKm).toFixed(Number(req._distanceKm) < 10 ? 1 : 0)} km</div>` : '';

  return `
    <div class="card mobile-full-listing-card" onclick="openRoom('${escapeHtml(req.id)}', 'requirement')">
      <div class="mobile-card-top">
        <div class="mobile-requirement-thumb">
          <div class="mobile-owner-icon" aria-hidden="true"><span class="material-symbols-rounded">person_search</span></div>
          <div class="mobile-requirement-icon"><span class="material-symbols-rounded">travel_explore</span></div>
          <div class="mobile-image-badge">ROOM NEEDED</div>
        </div>

        <div class="mobile-card-info">
          <div class="mobile-title-row">
            <div class="mobile-card-title">${escapeHtml(titleText)}</div>
            <div class="mobile-views"><span class="material-symbols-rounded">visibility</span>${escapeHtml(views)}</div>
          </div>

          <div class="mobile-owner-line"><span class="material-symbols-rounded">account_circle</span><span>Uploaded by ${escapeHtml(ownerName)}</span></div>
          <div class="mobile-address-line"><span class="material-symbols-rounded">location_on</span><span class="mobile-address-text">${escapeHtml(locationText)}</span></div>

          <div class="mobile-price-row">
            <div class="mobile-rent-box"><span class="mobile-info-label">Budget</span><span class="mobile-rent-value">${escapeHtml(budgetText)}</span></div>
            <div class="mobile-deposit-box"><span class="mobile-info-label">Deposit</span><span class="mobile-deposit-value">${escapeHtml(depositText)}</span></div>
          </div>

          <div class="mobile-info-grid">
            <div class="mobile-info-pill"><span class="material-symbols-rounded">apartment</span>${escapeHtml(categoryText)}</div>
            <div class="mobile-info-pill highlight"><span class="material-symbols-rounded">verified</span>${escapeHtml(statusText)}</div>
            ${distancePill}
          </div>
        </div>
      </div>
      <div class="mobile-card-actions">${tingoActionButtons(req, 'requirement')}</div>
    </div>
  `;
}

renderAvailableCard = function(room) {
  return tingoIsDesktopFeed() ? tingoLazyDesktopAvailable(room) : tingoMobileAvailableCard(room);
};

renderRequirementCard = function(req) {
  return tingoIsDesktopFeed() ? tingoDesktopRequirementCard(req) : tingoMobileRequirementCard(req);
};

let tingoLastFeedWasDesktop = tingoIsDesktopFeed();
let tingoResizeRenderTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(tingoResizeRenderTimer);
  tingoResizeRenderTimer = setTimeout(() => {
    const nowDesktop = tingoIsDesktopFeed();
    if (nowDesktop === tingoLastFeedWasDesktop) return;
    tingoLastFeedWasDesktop = nowDesktop;

    const cached = tingoLastFeedKey ? tingoSafeJsonRead(tingoLastFeedKey) : null;
    if (cached && Array.isArray(cached.items)) {
      renderRooms(cached.items, cached.statusText || '');
    } else {
      loadRooms(getCurrentSearchText(), selectedSearchPlace);
    }
  }, 180);
}, { passive: true });

function initSmoothHomePage() {
  tingoBindSmoothNavigationFeedback();
  loadFilterOptions();
  bindFilterEvents();
  setupModeSwitchScroll();
  loadRooms();
  subscribeFeedUpdates();

  const initialUserCheck = JSON.parse(localStorage.getItem("user"));
  if (initialUserCheck) {
    loadNotifications();
    checkNewMessages();
    subscribeNotifications();
    syncOneSignalId(initialUserCheck);
  }
}

/* INIT */
initSmoothHomePage();

/* =========================================
   LIGHT BACKGROUND REFRESH
   Realtime handles new posts; this is only a gentle fallback.
   ========================================= */
setInterval(() => {
  if (document.hidden) return;
  const searchInputValue = document.getElementById("search")?.value || "";
  if (!searchInputValue && !hasActiveFilters()) {
    loadRooms();
  }
  loadNotifications();
  checkNewMessages();
}, 45000); // gentle fallback every 45 sec

<script id="tingo-final-fit-card-script">
(function() {
  function setTextIfFound(selector, text) {
    const el = document.querySelector(selector);
    if (el) el.textContent = text;
  }

  setTextIfFound('#modeAvailableBtn .mode-label', 'Rooms Available');
  setTextIfFound('#modeNeededBtn .mode-label', 'Rooms Required');

  window.updateModeSwitchCompact = function() {
    const wrap = document.getElementById('modeSwitchWrap');
    if (!wrap) return;
    wrap.classList.remove('compact');
  };

  window.tingoFormatMoney = function(value, fallback = '0') {
    const raw = String(value ?? '').trim();
    if (!raw) return formatListingRent(fallback);
    return formatListingRent(raw);
  };

  window.tingoOwnerName = function(item, fallback = 'Posted by user') {
    const ownerObj = item?.users || item?.user || item?.owner || {};
    return item?.name || ownerObj?.name || fallback;
  };

  window.tingoBrokerageText = function(room) {
    const type = String(room?.brokerage_type || '').trim();
    const amount = String(room?.brokerage_amount || '').trim();
    if (!type || type.toLowerCase() === 'no brokerage' || type.toLowerCase().includes('no broker')) return 'No Brokerage';
    if (amount) return `${type}: ${tingoFormatMoney(amount)}`;
    return type;
  };

  window.tingoIsNoBrokerage = function(room) {
    const type = String(room?.brokerage_type || '').trim().toLowerCase();
    return !type || type === 'no brokerage' || type.includes('no broker');
  };

  window.tingoActionButtons = function(item, source) {
    const safeId = escapeHtml(item?.id || '');
    const safeUserId = escapeHtml(item?.user_id || '');
    const sourceType = source === 'requirement' ? 'requirement' : 'available';
    let actions = '';

    if (item?.show_contact && item?.contact_number) {
      actions += `<button class="mobile-action-btn call" type="button" onclick="triggerAction(event, 'call', '${safeId}', '${escapeHtml(item.contact_number)}', '${sourceType}')"><span class="material-symbols-rounded">call</span>Call</button>`;
    }

    if (item?.show_whatsapp && item?.whatsapp_number) {
      actions += `<button class="mobile-action-btn whatsapp" type="button" onclick="triggerAction(event, 'wa', '${safeId}', '${escapeHtml(item.whatsapp_number)}', '${sourceType}')"><span class="material-symbols-rounded">chat</span>WP</button>`;
    }

    if (safeUserId) {
      actions += `<button class="mobile-action-btn message" type="button" onclick="startChat(event, '${safeId}', '${safeUserId}')"><span class="material-symbols-rounded">forum</span>Msg</button>`;
    }

    if (!actions) {
      actions = `<button class="mobile-action-btn message" type="button" onclick="event.stopPropagation(); openRoom('${safeId}', '${sourceType === 'requirement' ? 'requirement' : 'available'}')"><span class="material-symbols-rounded">visibility</span>Details</button>`;
    }
    return actions;
  };

  function buildMobileField(label, value, extraClass = '') {
    const safeValue = String(value ?? '').trim() || 'Not added';
    const fieldKey = String(label || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    const fieldClass = fieldKey ? ` field-${fieldKey}` : '';
    return `<div class="mobile-field ${extraClass}${fieldClass}"><span class="mobile-field-label">${escapeHtml(label)}</span><span class="mobile-field-value ${extraClass.includes('price-field') ? 'price' : ''} ${extraClass.includes('muted-field') ? 'muted' : ''}">${escapeHtml(safeValue)}</span></div>`;
  }

  window.tingoMobileAvailableCard = function(room) {
    let imagesArr = [];
    if (room.images && room.images.length > 0) imagesArr = room.images.split(',').map(s => s.trim()).filter(Boolean);
    if (!imagesArr.length) imagesArr = ['https://via.placeholder.com/600x420?text=No+Image'];

    const ownerName = tingoOwnerName(room);
    const titleText = room.title || room.type || 'Room For Rent';
    const locationText = room.location || 'Address not added';
    const rentText = `${tingoFormatMoney(room.rent || 0)}/mo`;
    const depositText = room.deposit ? tingoFormatMoney(room.deposit) : 'Not added';
    const categoryText = cleanSearchTerm(room.category || room.type || 'Room');
    const brokerageText = tingoBrokerageText(room);
    const views = getListingViews(room);
    const slidesHtml = imagesArr.map(src => `<img class="slide" loading="lazy" decoding="async" src="${escapeHtml(src)}" alt="${escapeHtml(titleText)}">`).join('');
    const distanceField = Number.isFinite(Number(room._distanceKm)) ? buildMobileField('Distance', `${Number(room._distanceKm).toFixed(Number(room._distanceKm) < 10 ? 1 : 0)} km`, 'full muted-field') : '';

    return `
      <div class="card mobile-full-listing-card" onclick="openRoom('${escapeHtml(room.id)}', 'available')">
        <div class="mobile-card-top">
          <div class="mobile-card-thumb card-img-wrapper">
            <div class="slides-track">${slidesHtml}</div>
          </div>

          <div class="mobile-card-info">
            <div class="mobile-title-row">
              <div class="mobile-card-title">${escapeHtml(titleText)}</div>
              <div class="mobile-views"><span class="material-symbols-rounded">visibility</span>${escapeHtml(views)}</div>
            </div>

            <div class="mobile-owner-line"><span class="material-symbols-rounded">account_circle</span><span>Uploaded by ${escapeHtml(ownerName)}</span></div>
            <div class="mobile-address-line"><span class="material-symbols-rounded">location_on</span><span class="mobile-address-text">${escapeHtml(locationText)}</span></div>

            <div class="mobile-field-list">
              ${buildMobileField('Rent', rentText, 'price-field')}
              ${buildMobileField('Deposit', depositText, 'muted-field')}
              ${buildMobileField('Category', categoryText, 'full')}
              ${buildMobileField('Brokerage', brokerageText, `full ${tingoIsNoBrokerage(room) ? 'no-broker' : ''}`)}
              ${distanceField}
            </div>

            <div class="mobile-card-actions">${tingoActionButtons(room, 'available')}</div>
          </div>
        </div>
      </div>
    `;
  };

  window.tingoMobileRequirementCard = function(req) {
    const ownerName = tingoOwnerName(req);
    const titleText = req.title || 'Room Required';
    const locationText = req.location || 'Preferred address not added';
    const budgetText = req.budget || req.rent || req.expected_rent ? tingoFormatMoney(req.budget || req.rent || req.expected_rent) : 'Not added';
    const depositText = req.deposit ? tingoFormatMoney(req.deposit) : 'Not added';
    const categoryText = cleanSearchTerm(req.category || req.type || 'Any type');
    const statusText = req.status || 'active';
    const views = getListingViews(req);
    const distanceField = Number.isFinite(Number(req._distanceKm)) ? buildMobileField('Distance', `${Number(req._distanceKm).toFixed(Number(req._distanceKm) < 10 ? 1 : 0)} km`, 'full muted-field') : '';

    return `
      <div class="card mobile-full-listing-card" onclick="openRoom('${escapeHtml(req.id)}', 'requirement')">
        <div class="mobile-card-top">
          <div class="mobile-requirement-thumb">
            <div class="mobile-requirement-icon"><span class="material-symbols-rounded">person_search</span></div>
          </div>

          <div class="mobile-card-info">
            <div class="mobile-title-row">
              <div class="mobile-card-title">${escapeHtml(titleText)}</div>
              <div class="mobile-views"><span class="material-symbols-rounded">visibility</span>${escapeHtml(views)}</div>
            </div>

            <div class="mobile-owner-line"><span class="material-symbols-rounded">account_circle</span><span>Uploaded by ${escapeHtml(ownerName)}</span></div>
            <div class="mobile-address-line"><span class="material-symbols-rounded">location_on</span><span class="mobile-address-text">${escapeHtml(locationText)}</span></div>

            <div class="mobile-field-list">
              ${buildMobileField('Budget', budgetText, 'price-field')}
              ${buildMobileField('Deposit', depositText, 'muted-field')}
              ${buildMobileField('Category', categoryText, 'full')}
              ${buildMobileField('Status', statusText, 'full no-broker')}
              ${distanceField}
            </div>

            <div class="mobile-card-actions">${tingoActionButtons(req, 'requirement')}</div>
          </div>
        </div>
      </div>
    `;
  };

  window.renderAvailableCard = function(room) {
    return tingoIsDesktopFeed() ? tingoLazyDesktopAvailable(room) : tingoMobileAvailableCard(room);
  };

  window.renderRequirementCard = function(req) {
    return tingoIsDesktopFeed() ? tingoDesktopRequirementCard(req) : tingoMobileRequirementCard(req);
  };

  async function fetchPostOptionRows() {
    const active = await db.from('room_posts').select('type,brokerage_type,status').eq('status', 'active').limit(1000);
    if (!active.error) return active;
    return await db.from('room_posts').select('type,brokerage_type').limit(1000);
  }

  async function fetchRequirementOptionRows() {
    const withStatus = await db.from('room_requirements').select('type,status').limit(1000);
    if (!withStatus.error) return withStatus;
    return await db.from('room_requirements').select('type').limit(1000);
  }

  function isActiveOptionRow(row) {
    const status = String(row?.status || 'active').trim().toLowerCase();
    return !status || status === 'active' || (!status.includes('inactive') && !status.includes('disabled') && !status.includes('rejected'));
  }

  function tingoOptionExists(select, value) {
    if (!select || !value) return false;
    return Array.from(select.options || []).some(option => option.value === value);
  }

  window.updateFilterUI = function() {
    const filters = getActiveFilters();
    const typeFilter = document.getElementById('filterType');
    const brokerageFilter = document.getElementById('filterBrokerage');
    const clearBtn = document.getElementById('clearFilters');

    typeFilter?.classList.toggle('filter-active', Boolean(filters.type));

    if (brokerageFilter) {
      if (activePostMode === 'needed') {
        brokerageFilter.value = '';
        brokerageFilter.classList.add('hidden-for-mode');
        brokerageFilter.classList.remove('filter-active');
      } else {
        brokerageFilter.classList.remove('hidden-for-mode');
        brokerageFilter.classList.toggle('filter-active', Boolean(filters.brokerage));
      }
    }

    const hasFilters = Boolean((typeFilter && typeFilter.value) || (activePostMode === 'available' && brokerageFilter && brokerageFilter.value));
    clearBtn?.classList.toggle('visible', hasFilters);
  };

  window.loadFilterOptions = async function() {
    const typeSelect = document.getElementById('filterType');
    const brokerageSelect = document.getElementById('filterBrokerage');
    if (!typeSelect) return;

    const selectedType = typeSelect.value;
    const selectedBrokerage = brokerageSelect ? brokerageSelect.value : '';

    if (activePostMode === 'needed') {
      const requirements = await fetchRequirementOptionRows();
      if (requirements.error) console.warn('Requirement type option loading error', requirements.error);
      const rows = (requirements.data || []).filter(isActiveOptionRow);
      fillSelectOptions('filterType', rows.map(row => row.type), 'All required types');
      if (tingoOptionExists(typeSelect, selectedType)) typeSelect.value = selectedType;
      if (brokerageSelect) brokerageSelect.value = '';
      updateFilterUI();
      return;
    }

    const posts = await fetchPostOptionRows();
    if (posts.error) console.warn('Room post type option loading error', posts.error);
    const rows = (posts.data || []).filter(isActiveOptionRow);
    fillSelectOptions('filterType', rows.map(row => row.type), 'All room types');
    fillSelectOptions('filterBrokerage', rows.map(row => row.brokerage_type || 'No Brokerage'), 'All brokerage');
    if (tingoOptionExists(typeSelect, selectedType)) typeSelect.value = selectedType;
    if (brokerageSelect && tingoOptionExists(brokerageSelect, selectedBrokerage)) brokerageSelect.value = selectedBrokerage;
    updateFilterUI();
  };

  window.setPostMode = async function(mode) {
    activePostMode = mode === 'needed' ? 'needed' : 'available';
    document.getElementById('modeAvailableBtn')?.classList.toggle('active', activePostMode === 'available');
    document.getElementById('modeNeededBtn')?.classList.toggle('active', activePostMode === 'needed');

    const typeFilter = document.getElementById('filterType');
    const brokerageFilter = document.getElementById('filterBrokerage');
    if (typeFilter) typeFilter.value = '';
    if (brokerageFilter) brokerageFilter.value = '';

    selectedSearchPlace = null;
    hideSuggestionBox();
    if (typeof tingoClearFeedCaches === 'function') tingoClearFeedCaches();
    try { localStorage.removeItem('tingo_filter_html_v3'); } catch (e) {}
    await loadFilterOptions();
    loadRooms(getCurrentSearchText());
  };

  const originalBindFilterEvents = window.bindFilterEvents;
  window.bindFilterEvents = function() {
    if (originalBindFilterEvents && !document.body.dataset.finalFilterBound) {
      originalBindFilterEvents();
      document.body.dataset.finalFilterBound = '1';
    }
    ['filterType', 'filterBrokerage'].forEach(id => {
      const element = document.getElementById(id);
      if (!element || element.dataset.finalBound === '1') return;
      element.dataset.finalBound = '1';
      element.addEventListener('change', () => {
        selectedSearchPlace = null;
        hideSuggestionBox();
        updateFilterUI();
        if (typeof tingoClearFeedCaches === 'function') tingoClearFeedCaches();
        loadRooms(getCurrentSearchText());
      });
    });
  };

  function finalRefreshVisibleFeed() {
    updateModeSwitchCompact();
    loadFilterOptions().finally(() => {
      if (typeof tingoClearFeedCaches === 'function') tingoClearFeedCaches();
      loadRooms(getCurrentSearchText(), selectedSearchPlace);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', finalRefreshVisibleFeed, { once: true });
  } else {
    setTimeout(finalRefreshVisibleFeed, 60);
  }
})();
</script>

<script id="tingo-scroll-direction-polish-update">
(function() {
  let lastScrollTop = 0;
  let ticking = false;
  let revealUntil = 0;

  function scrollRoot() {
    if (window.innerWidth >= 900) return document.scrollingElement || document.documentElement;
    return document.querySelector('.app-container') || document.scrollingElement || document.documentElement;
  }

  function currentScrollTop() {
    const root = scrollRoot();
    if (root === document.scrollingElement || root === document.documentElement || root === document.body) {
      return window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
    }
    return root.scrollTop || 0;
  }

  function applyModeSwitchVisibility(forceShow) {
    const wrap = document.getElementById('modeSwitchWrap');
    if (!wrap) return;

    if (window.innerWidth >= 900) {
      wrap.classList.remove('compact', 'switch-hidden');
      return;
    }

    const now = Date.now();
    const top = currentScrollTop();
    const diff = top - lastScrollTop;

    if (forceShow || top <= 24 || diff < -1) {
      wrap.classList.remove('compact', 'switch-hidden');
      revealUntil = now + 420;
    } else if (top > 92 && diff > 2 && now > revealUntil) {
      wrap.classList.add('switch-hidden');
      wrap.classList.add('compact');
    }

    lastScrollTop = Math.max(0, top);
  }

  function requestUpdate(forceShow) {
    if (forceShow) {
      applyModeSwitchVisibility(true);
      return;
    }
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      ticking = false;
      applyModeSwitchVisibility(false);
    });
  }

  window.updateModeSwitchCompact = function() {
    requestUpdate(false);
  };

  function bindScrollWatch() {
    const app = document.querySelector('.app-container');
    lastScrollTop = currentScrollTop();
    if (app && app.dataset.tingoScrollPolishBound !== '1') {
      app.dataset.tingoScrollPolishBound = '1';
      app.addEventListener('scroll', () => requestUpdate(false), { passive: true });
      app.addEventListener('touchstart', () => requestUpdate(true), { passive: true });
    }
    if (document.body.dataset.tingoScrollPolishWindowBound !== '1') {
      document.body.dataset.tingoScrollPolishWindowBound = '1';
      window.addEventListener('scroll', () => requestUpdate(false), { passive: true });
      window.addEventListener('resize', () => requestUpdate(true), { passive: true });
    }
    requestUpdate(true);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bindScrollWatch, { once: true });
  } else {
    bindScrollWatch();
  }
})();
</script>
