<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TingoRooms</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

<link rel="icon" href="https://i.ibb.co/N2ZhwrRn/Gemini-Generated-Image-h4mxnvh4mxnvh4mx-2.gif">

<style>

:root {
  --primary: #4F46E5;
  --primary-dark: #3730A3;
  --primary-gradient: linear-gradient(135deg, #7C3AED 0%, #4F46E5 55%, #06B6D4 100%);
  --primary-light: #EEF2FF;
  --primary-glow: rgba(79, 70, 229, 0.28);
  --accent: #F97316;
  --accent-soft: #FFF7ED;
  --success: #16A34A;
  --success-soft: #DCFCE7;
  --bg: #F8FAFC;
  --surface: #FFFFFF;
  --text-main: #0F172A;
  --text-muted: #64748B;
  --border: #E2E8F0;
  --radius: 22px;
  --safe-bottom: 96px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  height: 100%;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  font-family: 'Inter', sans-serif;
  color: var(--text-main);
  background:
    radial-gradient(circle at 10% 8%, rgba(124, 58, 237, 0.18), transparent 28%),
    radial-gradient(circle at 92% 18%, rgba(14, 165, 233, 0.16), transparent 25%),
    radial-gradient(circle at 50% 95%, rgba(249, 115, 22, 0.14), transparent 32%),
    #E2E8F0;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

button,
input {
  font: inherit;
}

button {
  -webkit-tap-highlight-color: transparent;
}

/* MOBILE APP FRAME */
.app-container {
  width: 100%;
  max-width: 430px;
  height: 100vh;
  height: 100dvh;
  margin: 0 auto;
  position: relative;
  isolation: isolate;
  overflow-x: hidden;
  overflow-y: auto;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.94) 0%, rgba(248,250,252,0.98) 44%, #F8FAFC 100%);
  box-shadow: 0 24px 70px rgba(15, 23, 42, 0.16);
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.app-container::before,
.app-container::after {
  content: '';
  position: absolute;
  z-index: -1;
  pointer-events: none;
  filter: blur(0.2px);
}

.app-container::before {
  width: 180px;
  height: 180px;
  top: -74px;
  right: -66px;
  border-radius: 46% 54% 60% 40%;
  background: linear-gradient(135deg, rgba(124, 58, 237, 0.22), rgba(6, 182, 212, 0.14));
}

.app-container::after {
  width: 130px;
  height: 130px;
  left: -62px;
  top: 156px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(249, 115, 22, 0.16), rgba(250, 204, 21, 0.10));
}

@media (min-width: 520px) {
  body {
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 22px 0;
  }

  .app-container {
    height: calc(100vh - 44px);
    height: calc(100dvh - 44px);
    border-radius: 34px;
    border: 1px solid rgba(255,255,255,0.82);
  }
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 12px 12px 10px;
  background: rgba(248, 250, 252, 0.86);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border-bottom: 1px solid rgba(226, 232, 240, 0.76);
}

.logo {
  flex: 0 0 auto;
  width: 42px;
  height: 42px;
  object-fit: cover;
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(79, 70, 229, 0.14);
  border: 2px solid rgba(255,255,255,0.8);
}

.search-box {
  flex: 1;
  min-width: 0;
  position: relative;
}

.search-box input {
  width: 100%;
  height: 42px;
  padding: 0 14px 0 40px;
  border-radius: 999px;
  border: 1px solid rgba(226, 232, 240, 0.95);
  background: rgba(255, 255, 255, 0.86);
  color: var(--text-main);
  font-size: 13px;
  font-weight: 500;
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 8px 18px rgba(15, 23, 42, 0.04);
  transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
}

.search-box input::placeholder {
  color: #94A3B8;
}

.search-box input:focus {
  border-color: rgba(79, 70, 229, 0.42);
  background: #FFFFFF;
  box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.08), 0 10px 20px rgba(79, 70, 229, 0.08);
}

.search-box .material-symbols-rounded {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: #94A3B8;
  font-size: 20px;
  pointer-events: none;
  transition: color 0.22s ease;
}

.search-box:focus-within .material-symbols-rounded {
  color: var(--primary);
}

.notification {
  flex: 0 0 auto;
  position: relative;
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  color: var(--primary-dark);
  background: #FFFFFF;
  border: 1px solid rgba(226, 232, 240, 0.95);
  box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
  cursor: pointer;
  transition: transform 0.18s ease, background 0.18s ease;
}

.notification:active {
  transform: scale(0.94);
  background: var(--primary-light);
}

.notification .badge {
  position: absolute;
  top: 8px;
  right: 9px;
  width: 9px;
  height: 9px;
  display: none;
  border-radius: 50%;
  background: #EF4444;
  border: 2px solid #FFFFFF;
  animation: pulse 1.7s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.38); }
  70% { box-shadow: 0 0 0 7px rgba(239, 68, 68, 0); }
  100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
}

/* ROOM LIST - mobile shows one property below another */
.main-content {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  width: 100%;
  padding: 12px 12px calc(var(--safe-bottom) + 14px);
}

.card {
  width: 100%;
  min-width: 0;
  overflow: hidden;
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.94);
  border: 1px solid rgba(226, 232, 240, 0.84);
  box-shadow: 0 12px 28px rgba(15, 23, 42, 0.07);
  cursor: pointer;
  transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.22s ease;
}

.card:active {
  transform: scale(0.97);
  box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
}

/* Decreased image height to make cards compact vertically */
.card-img-wrapper {
  position: relative;
  width: 100%;
  height: clamp(110px, 32vw, 130px);
  overflow: hidden;
  background:
    linear-gradient(135deg, rgba(79, 70, 229, 0.12), rgba(14, 165, 233, 0.10)),
    #E2E8F0;
}

.card-img-wrapper img,
.card-img-wrapper img.slide {
  flex: 0 0 100%;
  width: 100%;
  height: 100%;
  object-fit: cover; /* Ensures fully visible and auto fit */
  display: block;
}

.card-img-wrapper .slides-track {
  display: flex;
  width: 100%;
  height: 100%;
  transition: transform 0.55s ease;
  will-change: transform;
}

.card-img-wrapper::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 58%;
  background: linear-gradient(to top, rgba(15, 23, 42, 0.62), rgba(15, 23, 42, 0.02));
  pointer-events: none;
}

.price-badge {
  position: absolute;
  left: 8px;
  bottom: 8px;
  z-index: 2;
  max-width: calc(100% - 16px);
  padding: 5px 9px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.92);
  color: #0F172A;
  border: 1px solid rgba(255,255,255,0.7);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 6px 16px rgba(15, 23, 42, 0.18);
  font-size: 13px;
  font-weight: 800;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Reduced padding for compact cards */
.card-content {
  padding: 8px 10px;
}

.title {
  margin-bottom: 4px;
  color: var(--text-main);
  font-size: 13px;
  font-weight: 800;
  line-height: 1.25;
  letter-spacing: -0.02em;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.owner-name {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 6px;
  min-width: 0;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.owner-name .material-symbols-rounded {
  font-size: 15px;
}

.owner-avatar {
  width: 20px;
  height: 20px;
  flex: 0 0 auto;
  border-radius: 50%;
  object-fit: cover;
  border: 1.5px solid #FFFFFF;
  box-shadow: 0 2px 6px rgba(15, 23, 42, 0.12);
}

.location {
  display: flex;
  align-items: flex-start;
  gap: 4px;
  margin-bottom: 6px;
  min-height: auto;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.location .material-symbols-rounded {
  font-size: 15px;
  color: var(--primary);
  vertical-align: -3px;
}

.details-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 6px;
}

.detail-tag {
  max-width: 100%;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 4px 6px;
  border-radius: 999px;
  background: #F1F5F9;
  color: #475569;
  font-size: 10.5px;
  font-weight: 700;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.detail-tag.highlight {
  color: #047857;
  background: #ECFDF5;
}

.detail-tag .material-symbols-rounded {
  flex: 0 0 auto;
  font-size: 13px;
}

.card-actions {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 5px;
  margin-top: 6px;
  padding-top: 8px;
  border-top: 1px solid rgba(226, 232, 240, 0.82);
}

.btn-action {
  min-width: 0;
  min-height: 32px;
  padding: 6px 4px;
  border: 0;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.18s ease, filter 0.18s ease;
}

.btn-action .material-symbols-rounded {
  font-size: 15px !important;
}

.btn-action:active {
  transform: scale(0.94);
}

.btn-call,
.btn-wa {
  color: var(--success);
  background: var(--success-soft);
}

.btn-chat {
  grid-column: 1 / -1;
  color: #FFFFFF;
  background: var(--primary-gradient);
  box-shadow: 0 8px 16px var(--primary-glow);
}

.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 70px 18px;
  color: var(--text-muted);
}

/* BOTTOM NAVIGATION */
.bottom-nav {
  position: fixed;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  z-index: 1000;
  width: 100%;
  max-width: 430px;
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  gap: 2px;
  padding: 10px 10px max(16px, env(safe-area-inset-bottom));
  border-top: 1px solid rgba(226, 232, 240, 0.82);
  border-radius: 24px 24px 0 0;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 -14px 34px rgba(15, 23, 42, 0.08);
}

.nav-item {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  color: #94A3B8;
  font-size: 10.5px;
  font-weight: 800;
  cursor: pointer;
  position: relative;
  transition: color 0.22s ease, transform 0.18s ease;
}

.nav-item:active {
  transform: scale(0.94);
}

.nav-item.active {
  color: var(--primary);
}

/* Enlarged icon wrapper and icon size */
.nav-item .icon-wrapper {
  position: relative;
  min-width: 46px;
  height: 32px;
  padding: 3px 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  transition: background 0.22s ease;
}

.nav-item.active .icon-wrapper {
  background: var(--primary-light);
}

.nav-item .material-symbols-rounded {
  font-size: 28px;
}

.nav-item.post-btn {
  margin-top: -18px;
}

/* Enlarged Add Post Button */
.nav-item.post-btn .material-symbols-rounded {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 58px;
  height: 58px;
  margin-bottom: 0;
  border-radius: 20px;
  color: #FFFFFF;
  background: var(--primary-gradient);
  border: 5px solid #FFFFFF;
  box-shadow: 0 14px 24px var(--primary-glow);
  font-size: 34px;
}

.nav-item.post-btn span:last-child {
  margin-top: 1px;
  color: var(--primary);
}

#msgBadge {
  position: absolute;
  top: -5px;
  right: -6px;
  min-width: 18px;
  height: 18px;
  padding: 0 4px;
  border-radius: 999px;
  background: #EF4444;
  color: #FFFFFF;
  border: 2px solid #FFFFFF;
  box-shadow: 0 4px 10px rgba(239, 68, 68, 0.32);
  font-size: 10px;
  line-height: 14px;
  text-align: center;
  font-weight: 900;
}

/* LIVE LOCATION SUGGESTIONS */
.search-suggestions {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: 0;
  z-index: 1400;
  display: none;
  max-height: 260px;
  overflow-y: auto;
  padding: 6px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.98);
  border: 1px solid rgba(226, 232, 240, 0.95);
  box-shadow: 0 18px 38px rgba(15, 23, 42, 0.15);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}

.search-suggestions.show {
  display: block;
}

.suggestion-item {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 10px;
  border-radius: 14px;
  cursor: pointer;
  transition: background 0.18s ease, transform 0.18s ease;
}

.suggestion-item:hover,
.suggestion-item:active {
  background: var(--primary-light);
}

.suggestion-item .material-symbols-rounded {
  position: static;
  transform: none;
  color: var(--primary);
  font-size: 20px;
  flex: 0 0 auto;
}

.suggestion-main {
  color: var(--text-main);
  font-size: 13px;
  font-weight: 800;
  line-height: 1.2;
}

.suggestion-sub {
  margin-top: 2px;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  line-height: 1.25;
}

.suggestion-empty {
  padding: 12px;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 700;
}

.suggestion-section-title {
  padding: 7px 10px 5px;
  color: #94A3B8;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.search-status {
  grid-column: 1 / -1;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 10px 12px;
  border-radius: 16px;
  background: #EEF2FF;
  color: #3730A3;
  font-size: 12px;
  font-weight: 700;
  line-height: 1.35;
  border: 1px solid rgba(165, 180, 252, 0.55);
}

.search-status .material-symbols-rounded {
  font-size: 18px;
  flex: 0 0 auto;
}

/* SEPARATE PROPERTY FILTERS */
.filter-bar {
  position: sticky;
  top: 65px;
  z-index: 950;
  display: flex;
  gap: 8px;
  width: 100%;
  padding: 8px 12px 10px;
  background: rgba(248, 250, 252, 0.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(226, 232, 240, 0.65);
  overflow-x: auto;
  scrollbar-width: none;
}

.filter-bar::-webkit-scrollbar {
  display: none;
}

.filter-select,
.filter-reset {
  flex: 0 0 auto;
  height: 36px;
  border: 1px solid rgba(226, 232, 240, 0.95);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.94);
  color: var(--text-main);
  box-shadow: 0 8px 16px rgba(15, 23, 42, 0.04);
  font-size: 12px;
  font-weight: 800;
  outline: none;
}

.filter-select {
  max-width: 138px;
  padding: 0 30px 0 12px;
  cursor: pointer;
}

.filter-reset {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 0 12px;
  color: var(--primary);
  cursor: pointer;
}

.filter-reset .material-symbols-rounded {
  font-size: 16px;
}

.filter-select:focus,
.filter-reset:active {
  border-color: rgba(79, 70, 229, 0.42);
  background: #FFFFFF;
  box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.08);
}

@media (min-width: 900px) {
  .filter-bar {
    top: 83px;
    padding: 10px 40px;
    gap: 12px;
  }

  .filter-select,
  .filter-reset {
    height: 40px;
    font-size: 13px;
  }

  .filter-select {
    max-width: 180px;
  }

  .panel-open .filter-bar {
    margin-right: 30%;
    width: 70%;
  }

  .nav-left .filter-bar {
    margin-right: 120px;
    width: calc(100% - 120px);
  }

  .panel-open.nav-left .filter-bar {
    margin-right: 0;
    margin-left: 30%;
    width: 70%;
  }
}

/* NOTIFICATION PANEL - keeps your existing inline JS behavior, improves the visual */
#notificationPanel {
  border-radius: 26px 0 0 26px;
}

#notificationList > div {
  margin: 8px 10px;
  border-radius: 16px;
  border: 1px solid rgba(226, 232, 240, 0.85);
}

/* DESKTOP OVERRIDE: strict reset to keep desktop layout exactly as it was */
@media (min-width: 900px) {
  .side-panel {
    display: none;
    position: fixed;
    top: 22px;
    right: 22px;
    bottom: 22px;
    width: min(420px, 34vw);
    max-width: 420px;
    overflow: hidden;
    z-index: 1500;
    border-radius: 30px;
    background: var(--surface);
    border: 1px solid rgba(226, 232, 240, 0.9);
    box-shadow: 0 24px 70px rgba(15, 23, 42, 0.18);
  }

  .side-panel .panel-close {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 1510;
    width: 36px;
    height: 36px;
    border: 0;
    border-radius: 50%;
    color: var(--text-muted);
    background: rgba(255,255,255,0.9);
    box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
    cursor: pointer;
  }

  .side-panel iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  body {
    display: block;
    padding: 0;
    background-color: #E2E8F0;
    min-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
  }

  .app-container {
    max-width: none;
    width: 100%;
    height: auto;
    min-height: 100vh;
    margin: 0;
    border-radius: 0;
    border: 0;
    box-shadow: none;
    background: var(--bg);
    overflow-y: auto;
  }

  .app-container::before,
  .app-container::after {
    display: none;
  }

  .header {
    padding: 20px 40px;
    width: 100%;
    margin: 0;
    max-width: none;
    gap: 16px;
  }

  .search-box input {
    height: auto;
    padding: 12px 16px 12px 44px;
    font-size: 14px;
  }

  .main-content {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 24px;
    padding: 24px 24px calc(var(--safe-bottom) + 20px) 24px;
    width: 100%;
    margin: 0;
  }

  .card {
    margin: 0;
    border-radius: 0;
  }

  .card-img-wrapper {

/* SMOOTH EXPERIENCE UPDATE: faster paint, softer tap/scroll, low layout shift */
html {
  scroll-behavior: smooth;
}

.app-container,
.main-content,
.search-suggestions,
#notificationPanel {
  overscroll-behavior: contain;
}

.card {
  contain: layout paint style;
  content-visibility: auto;
  contain-intrinsic-size: 320px 420px;
  transform: translateZ(0);
  will-change: transform;
}

.card-img-wrapper img,
.card-img-wrapper img.slide,
.owner-avatar,
.logo {
  transform: translateZ(0);
  backface-visibility: hidden;
}

.card.preparing-open {
  transform: scale(0.985);
  opacity: 0.92;
}

.feed-skeleton-card {
  width: 100%;
  overflow: hidden;
  border-radius: var(--radius);
  background: rgba(255,255,255,0.94);
  border: 1px solid rgba(226,232,240,0.84);
  box-shadow: 0 12px 28px rgba(15,23,42,0.06);
}

.feed-skeleton-img {
  height: clamp(185px, 56vw, 230px);
  background: linear-gradient(90deg, #E2E8F0 0%, #F1F5F9 45%, #E2E8F0 100%);
  background-size: 220% 100%;
  animation: feedShimmer 1.1s linear infinite;
}

.feed-skeleton-body {
  padding: 12px;
}

.feed-skeleton-line {
  height: 12px;
  margin-bottom: 10px;
  border-radius: 999px;
  background: linear-gradient(90deg, #E2E8F0 0%, #F8FAFC 45%, #E2E8F0 100%);
  background-size: 220% 100%;
  animation: feedShimmer 1.1s linear infinite;
}

.feed-skeleton-line.short { width: 46%; }
.feed-skeleton-line.medium { width: 68%; }
.feed-skeleton-line.long { width: 88%; }

@keyframes feedShimmer {
  from { background-position: 220% 0; }
  to { background-position: -220% 0; }
}

.instant-cache-flash {
  animation: instantCacheIn 0.18s ease both;
}

@keyframes instantCacheIn {
  from { opacity: 0.72; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
  }
}

<script>

/* Default avatar helper (gender-aware) */
function getDefaultAvatar(gender) {

  const female = 'https://i.ibb.co/SXCj3b1q/femaleavt.png';

/* LOCATION SEARCH SUGGESTIONS + NEARBY LOCATION HELPERS */
const LOCATION_CONTEXT = "Pune, Maharashtra, India";
let selectedSearchPlace = null;
let suggestionRequestId = 0;
let searchTimeout;
let suggestionTimeout;
let activePostMode = "available";
let modeSwitchLastScroll = 0;
let modeSwitchExpandedUntil = 0;

function getCurrentSearchText() {
  const input = document.getElementById("search");
  return input ? input.value.trim() : "";
}

function getActiveFilters() {
  const type = document.getElementById("filterType")?.value || "";
  const brokerage = document.getElementById("filterBrokerage")?.value || "";
  return { type, brokerage };
}

function hasActiveFilters() {
  const filters = getActiveFilters();
  return Boolean(filters.type || filters.brokerage);
}

function applyFiltersToQuery(query) {
  const filters = getActiveFilters();

  if (filters.type) {
    query = query.ilike("type", `%${filters.type}%`);
  }

  if (filters.brokerage) {
    query = query.ilike("brokerage_type", `%${filters.brokerage}%`);
  }

  return query;
}

function roomMatchesActiveFilters(room) {
  const filters = getActiveFilters();
  if (filters.type && !includesText(room.type, filters.type)) return false;
  if (filters.brokerage && !includesText(room.brokerage_type, filters.brokerage)) return false;
  return true;
}

function normalizeOptionText(value) {
  return cleanSearchTerm(value);
}

function fillSelectOptions(selectId, values, defaultLabel) {
  const select = document.getElementById(selectId);
  if (!select) return;

  const current = select.value;
  const uniqueValues = [...new Set((values || [])
    .map(normalizeOptionText)
    .filter(Boolean)
  )].sort((a, b) => a.localeCompare(b));

  select.innerHTML = `<option value="">${defaultLabel}</option>` + uniqueValues
    .map(value => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`)
    .join("");

  if (current && uniqueValues.includes(current)) {
    select.value = current;
  }
}

async function loadFilterOptions() {
  const { data, error } = await db
    .from("room_posts")
    .select("type, brokerage_type")
    .eq("status", "active")
    .limit(1000);

  if (error) {
    console.warn("Filter option loading error", error);
    return;
  }

  fillSelectOptions("filterType", (data || []).map(room => room.type), "All types");
  fillSelectOptions("filterBrokerage", (data || []).map(room => room.brokerage_type || "No Brokerage"), "All brokerage");
}

function bindFilterEvents() {
  ["filterType", "filterBrokerage"].forEach(id => {
    const element = document.getElementById(id);
    if (!element) return;
    element.addEventListener("change", () => {
      selectedSearchPlace = null;
      hideSuggestionBox();
      loadRooms(getCurrentSearchText());
    });
  });

  const clearBtn = document.getElementById("clearFilters");
  if (clearBtn) {
    clearBtn.addEventListener("click", () => {
      ["filterType", "filterBrokerage"].forEach(id => {
        const element = document.getElementById(id);
        if (element) element.value = "";
      });
      selectedSearchPlace = null;
      loadRooms(getCurrentSearchText());
    });
  }
}

function cleanSearchTerm(value) {
  return String(value || "")
    .replace(/[,%()]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function includesText(value, searchText) {
  return String(value || "").toLowerCase().includes(String(searchText || "").toLowerCase());
}

function getPlaceLabel(place) {
  const address = place.address || {};
  return address.suburb || address.neighbourhood || address.quarter || address.city_district || address.village || address.town || address.city || place.name || String(place.display_name || "").split(",")[0] || "Location";
}

function getPlaceSubLabel(place) {
  const address = place.address || {};
  const parts = [address.city || address.town || address.county, address.state].filter(Boolean);
  return parts.length ? parts.join(", ") : (place.display_name || LOCATION_CONTEXT);
}

function showSuggestionBox(html) {
  const box = document.getElementById("searchSuggestions");
  if (!box) return;
  box.innerHTML = html;
  box.classList.add("show");
}

function hideSuggestionBox() {
  const box = document.getElementById("searchSuggestions");
  if (!box) return;
  box.classList.remove("show");
}

function buildDatabaseSuggestions(rows, searchText) {
  const suggestions = [];
  const seen = new Set();

  function add(label, subLabel, icon, value) {
    const cleanLabel = cleanSearchTerm(label);
    if (!cleanLabel) return;
    const key = `${subLabel}:${cleanLabel}`.toLowerCase();
    if (seen.has(key)) return;
    seen.add(key);
    suggestions.push({
      source: "database",
      label: cleanLabel,
      subLabel,
      icon,
      value: cleanSearchTerm(value || cleanLabel)
    });
  }

  (rows || []).forEach(room => {
    if (includesText(room.location, searchText)) {
      add(room.location, "Location from listed properties", "location_on");
    }
  });

  return suggestions.slice(0, 8);
}

async function fetchDatabaseSuggestions(searchText) {
  let query = db
    .from("room_posts")
    .select("location, type, brokerage_type")
    .eq("status", "active")
    .ilike("location", `%${searchText}%`);

  query = applyFiltersToQuery(query);

  const { data, error } = await query.limit(60);

  if (error) {
    console.warn("Database suggestion error", error);
    return [];
  }

  return buildDatabaseSuggestions(data || [], searchText);
}

async function fetchMapSuggestions(searchText) {
  if (searchText.length < 1) return [];

  const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=6&countrycodes=in&q=${encodeURIComponent(searchText + " " + LOCATION_CONTEXT)}`;
  const response = await fetch(url, { headers: { "Accept": "application/json" } });
  const places = await response.json();

  const unique = [];
  const seen = new Set();

  (places || []).forEach(place => {
    const label = getPlaceLabel(place);
    const key = label.toLowerCase();
    if (!label || seen.has(key)) return;
    seen.add(key);
    unique.push({
      source: "map",
      label,
      subLabel: getPlaceSubLabel(place),
      icon: "travel_explore",
      lat: Number(place.lat),
      lon: Number(place.lon),
      displayName: place.display_name || label
    });
  });

  return unique.slice(0, 5);
}

function renderSuggestionList(databaseSuggestions, mapSuggestions) {
  const parts = [];

  if (databaseSuggestions.length) {
    parts.push(`<div class="suggestion-section-title">Listed locations</div>`);
    parts.push(databaseSuggestions.map((item, index) => `
      <div class="suggestion-item" data-source="database" data-index="${index}">
        <span class="material-symbols-rounded">${escapeHtml(item.icon)}</span>
        <div>
          <div class="suggestion-main">${escapeHtml(item.label)}</div>
          <div class="suggestion-sub">${escapeHtml(item.subLabel)}</div>
        </div>
      </div>
    `).join(""));
  }

  if (mapSuggestions.length) {
    parts.push(`<div class="suggestion-section-title">Nearby location ideas</div>`);
    parts.push(mapSuggestions.map((place, index) => `
      <div class="suggestion-item" data-source="map" data-index="${index}">
        <span class="material-symbols-rounded">${escapeHtml(place.icon)}</span>
        <div>
          <div class="suggestion-main">${escapeHtml(place.label)}</div>
          <div class="suggestion-sub">${escapeHtml(place.subLabel)}</div>
        </div>
      </div>
    `).join(""));
  }

  if (!parts.length) {
    return `<div class="suggestion-empty">No listed location found yet. Continue typing or pick a nearby location suggestion.</div>`;
  }

  return parts.join("");
}

function attachSuggestionEvents(databaseSuggestions, mapSuggestions) {
  const box = document.getElementById("searchSuggestions");
  if (!box) return;

  box.querySelectorAll(".suggestion-item").forEach(item => {
    item.addEventListener("click", () => {
      const source = item.dataset.source;
      const index = Number(item.dataset.index);

      if (source === "database") {
        const suggestion = databaseSuggestions[index];
        selectedSearchPlace = null;
        document.getElementById("search").value = suggestion.value || suggestion.label;
        hideSuggestionBox();
        loadRooms(suggestion.value || suggestion.label);
        return;
      }

      const place = mapSuggestions[index];
      selectedSearchPlace = place;
      document.getElementById("search").value = place.label;
      hideSuggestionBox();
      loadRooms(place.label, place);
    });
  });
}

async function fetchLocationSearchSuggestions(value) {
  const searchText = cleanSearchTerm(value);
  const box = document.getElementById("searchSuggestions");

  if (!box || searchText.length < 1) {
    hideSuggestionBox();
    return;
  }

  const requestId = ++suggestionRequestId;

  try {
    const databaseSuggestions = await fetchDatabaseSuggestions(searchText);
    let mapSuggestions = [];

    // Database comes first. Map/location ideas are added only as a helper for nearby-area fallback.
    if (searchText.length >= 2 && databaseSuggestions.length < 6) {
      try {
        mapSuggestions = await fetchMapSuggestions(searchText);
      } catch (mapErr) {
        console.warn("Map suggestion error", mapErr);
      }
    }

    if (requestId !== suggestionRequestId) return;

    showSuggestionBox(renderSuggestionList(databaseSuggestions, mapSuggestions));
    attachSuggestionEvents(databaseSuggestions, mapSuggestions);
  } catch (err) {
    console.warn("Location suggestion error", err);
    hideSuggestionBox();
  }
}

// Kept as an alias so any old call still works.
function fetchLocationSuggestions(value) {
  return fetchLocationSearchSuggestions(value);
}

async function geocodeLocation(text) {
  const locationText = cleanSearchTerm(text);
  if (!locationText) return null;

  const cacheKey = "geo_" + locationText.toLowerCase();
  try {
    const cached = JSON.parse(localStorage.getItem(cacheKey) || "null");
    if (cached && cached.lat && cached.lon) return cached;
  } catch (e) {}

  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=in&q=${encodeURIComponent(locationText + " " + LOCATION_CONTEXT)}`;
    const response = await fetch(url, { headers: { "Accept": "application/json" } });
    const data = await response.json();
    if (!data || !data[0]) return null;

    const result = {
      label: getPlaceLabel(data[0]),
      lat: Number(data[0].lat),
      lon: Number(data[0].lon)
    };

    localStorage.setItem(cacheKey, JSON.stringify(result));
    return result;
  } catch (err) {
    console.warn("Geocoding error", err);
    return null;
  }
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function distanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const toRad = deg => deg * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function roomHasCoordinates(room) {
  const lat = Number(room.latitude || room.lat);
  const lon = Number(room.longitude || room.lng || room.lon);
  if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
  return { lat, lon };
}

async function getRoomCoordinates(room) {
  const existing = roomHasCoordinates(room);
  if (existing) return existing;
  if (!room.location) return null;
  return await geocodeLocation(room.location);
}

async function findNearbyRooms(search, selectedPlace = null) {
  const target = selectedPlace || await geocodeLocation(search);
  if (!target || !Number.isFinite(target.lat) || !Number.isFinite(target.lon)) return [];

  const { data, error } = await db
    .from("room_posts")
    .select("*")
    .eq("status", "active")
    .order("created_at", { ascending: false });

  if (error || !data) return [];

  const nearby = [];

  for (const room of data) {
    const coords = await getRoomCoordinates(room);
    if (!coords) continue;

    const km = distanceKm(target.lat, target.lon, coords.lat, coords.lon);
    room._distanceKm = km;
    nearby.push(room);

    // Be gentle with OpenStreetMap/Nominatim when room locations need geocoding.
    if (!roomHasCoordinates(room)) await sleep(250);
  }

  nearby.sort((a, b) => a._distanceKm - b._distanceKm);

  let filtered = nearby.filter(room => room._distanceKm <= 10);
  if (!filtered.length) filtered = nearby.filter(room => room._distanceKm <= 18);

  return filtered.slice(0, 12);
}



/* SAFE PUBLIC OWNER PROFILE LOOKUP
   users table stays locked. This reads only the public_user_profiles view. */
async function attachOwnerProfiles(items) {
  const rows = Array.isArray(items) ? items : [];
  const ids = [...new Set(rows.map(item => item && item.user_id).filter(Boolean))];
  if (!ids.length) return rows;

  const { data, error } = await db
    .from("public_user_profiles")
    .select("id,name,avatar_url,gender")
    .in("id", ids);

  if (error) {
    console.warn("Owner profile load error", error);
    return rows;
  }

  const profileMap = new Map((data || []).map(profile => [String(profile.id), profile]));
  return rows.map(item => {
    const profile = profileMap.get(String(item.user_id)) || null;
    return {
      ...item,
      user: profile,
      users: profile,
      owner: profile
    };
  });
}

/* LOAD ROOMS */
async function loadRooms(search = "", selectedPlace = null) {
  const cleanSearch = cleanSearchTerm(search);
  let query = db.from("room_posts")
    .select("*")
    .eq("status", "active");

  if (cleanSearch) {
    // Top search is only for location/area. Other property details are controlled by filters below.
    query = query.ilike("location", `%${cleanSearch}%`);
  }

  query = applyFiltersToQuery(query);

  const { data, error } = await query.order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    showAppPopup(error.message, "Error");
    return;
  }

  if (cleanSearch && (!data || data.length === 0)) {
    const nearbyRooms = (await findNearbyRooms(cleanSearch, selectedPlace)).filter(roomMatchesActiveFilters);

    if (nearbyRooms.length > 0) {
      renderRooms(await attachOwnerProfiles(nearbyRooms), `No exact property found in “${cleanSearch}”. Showing nearby area properties with your selected filters.`);
      return;
    }
  }

  renderRooms(await attachOwnerProfiles(data));
}

/* Initialize card sliders (auto-advance) */
function initCardSliders() {
  // horizontal right-to-left sliding, autoplay every 1s
  document.querySelectorAll('.card-img-wrapper').forEach(wrapper => {
    // clear existing interval if present
    if (wrapper._sliderInterval) {
      clearInterval(wrapper._sliderInterval);
      wrapper._sliderInterval = null;
    }

    const track = wrapper.querySelector('.slides-track');
    if (!track) return;
    const slides = track.querySelectorAll('img.slide');
    const len = slides.length;
    if (!len || len <= 1) return;

    let idx = 0;
    // ensure starting position
    track.style.transform = `translateX(-${idx * 100}%)`;

    // autoplay every 1s (1000ms)
    wrapper._sliderInterval = setInterval(() => {
      idx = (idx + 1) % len;
      track.style.transform = `translateX(-${idx * 100}%)`;
    }, 1000);

    // pause on hover (desktop)
    wrapper.addEventListener('mouseenter', () => {
      if (wrapper._sliderInterval) {
        clearInterval(wrapper._sliderInterval);
        wrapper._sliderInterval = null;
      }
    });

    wrapper.addEventListener('mouseleave', () => {
      if (wrapper._sliderInterval) return;
      wrapper._sliderInterval = setInterval(() => {
        idx = (idx + 1) % len;
        track.style.transform = `translateX(-${idx * 100}%)`;
      }, 1000);
    });
  });
}

/* NAVIGATION */
function go(page) {
  // Desktop: open in left side panel (30%) and keep index content (70%). Mobile: navigate.
  if (window.innerWidth >= 900) {
    // If navigating to index, just close panel
    if (page.endsWith('index.html') || page === 'index.html') {
      closePanel();
      return;
    }
    openPanel(page);
  } else {
    window.location.href = page;
  }
}

function openPanel(page) {
  try {
    const panel = document.getElementById('sidePanel');
    const frame = document.getElementById('panelFrame');
    const app = document.querySelector('.app-container');
    // remove nav-left when panel opens
    app.classList.remove('nav-left');
    app.classList.add('panel-open');
    panel.setAttribute('aria-hidden', 'false');
    // Ensure full absolute URL for relative pages
    frame.src = page;
  } catch (e) { console.error(e); window.location.href = page; }
}

function closePanel() {
  const panel = document.getElementById('sidePanel');
  const frame = document.getElementById('panelFrame');
  const app = document.querySelector('.app-container');
  app.classList.remove('panel-open');
  panel.setAttribute('aria-hidden', 'true');
  // unload iframe to free resources
  frame.src = 'about:blank';
  // re-evaluate left-nav positioning after panel closed
  try { updateNavLeft(); } catch (e) { /* ignore */ }
}

function updateNavLeft() {
  const app = document.querySelector('.app-container');
  const isIndex = location.pathname.endsWith('index.html') || location.pathname === '/' || location.pathname === '';
  if (window.innerWidth >= 900 && isIndex && !app.classList.contains('panel-open')) {
    app.classList.add('nav-left');
  } else {
    app.classList.remove('nav-left');
  }
}

window.addEventListener('resize', updateNavLeft);
window.addEventListener('load', updateNavLeft);

function getActiveFilters() {
  const type = document.getElementById("filterType")?.value || "";
  const brokerage = document.getElementById("filterBrokerage")?.value || "";
  return { type, brokerage };
}

function hasActiveFilters() {
  const filters = getActiveFilters();
  return Boolean(filters.type || filters.brokerage);
}

function updateFilterUI() {
  const filters = getActiveFilters();
  const typeFilter = document.getElementById("filterType");
  const brokerageFilter = document.getElementById("filterBrokerage");
  const clearBtn = document.getElementById("clearFilters");

  typeFilter?.classList.toggle("filter-active", Boolean(filters.type));
  brokerageFilter?.classList.toggle("filter-active", Boolean(filters.brokerage));
  clearBtn?.classList.toggle("visible", hasActiveFilters());
}

function applyFiltersToQuery(query) {
  const filters = getActiveFilters();

  if (filters.type) {
    query = query.ilike("type", `%${filters.type}%`);
  }

  // Brokerage exists only on room_posts, so apply it only for Rooms Available.
  if (activePostMode === "available" && filters.brokerage) {
    if (filters.brokerage === "No Brokerage") {
      query = query.or("brokerage_type.ilike.%No Brokerage%,brokerage_type.is.null");
    } else {
      query = query.ilike("brokerage_type", `%${filters.brokerage}%`);
    }
  }

  return query;
}

function roomMatchesActiveFilters(room) {
  const filters = getActiveFilters();
  if (filters.type && !includesText(room.type, filters.type)) return false;

  if (activePostMode === "available" && filters.brokerage) {
    const roomBrokerage = room.brokerage_type || "No Brokerage";
    if (!includesText(roomBrokerage, filters.brokerage)) return false;
  }

  return true;
}

function getCurrentScrollTop() {
  const app = document.querySelector(".app-container");
  if (window.innerWidth >= 900) {
    return window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
  }
  return app ? app.scrollTop : 0;
}

function updateModeSwitchCompact() {
  const wrap = document.getElementById("modeSwitchWrap");
  if (!wrap) return;

  // Desktop has enough space, so keep the full Available/Needed switch sticky and always visible.
  if (window.innerWidth >= 900) {
    wrap.classList.remove("compact");
    modeSwitchLastScroll = getCurrentScrollTop();
    return;
  }

  const current = getCurrentScrollTop();
  const diff = current - modeSwitchLastScroll;

  // Expand immediately when user swipes/scrolls slightly upward, not only at the first post.
  if (diff < -3) {
    wrap.classList.remove("compact");
    modeSwitchExpandedUntil = Date.now() + 650;
  } else if (current <= 18) {
    wrap.classList.remove("compact");
  } else if (diff > 6 && current > 70 && Date.now() > modeSwitchExpandedUntil) {
    wrap.classList.add("compact");
  }

  modeSwitchLastScroll = Math.max(0, current);
}

function setupModeSwitchScroll() {
  const app = document.querySelector(".app-container");
  modeSwitchLastScroll = getCurrentScrollTop();
  if (app) app.addEventListener("scroll", updateModeSwitchCompact, { passive: true });
  window.addEventListener("scroll", updateModeSwitchCompact, { passive: true });
  window.addEventListener("resize", () => {
    modeSwitchLastScroll = getCurrentScrollTop();
    updateModeSwitchCompact();
  });
}

async function fetchDatabaseSuggestions(searchText) {
  let tableName = activePostMode === "needed" ? "room_requirements" : "room_posts";
  let query = db
    .from(tableName)
    .select("location, type")
    .ilike("location", `%${searchText}%`);

  if (activePostMode === "available") {
    query = query.eq("status", "active");
  }

  query = applyFiltersToQuery(query);

  const { data, error } = await query.limit(60);

  if (error) {
    console.warn("Database suggestion error", error);
    return [];
  }

  return buildDatabaseSuggestions(data || [], searchText);
}

async function findNearbyRooms(search, selectedPlace = null) {
  if (activePostMode === "needed") return [];

  const target = selectedPlace || await geocodeLocation(search);
  if (!target || !Number.isFinite(target.lat) || !Number.isFinite(target.lon)) return [];

  const { data, error } = await db
    .from("room_posts")
    .select("*")
    .eq("status", "active")
    .order("created_at", { ascending: false });

  if (error || !data) return [];

  const nearby = [];

  for (const room of data) {
    const coords = await getRoomCoordinates(room);
    if (!coords) continue;

    const km = distanceKm(target.lat, target.lon, coords.lat, coords.lon);
    room._distanceKm = km;
    nearby.push(room);

    if (!roomHasCoordinates(room)) await sleep(250);
  }

  nearby.sort((a, b) => a._distanceKm - b._distanceKm);

  let filtered = nearby.filter(room => room._distanceKm <= 10);
  if (!filtered.length) filtered = nearby.filter(room => room._distanceKm <= 18);

  return filtered.slice(0, 12);
}

async function loadRooms(search = "", selectedPlace = null) {
  const cleanSearch = cleanSearchTerm(search);

  if (activePostMode === "needed") {
    let query = db
      .from("room_requirements")
      .select("*")
      .order("created_at", { ascending: false });

    if (cleanSearch) {
      query = query.or(`location.ilike.%${cleanSearch}%,title.ilike.%${cleanSearch}%,description.ilike.%${cleanSearch}%,type.ilike.%${cleanSearch}%`);
    }

    query = applyFiltersToQuery(query);

    const { data, error } = await query;

    if (error) {
      console.error(error);
      showAppPopup(error.message, "Error");
      return;
    }

    const visible = (data || []).filter(item => !String(item.status || "").toLowerCase().startsWith("inactive"));
    renderRooms(await attachOwnerProfiles(visible));
    return;
  }

  let query = db.from("room_posts")
    .select("*")
    .eq("status", "active");

  if (cleanSearch) {
    query = query.ilike("location", `%${cleanSearch}%`);
  }

  query = applyFiltersToQuery(query);

  const { data, error } = await query.order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    showAppPopup(error.message, "Error");
    return;
  }

  if (cleanSearch && (!data || data.length === 0)) {
    const nearbyRooms = (await findNearbyRooms(cleanSearch, selectedPlace)).filter(roomMatchesActiveFilters);

    if (nearbyRooms.length > 0) {
      renderRooms(await attachOwnerProfiles(nearbyRooms), `No exact property found in “${cleanSearch}”. Showing nearby area properties with your selected filters.`);
      return;
    }
  }

  renderRooms(await attachOwnerProfiles(data));
}

/* ADVANCED SEARCH ENGINE + THEME POPUP */
const PUNE_CENTER = { lat: 18.5204, lon: 73.8567 };
const PUNE_SERVICE_RADIUS_KM = 55;
let appPopupTimer = null;

function showAppPopup(message, title = "TingoRooms") {
  const popup = document.getElementById("appPopup");
  const titleEl = document.getElementById("appPopupTitle");
  const messageEl = document.getElementById("appPopupMessage");
  if (!popup || !messageEl) return;
  if (titleEl) titleEl.textContent = title;
  messageEl.textContent = message;
  popup.classList.remove("hidden");
  clearTimeout(appPopupTimer);
  appPopupTimer = setTimeout(hideAppPopup, 4200);
}

function hideAppPopup() {
  const popup = document.getElementById("appPopup");
  if (popup) popup.classList.add("hidden");
}

function runManualSearch() {
  const input = document.getElementById("search");
  const value = input ? input.value.trim() : "";
  hideSuggestionBox();
  loadRooms(value, selectedSearchPlace);
}

function isInsidePuneServiceArea(place) {
  if (!place || !Number.isFinite(Number(place.lat)) || !Number.isFinite(Number(place.lon))) return true;
  return distanceKm(PUNE_CENTER.lat, PUNE_CENTER.lon, Number(place.lat), Number(place.lon)) <= PUNE_SERVICE_RADIUS_KM;
}

function getPostTimestamp(item) {
  return item.updated_at || item.created_at || item.inserted_at || item.date || "";
}

function formatPostDate(item) {
  const raw = getPostTimestamp(item);
  if (!raw) return "Recently posted";
  const date = new Date(raw);
  if (Number.isNaN(date.getTime())) return "Recently posted";

  const now = new Date();
  const startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diffDays = Math.round((startToday - startDate) / 86400000);
  const prefix = item.updated_at && item.updated_at !== item.created_at ? "Updated" : "Posted";

  if (diffDays === 0) return `${prefix} today`;
  if (diffDays === 1) return `${prefix} yesterday`;

  return `${prefix} ${date.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" })}`;
}

function buildSearchStatus(searchText, rows, targetPlace) {
  if (!searchText) return "";
  const label = targetPlace?.label || targetPlace?.displayName || searchText;
  const hasExact = rows.some(row => Number(row._distanceKm) <= 1.25 || includesText(row.location, searchText));
  const closest = rows.find(row => Number.isFinite(Number(row._distanceKm)));

  if (targetPlace && !isInsidePuneServiceArea(targetPlace)) {
    return `We are currently serviceable in Pune only. Showing the closest Pune listings instead of “${searchText}”.`;
  }

  if (String(searchText).toLowerCase().includes("pune")) {
    return `We are currently serviceable in Pune. Showing Pune area posts nearest to your search.`;
  }

  if (hasExact) {
    return `Showing posts nearest to “${label}”.`;
  }

  if (closest) {
    return `No exact match found for “${searchText}”. Showing nearby listed areas first.`;
  }

  return `No exact match found for “${searchText}”. Showing related listed areas if available.`;
}

async function loadAllSearchRowsForMode() {
  if (activePostMode === "needed") {
    let query = db
      .from("room_requirements")
      .select("*")
      .order("created_at", { ascending: false });

    query = applyFiltersToQuery(query);
    const { data, error } = await query;
    if (error) throw error;
    return await attachOwnerProfiles((data || []).filter(item => !String(item.status || "").toLowerCase().startsWith("inactive")));
  }

  let query = db
    .from("room_posts")
    .select("*")
    .eq("status", "active");

  query = applyFiltersToQuery(query);
  const { data, error } = await query.order("created_at", { ascending: false });
  if (error) throw error;
  return await attachOwnerProfiles(data || []);
}

function textSearchRows(rows, searchText) {
  const term = cleanSearchTerm(searchText).toLowerCase();
  if (!term) return rows;
  const words = term.split(" ").filter(Boolean);

  function looseWordMatch(text, word) {
    if (!word) return false;
    if (text.includes(word)) return true;
    return text.split(/\s+/).some(part => part.startsWith(word) || word.startsWith(part));
  }

  return (rows || []).filter(item => {
    const haystack = cleanSearchTerm([
      item.location,
      item.title,
      item.description,
      item.type,
      item.brokerage_type,
      item.name,
      item.users?.name
    ].filter(Boolean).join(" ")).toLowerCase();

    if (haystack.includes(term)) return true;

    // Multi-word address search like "bhusari colony kothrud" should match
    // when all words are present anywhere in the detailed address/post text.
    if (words.length > 1 && words.every(word => looseWordMatch(haystack, word))) return true;

    // While typing, show related matches for useful 3+ character fragments.
    return words.some(word => word.length >= 3 && looseWordMatch(haystack, word));
  });
}

async function sortRowsByTarget(rows, target) {
  if (!target || !Number.isFinite(Number(target.lat)) || !Number.isFinite(Number(target.lon))) return [];
  const sorted = [];

  for (const row of rows || []) {
    const coords = await getRoomCoordinates(row);
    if (!coords) continue;
    const km = distanceKm(Number(target.lat), Number(target.lon), coords.lat, coords.lon);
    sorted.push({ ...row, _distanceKm: km });
    if (!roomHasCoordinates(row)) await sleep(140);
  }

  sorted.sort((a, b) => Number(a._distanceKm) - Number(b._distanceKm));
  return sorted;
}

async function getTargetFromSearch(searchText, selectedPlace = null) {
  if (selectedPlace && Number.isFinite(Number(selectedPlace.lat)) && Number.isFinite(Number(selectedPlace.lon))) return selectedPlace;
  const geo = await geocodeLocation(searchText);
  if (!geo) return null;
  return geo;
}

async function loadRooms(search = "", selectedPlace = null) {
  const cleanSearch = cleanSearchTerm(search);

  try {
    const allRows = await loadAllSearchRowsForMode();

    if (!cleanSearch) {
      renderRooms(allRows);
      return;
    }

    const target = await getTargetFromSearch(cleanSearch, selectedPlace || selectedSearchPlace);
    const exactRows = textSearchRows(allRows, cleanSearch);
    let finalRows = [];
    let statusText = "";
    const noun = activePostMode === "needed" ? "requirements" : "rooms";

    const rowKey = row => String(row?.id || `${row?.title || ''}|${row?.location || ''}|${row?.created_at || ''}`);
    const seenRows = new Set();
    const addUniqueRows = rows => {
      (rows || []).forEach(row => {
        const key = rowKey(row);
        if (!key || seenRows.has(key)) return;
        seenRows.add(key);
        finalRows.push(row);
      });
    };

    if (target) {
      if (!isInsidePuneServiceArea(target)) {
        showAppPopup("We are currently serviceable in Pune only. You can still view the closest Pune listings below.", "Service area");
      }

      const distanceSorted = await sortRowsByTarget(allRows, target);
      const distanceMap = new Map(distanceSorted.map(row => [rowKey(row), row]));
      const exactWithDistance = exactRows.map(row => distanceMap.get(rowKey(row)) || row);
      const nearbyRows = distanceSorted.filter(row => {
        const km = Number(row._distanceKm);
        return Number.isFinite(km) && km <= 35;
      });

      // Same behavior for Rooms Available and Rooms Needed:
      // exact/related rows + nearby rows, then final feed sorted nearest to farthest.
      addUniqueRows(exactWithDistance);
      addUniqueRows(nearbyRows);

      if (!finalRows.length) {
        addUniqueRows(distanceSorted);
      }

      finalRows.sort((a, b) => {
        const da = Number(a?._distanceKm);
        const db = Number(b?._distanceKm);
        const aHasDistance = Number.isFinite(da);
        const bHasDistance = Number.isFinite(db);
        if (aHasDistance && bHasDistance) return da - db;
        if (aHasDistance) return -1;
        if (bHasDistance) return 1;
        return new Date(getPostTimestamp(b) || 0) - new Date(getPostTimestamp(a) || 0);
      });

      if (exactRows.length && finalRows.length > exactRows.length) {
        statusText = `Showing nearest ${noun} for “${cleanSearch}”. Exact/related matches and nearby posts are sorted by distance.`;
      } else if (exactRows.length) {
        statusText = `Showing nearest matching ${noun} for “${cleanSearch}”.`;
      } else {
        statusText = buildSearchStatus(cleanSearch, finalRows, target);
      }
    } else {
      addUniqueRows(exactRows);
      statusText = finalRows.length
        ? `Showing related ${noun} for “${cleanSearch}”. Pick a location suggestion for more accurate nearby results.`
        : `No exact match found for “${cleanSearch}”. Try selecting one of the location suggestions.`;
    }

    renderRooms(await attachOwnerProfiles(finalRows.slice(0, 36)), statusText);
  } catch (error) {
    console.error(error);
    showAppPopup(error.message || "Something went wrong while loading posts.", "Search error");
  }
}

async function fetchDatabaseSuggestions(searchText) {
  const tableName = activePostMode === "needed" ? "room_requirements" : "room_posts";
  const term = cleanSearchTerm(searchText).toLowerCase();
  const safeTerm = term.replace(/[%_,]/g, " ").replace(/\s+/g, " ").trim();

  async function runSuggestionQuery(selectFields, useServerSearch = false) {
    let query = db.from(tableName).select(selectFields).limit(useServerSearch ? 120 : 450);
    if (activePostMode === "available") query = query.eq("status", "active");
    query = applyFiltersToQuery(query);

    // Server-side partial search makes suggestions appear while typing,
    // e.g. "katr" can return "Katraj" without waiting for exact spelling.
    if (useServerSearch && safeTerm) {
      query = query.or(`location.ilike.%${safeTerm}%,title.ilike.%${safeTerm}%,type.ilike.%${safeTerm}%`);
    }

    return await query;
  }

  async function loadSuggestionRows(selectFields) {
    let searched = { data: [], error: null };
    if (safeTerm) searched = await runSuggestionQuery(selectFields, true);
    if (!searched.error && searched.data && searched.data.length) return searched;

    // Fallback: load more rows and filter locally so partial/location words still show like YouTube suggestions.
    const broad = await runSuggestionQuery(selectFields, false);
    if (!broad.error) return broad;
    return searched.error ? searched : broad;
  }

  let { data, error } = await loadSuggestionRows("id, title, location, type, latitude, longitude");

  // If any older table does not have latitude/longitude, keep suggestions working without breaking the page.
  if (error) {
    const message = String(error.message || "").toLowerCase();
    if (message.includes("latitude") || message.includes("longitude") || message.includes("column") || message.includes("schema")) {
      const fallback = await loadSuggestionRows("id, title, location, type");
      data = fallback.data;
      error = fallback.error;
    }
  }

  if (error) {
    console.warn("Database suggestion error", error);
    return [];
  }

  const words = term.split(" ").filter(Boolean);
  const rows = (data || []).filter(row => {
    const text = [row.location, row.title, row.type].filter(Boolean).join(" ").toLowerCase();
    if (!term) return true;
    return text.includes(term) || words.some(word => {
      if (!word) return false;
      return text.includes(word) || text.split(/\s+/).some(part => part.startsWith(word) || word.startsWith(part));
    });
  });

  return buildDatabaseSuggestions(rows, searchText);
}

function buildDatabaseSuggestions(rows, searchText) {
  const suggestions = [];
  const seen = new Set();
  const term = cleanSearchTerm(searchText).toLowerCase();
  const words = term.split(" ").filter(Boolean);

  function cleanLower(value) {
    return cleanSearchTerm(value).toLowerCase();
  }

  function looseWordMatch(text, word) {
    if (!word) return false;
    if (text.includes(word)) return true;
    return text.split(/\s+/).some(part => part.startsWith(word) || word.startsWith(part));
  }

  function matches(value) {
    const text = cleanLower(value);
    if (!term) return true;
    if (text.includes(term)) return true;
    if (words.length > 1 && words.every(word => looseWordMatch(text, word))) return true;
    return words.some(word => word.length >= 3 && looseWordMatch(text, word));
  }

  function scoreLabel(label, isFullAddress = false) {
    const text = cleanLower(label);
    let score = isFullAddress ? 40 : 10;
    if (text === term) score += 100;
    if (text.startsWith(term)) score += 70;
    if (text.includes(term)) score += 45;
    words.forEach(word => {
      if (text.split(/\s+/).some(part => part.startsWith(word))) score += 12;
      else if (text.includes(word)) score += 6;
    });
    return score;
  }

  function add(label, subLabel, icon, value, row, score = 0) {
    const cleanLabel = cleanSearchTerm(label);
    if (!cleanLabel) return;
    const key = cleanLabel.toLowerCase();
    if (seen.has(key)) return;
    seen.add(key);
    const coords = roomHasCoordinates(row || {});
    suggestions.push({
      source: "database",
      label: cleanLabel,
      subLabel,
      icon,
      value: cleanSearchTerm(value || cleanLabel),
      lat: coords?.lat,
      lon: coords?.lon,
      displayName: row?.location || cleanLabel,
      _score: score
    });
  }

  (rows || []).forEach(row => {
    const location = row.location || "";
    const cleanLocation = cleanSearchTerm(location);
    const parts = String(location).split(",").map(part => cleanSearchTerm(part)).filter(Boolean);

    // Always prefer full detailed addresses when any part of the address matches.
    // Example: typing "bhusari colony kothrud" or just "kothrud" can show
    // "Bhusari Colony, Kothrud, Pune..." instead of only the broad area.
    if (cleanLocation && matches(cleanLocation)) {
      add(cleanLocation, activePostMode === "needed" ? "Requirement preferred address" : "Listed address — tap to search nearby", "location_on", cleanLocation, row, scoreLabel(cleanLocation, true));
    }

    // Also show useful address chunks below, like YouTube-style suggestions.
    const chunks = [];
    for (let i = 0; i < parts.length; i++) {
      chunks.push(parts[i]);
      if (parts[i + 1]) chunks.push(`${parts[i]}, ${parts[i + 1]}`);
      if (parts[i + 2]) chunks.push(`${parts[i]}, ${parts[i + 1]}, ${parts[i + 2]}`);
    }

    chunks.forEach(chunk => {
      if (matches(chunk)) {
        add(chunk, cleanLocation ? `From ${cleanLocation}` : "Saved location", "near_me", chunk, row, scoreLabel(chunk, false));
      }
    });

    if (row.title && matches(row.title)) {
      add(row.title, cleanLocation || "Listed post", activePostMode === "needed" ? "person_search" : "home_work", row.location || row.title, row, scoreLabel(row.title, false));
    }
  });

  suggestions.sort((a, b) => (b._score || 0) - (a._score || 0));
  return suggestions.slice(0, 14);
}

function attachSuggestionEvents(databaseSuggestions, mapSuggestions) {
  const box = document.getElementById("searchSuggestions");
  if (!box) return;

  box.querySelectorAll(".suggestion-item").forEach(item => {
    item.addEventListener("click", () => {
      const source = item.dataset.source;
      const index = Number(item.dataset.index);

      if (source === "database") {
        const suggestion = databaseSuggestions[index];
        selectedSearchPlace = Number.isFinite(Number(suggestion.lat)) && Number.isFinite(Number(suggestion.lon))
          ? { label: suggestion.label, displayName: suggestion.displayName, lat: Number(suggestion.lat), lon: Number(suggestion.lon) }
          : null;
        document.getElementById("search").value = suggestion.value || suggestion.label;
        hideSuggestionBox();
        loadRooms(suggestion.value || suggestion.label, selectedSearchPlace);
        return;
      }

      const place = mapSuggestions[index];
      selectedSearchPlace = place;
      document.getElementById("search").value = place.label;
      hideSuggestionBox();
      loadRooms(place.label, place);
    });
  });
}

      icon: "travel_explore",
      lat: area.lat,
      lon: area.lon,
      displayName: `${area.label}, ${area.subLabel}`
    }))
    .slice(0, 5);
}

function mergeLocationSuggestions(list) {
  const seen = new Set();
  const merged = [];
  (list || []).forEach(item => {
    const key = cleanSearchTerm(item.label).toLowerCase();
    if (!key || seen.has(key)) return;
    seen.add(key);
    merged.push(item);
  });
  return merged;
}

async function fetchLocationSearchSuggestions(value) {
  const searchText = cleanSearchTerm(value);
  const box = document.getElementById("searchSuggestions");

  if (!box || searchText.length < 1) {
    hideSuggestionBox();
    return;
  }

  const requestId = ++suggestionRequestId;

  try {
    const databaseSuggestions = await fetchDatabaseSuggestions(searchText);
    let mapSuggestions = getLocalPuneAreaSuggestions(searchText, databaseSuggestions);

    try {
      const liveMapSuggestions = await fetchMapSuggestions(searchText);
      mapSuggestions = mergeLocationSuggestions([...mapSuggestions, ...liveMapSuggestions]).slice(0, 8);
    } catch (mapErr) {
      console.warn("Map suggestion error", mapErr);
    }

    if (requestId !== suggestionRequestId) return;
    showSuggestionBox(renderSuggestionList(databaseSuggestions, mapSuggestions));
    attachSuggestionEvents(databaseSuggestions, mapSuggestions);
  } catch (err) {
    console.warn("Location suggestion error", err);
    hideSuggestionBox();
  }
}

function normalizeSearchKey(value) {
  return cleanSearchTerm(value)
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase();
}

function uniqueWords(value) {
  return [...new Set(normalizeSearchKey(value).split(/\s+/).filter(Boolean))];
}

function editDistanceLimited(a, b, limit = 2) {
  a = normalizeSearchKey(a);
  b = normalizeSearchKey(b);
  if (a === b) return 0;
  if (!a || !b) return Math.max(a.length, b.length);
  if (Math.abs(a.length - b.length) > limit) return limit + 1;

  let prev = Array.from({ length: b.length + 1 }, (_, i) => i);
  for (let i = 1; i <= a.length; i++) {
    const curr = [i];
    let rowMin = curr[0];
    for (let j = 1; j <= b.length; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      const val = Math.min(prev[j] + 1, curr[j - 1] + 1, prev[j - 1] + cost);
      curr[j] = val;
      if (val < rowMin) rowMin = val;
    }
    if (rowMin > limit) return limit + 1;
    prev = curr;
  }
  return prev[b.length];
}

function fuzzyWordMatch(text, word) {
  const cleanWord = normalizeSearchKey(word);
  if (!cleanWord) return true;
  const cleanText = normalizeSearchKey(text);
  if (cleanText.includes(cleanWord)) return true;

  const tokens = cleanText.split(/\s+/).filter(Boolean);
  return tokens.some(token => {
    if (!token) return false;
    if (token.startsWith(cleanWord) || cleanWord.startsWith(token)) return true;
    if (cleanWord.length < 3 || token.length < 3) return false;
    const limit = cleanWord.length >= 7 ? 2 : 1;
    return editDistanceLimited(token, cleanWord, limit) <= limit;
  });
}

function fuzzyTextMatch(value, searchText, requireAllWords = true) {
  const text = normalizeSearchKey(value);
  const term = normalizeSearchKey(searchText);
  if (!term) return true;
  if (text.includes(term)) return true;
  const words = uniqueWords(term);
  if (!words.length) return true;
  const matched = words.filter(word => fuzzyWordMatch(text, word)).length;
  return requireAllWords ? matched === words.length : matched > 0;
}

function scoreFuzzyLabel(label, searchText, isFullAddress = false) {
  const text = normalizeSearchKey(label);
  const term = normalizeSearchKey(searchText);
  const words = uniqueWords(term);
  let score = isFullAddress ? 45 : 12;
  if (!term) return score;
  if (text === term) score += 140;
  if (text.startsWith(term)) score += 95;
  if (text.includes(term)) score += 70;
  words.forEach(word => {
    if (text.split(/\s+/).some(token => token === word)) score += 24;
    else if (text.split(/\s+/).some(token => token.startsWith(word) || word.startsWith(token))) score += 16;
    else if (fuzzyWordMatch(text, word)) score += 9;
  });
  return score;
}

function getPlaceLabel(place) {
  const address = place.address || {};
  const namedetails = place.namedetails || {};
  const displayParts = String(place.display_name || "").split(",").map(part => cleanSearchTerm(part)).filter(Boolean);
  const name = cleanSearchTerm(namedetails.name || namedetails["name:en"] || place.name || displayParts[0]);
  const detailParts = [
    name,
    address.house_name,
    address.house_number,
    address.building,
    address.amenity,
    address.shop,
    address.office,
    address.tourism,
    address.road || address.pedestrian || address.footway || address.path,
    address.neighbourhood || address.suburb || address.quarter || address.residential || address.locality,
    address.village || address.town || address.city_district
  ].map(cleanSearchTerm).filter(Boolean);

  const seen = new Set();
  const labelParts = [];
  detailParts.forEach(part => {
    const key = normalizeSearchKey(part);
    if (!key || seen.has(key)) return;
    seen.add(key);
    labelParts.push(part);
  });

  if (labelParts.length) return labelParts.slice(0, 4).join(", ");
  return displayParts.slice(0, 3).join(", ") || "Location";
}

function getPlaceSubLabel(place) {
  const address = place.address || {};
  const displayParts = String(place.display_name || "").split(",").map(part => cleanSearchTerm(part)).filter(Boolean);
  const parts = [
    address.city || address.town || address.village || address.county || "Pune",
    address.state || "Maharashtra",
    address.postcode
  ].filter(Boolean);
  const compact = parts.join(", ");
  const tail = displayParts.slice(3, 7).join(", ");
  return compact || tail || LOCATION_CONTEXT;
}

function osmPlaceToSuggestion(place, icon = "travel_explore") {
  const label = getPlaceLabel(place);
  return {
    source: "map",
    label,
    subLabel: getPlaceSubLabel(place),
    icon,
    lat: Number(place.lat),
    lon: Number(place.lon),
    displayName: place.display_name || label,
    _score: Number(place.importance || 0) * 100 + scoreFuzzyLabel(place.display_name || label, getCurrentSearchText(), true)
  };
}

async function fetchJsonSafe(url) {
  const response = await fetch(url, { headers: { "Accept": "application/json" } });
  if (!response.ok) throw new Error(`Location service error ${response.status}`);
  return await response.json();
}

async function fetchMapSuggestions(searchText) {
  const term = cleanSearchTerm(searchText);
  if (term.length < 1) return [];

  const base = "https://nominatim.openstreetmap.org/search";
  const common = "format=json&addressdetails=1&namedetails=1&extratags=1&dedupe=0&countrycodes=in&limit=12";
  const queries = [
    `${base}?${common}&viewbox=${encodeURIComponent(PUNE_SEARCH_VIEWBOX)}&bounded=1&q=${encodeURIComponent(term + " Pune Maharashtra India")}`,
    `${base}?${common}&viewbox=${encodeURIComponent(PUNE_SEARCH_VIEWBOX)}&bounded=1&q=${encodeURIComponent(term)}`,
    `${base}?${common}&q=${encodeURIComponent(term + " Pune Maharashtra India")}`
  ];

  const results = [];
  for (const url of queries) {
    try {
      const data = await fetchJsonSafe(url);
      (data || []).forEach(place => {
        if (!Number.isFinite(Number(place.lat)) || !Number.isFinite(Number(place.lon))) return;
        const suggestion = osmPlaceToSuggestion(place, "travel_explore");
        const haystack = [suggestion.label, suggestion.subLabel, suggestion.displayName].join(" ");
        if (fuzzyTextMatch(haystack, term, false) || results.length < 4) results.push(suggestion);
      });
      if (results.length >= 10) break;
      await sleep(90);
    } catch (err) {
      console.warn("Map suggestion source failed", err);
    }
  }

  return mergeLocationSuggestions(results)
    .sort((a, b) => (b._score || 0) - (a._score || 0))
    .slice(0, 10);
}

function findBestLocalPunePlace(searchText) {
  const term = normalizeSearchKey(searchText);
  if (!term) return null;
  const words = uniqueWords(term);
  let best = null;

  LOCAL_PUNE_PLACES.forEach(place => {
    const text = normalizeSearchKey(`${place.label} ${place.subLabel} ${place.aliases || ""}`);
    if (!fuzzyTextMatch(text, term, words.length > 1)) return;
    const score = scoreFuzzyLabel(`${place.label} ${place.aliases || ""}`, term, false);
    if (!best || score > best._score) best = { ...place, _score: score };
  });

  return best;
}

function getLocalPuneAreaSuggestions(searchText, existingSuggestions = []) {
  const term = cleanSearchTerm(searchText);
  if (!term) return [];
  const existing = new Set((existingSuggestions || []).map(item => normalizeSearchKey(item.label)));

  return LOCAL_PUNE_PLACES
    .filter(place => !existing.has(normalizeSearchKey(place.label)))
    .map(place => ({
      source: "map",
      label: place.label,
      subLabel: place.subLabel,
      icon: "travel_explore",
      lat: place.lat,
      lon: place.lon,
      displayName: `${place.label}, ${place.subLabel}`,
      _score: scoreFuzzyLabel(`${place.label} ${place.aliases || ""}`, term, false)
    }))
    .filter(place => fuzzyTextMatch(`${place.label} ${place.subLabel} ${place.displayName}`, term, false) || (place._score || 0) >= 30)
    .sort((a, b) => (b._score || 0) - (a._score || 0))
    .slice(0, 8);
}

function mergeLocationSuggestions(list) {
  const seen = new Set();
  const merged = [];
  (list || []).forEach(item => {
    const key = normalizeSearchKey(item.displayName || item.label);
    const labelKey = normalizeSearchKey(item.label);
    if (!key || seen.has(key) || seen.has(labelKey)) return;
    seen.add(key);
    seen.add(labelKey);
    merged.push(item);
  });
  return merged;
}

async function geocodeLocation(text) {
  const locationText = cleanSearchTerm(text);
  if (!locationText) return null;

  const cacheKey = "geo_v2_" + normalizeSearchKey(locationText);
  try {
    const cached = JSON.parse(localStorage.getItem(cacheKey) || "null");
    if (cached && Number.isFinite(Number(cached.lat)) && Number.isFinite(Number(cached.lon))) return cached;
  } catch (e) {}

  const local = findBestLocalPunePlace(locationText);
  if (local) {
    const result = { label: local.label, displayName: `${local.label}, ${local.subLabel}`, lat: Number(local.lat), lon: Number(local.lon) };
    try { localStorage.setItem(cacheKey, JSON.stringify(result)); } catch (e) {}
    return result;
  }

  try {
    const suggestions = await fetchMapSuggestions(locationText);
    const first = suggestions.find(item => Number.isFinite(Number(item.lat)) && Number.isFinite(Number(item.lon)));
    if (!first) return null;
    const result = { label: first.label, displayName: first.displayName || first.label, lat: Number(first.lat), lon: Number(first.lon) };
    try { localStorage.setItem(cacheKey, JSON.stringify(result)); } catch (e) {}
    return result;
  } catch (err) {
    console.warn("Geocoding error", err);
    return null;
  }
}

function textSearchRows(rows, searchText) {
  const term = cleanSearchTerm(searchText);
  if (!term) return rows;

  return (rows || []).filter(item => {
    const haystack = [
      item.location,
      item.title,
      item.description,
      item.type,
      item.brokerage_type,
      item.name,
      item.users?.name
    ].filter(Boolean).join(" ");

    return fuzzyTextMatch(haystack, term, true) || fuzzyTextMatch(haystack, term, false);
  }).sort((a, b) => {
    const aScore = scoreFuzzyLabel([a.location, a.title, a.type].filter(Boolean).join(" "), term, true);
    const bScore = scoreFuzzyLabel([b.location, b.title, b.type].filter(Boolean).join(" "), term, true);
    return bScore - aScore;
  });
}

async function fetchDatabaseSuggestions(searchText) {
  const tableName = activePostMode === "needed" ? "room_requirements" : "room_posts";
  const term = cleanSearchTerm(searchText);
  const safeTerm = term.replace(/[%_,]/g, " ").replace(/\s+/g, " ").trim();

  async function runSuggestionQuery(selectFields, mode = "broad") {
    let query = db.from(tableName).select(selectFields).limit(mode === "quick" ? 140 : 700);
    if (activePostMode === "available") query = query.eq("status", "active");
    query = applyFiltersToQuery(query);
    if (mode === "quick" && safeTerm) {
      query = query.or(`location.ilike.%${safeTerm}%,title.ilike.%${safeTerm}%,type.ilike.%${safeTerm}%,description.ilike.%${safeTerm}%`);
    }
    return await query;
  }

  async function collectRows(selectFields) {
    const all = [];
    const seen = new Set();
    const addRows = rows => (rows || []).forEach(row => {
      const key = String(row.id || `${row.title}|${row.location}`);
      if (seen.has(key)) return;
      seen.add(key);
      all.push(row);
    });

    const quick = safeTerm ? await runSuggestionQuery(selectFields, "quick") : { data: [], error: null };
    if (!quick.error) addRows(quick.data);

    // Broad local filtering is what makes typo searches work, because SQL ilike cannot fix spelling mistakes.
    const broad = await runSuggestionQuery(selectFields, "broad");
    if (!broad.error) addRows(broad.data);

    return quick.error && broad.error ? broad : { data: all, error: null };
  }

  let { data, error } = await collectRows("id, title, location, type, description, latitude, longitude");

  if (error) {
    const message = String(error.message || "").toLowerCase();
    if (message.includes("latitude") || message.includes("longitude") || message.includes("description") || message.includes("column") || message.includes("schema")) {
      const fallback = await collectRows("id, title, location, type");
      data = fallback.data;
      error = fallback.error;
    }
  }

  if (error) {
    console.warn("Database suggestion error", error);
    return [];
  }

  const rows = (data || []).filter(row => {
    const text = [row.location, row.title, row.type, row.description].filter(Boolean).join(" ");
    return fuzzyTextMatch(text, term, false);
  });

  return buildDatabaseSuggestions(rows, searchText);
}

function buildDatabaseSuggestions(rows, searchText) {
  const suggestions = [];
  const seen = new Set();
  const term = cleanSearchTerm(searchText);

  function add(label, subLabel, icon, value, row, isFullAddress = false) {
    const cleanLabel = cleanSearchTerm(label);
    if (!cleanLabel) return;
    const key = normalizeSearchKey(cleanLabel);
    if (seen.has(key)) return;
    seen.add(key);
    const coords = roomHasCoordinates(row || {});
    suggestions.push({
      source: "database",
      label: cleanLabel,
      subLabel,
      icon,
      value: cleanSearchTerm(value || cleanLabel),
      lat: coords?.lat,
      lon: coords?.lon,
      displayName: row?.location || cleanLabel,
      _score: scoreFuzzyLabel(cleanLabel, term, isFullAddress)
    });
  }

  (rows || []).forEach(row => {
    const location = row.location || "";
    const cleanLocation = cleanSearchTerm(location);
    const parts = String(location).split(",").map(part => cleanSearchTerm(part)).filter(Boolean);

    if (cleanLocation && fuzzyTextMatch(cleanLocation, term, false)) {
      add(cleanLocation, activePostMode === "needed" ? "Requirement preferred full address" : "Listed full address — tap to search nearby", "location_on", cleanLocation, row, true);
    }

    const chunks = [];
    for (let i = 0; i < parts.length; i++) {
      chunks.push(parts[i]);
      if (parts[i + 1]) chunks.push(`${parts[i]}, ${parts[i + 1]}`);
      if (parts[i + 2]) chunks.push(`${parts[i]}, ${parts[i + 1]}, ${parts[i + 2]}`);
    }

    chunks.forEach(chunk => {
      if (fuzzyTextMatch(chunk, term, false)) {
        add(chunk, cleanLocation ? `From ${cleanLocation}` : "Saved detailed location", "near_me", chunk, row, false);
      }
    });

    if (row.title && fuzzyTextMatch(row.title, term, false)) {
      add(row.title, cleanLocation || "Listed post", activePostMode === "needed" ? "person_search" : "home_work", row.location || row.title, row, false);
    }
  });

  suggestions.sort((a, b) => (b._score || 0) - (a._score || 0));
  return suggestions.slice(0, 16);
}

async function fetchLocationSearchSuggestions(value) {
  const searchText = cleanSearchTerm(value);
  const box = document.getElementById("searchSuggestions");

  if (!box || searchText.length < 1) {
    hideSuggestionBox();
    return;
  }

  const requestId = ++suggestionRequestId;
  showSuggestionBox(`<div class="suggestion-empty">Searching detailed addresses, buildings and gallis...</div>`);

  try {
    const databaseSuggestions = await fetchDatabaseSuggestions(searchText);
    let mapSuggestions = getLocalPuneAreaSuggestions(searchText, databaseSuggestions);

    try {
      const liveMapSuggestions = await fetchMapSuggestions(searchText);
      mapSuggestions = mergeLocationSuggestions([...databaseSuggestions, ...mapSuggestions, ...liveMapSuggestions])
        .filter(item => item.source !== "database")
        .slice(0, 10);
    } catch (mapErr) {
      console.warn("Map suggestion error", mapErr);
    }

    if (requestId !== suggestionRequestId) return;
    showSuggestionBox(renderSuggestionList(databaseSuggestions, mapSuggestions));
    attachSuggestionEvents(databaseSuggestions, mapSuggestions);
  } catch (err) {
    console.warn("Location suggestion error", err);
    hideSuggestionBox();
  }
}
