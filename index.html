function mergeLocationSuggestions(list) {
  const seen = new Set();
  const merged = [];
  (list || []).forEach(item => {
    const key = cleanSearchTerm(item.label).toLowerCase();
    if (!key || seen.has(key)) return;
    seen.add(key);
    merged.push(item);
  });
  return merged;
}

async function fetchLocationSearchSuggestions(value) {
  const searchText = cleanSearchTerm(value);
  const box = document.getElementById("searchSuggestions");

  if (!box || searchText.length < 1) {
    hideSuggestionBox();
    return;
  }

  const requestId = ++suggestionRequestId;

  try {
    const databaseSuggestions = await fetchDatabaseSuggestions(searchText);
    let mapSuggestions = getLocalPuneAreaSuggestions(searchText, databaseSuggestions);

    try {
      const liveMapSuggestions = await fetchMapSuggestions(searchText);
      mapSuggestions = mergeLocationSuggestions([...mapSuggestions, ...liveMapSuggestions]).slice(0, 8);
    } catch (mapErr) {
      console.warn("Map suggestion error", mapErr);
    }

    if (requestId !== suggestionRequestId) return;
    showSuggestionBox(renderSuggestionList(databaseSuggestions, mapSuggestions));
    attachSuggestionEvents(databaseSuggestions, mapSuggestions);
  } catch (err) {
    console.warn("Location suggestion error", err);
    hideSuggestionBox();
  }
}

function normalizeSearchKey(value) {
  return cleanSearchTerm(value)
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase();
}

function uniqueWords(value) {
  return [...new Set(normalizeSearchKey(value).split(/\s+/).filter(Boolean))];
}

function editDistanceLimited(a, b, limit = 2) {
  a = normalizeSearchKey(a);
  b = normalizeSearchKey(b);
  if (a === b) return 0;
  if (!a || !b) return Math.max(a.length, b.length);
  if (Math.abs(a.length - b.length) > limit) return limit + 1;

  let prev = Array.from({ length: b.length + 1 }, (_, i) => i);
  for (let i = 1; i <= a.length; i++) {
    const curr = [i];
    let rowMin = curr[0];
    for (let j = 1; j <= b.length; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      const val = Math.min(prev[j] + 1, curr[j - 1] + 1, prev[j - 1] + cost);
      curr[j] = val;
      if (val < rowMin) rowMin = val;
    }
    if (rowMin > limit) return limit + 1;
    prev = curr;
  }
  return prev[b.length];
}

function fuzzyWordMatch(text, word) {
  const cleanWord = normalizeSearchKey(word);
  if (!cleanWord) return true;
  const cleanText = normalizeSearchKey(text);
  if (cleanText.includes(cleanWord)) return true;

  const tokens = cleanText.split(/\s+/).filter(Boolean);
  return tokens.some(token => {
    if (!token) return false;
    if (token.startsWith(cleanWord) || cleanWord.startsWith(token)) return true;
    if (cleanWord.length < 3 || token.length < 3) return false;
    const limit = cleanWord.length >= 7 ? 2 : 1;
    return editDistanceLimited(token, cleanWord, limit) <= limit;
  });
}

function fuzzyTextMatch(value, searchText, requireAllWords = true) {
  const text = normalizeSearchKey(value);
  const term = normalizeSearchKey(searchText);
  if (!term) return true;
  if (text.includes(term)) return true;
  const words = uniqueWords(term);
  if (!words.length) return true;
  const matched = words.filter(word => fuzzyWordMatch(text, word)).length;
  return requireAllWords ? matched === words.length : matched > 0;
}

function scoreFuzzyLabel(label, searchText, isFullAddress = false) {
  const text = normalizeSearchKey(label);
  const term = normalizeSearchKey(searchText);
  const words = uniqueWords(term);
  let score = isFullAddress ? 45 : 12;
  if (!term) return score;
  if (text === term) score += 140;
  if (text.startsWith(term)) score += 95;
  if (text.includes(term)) score += 70;
  words.forEach(word => {
    if (text.split(/\s+/).some(token => token === word)) score += 24;
    else if (text.split(/\s+/).some(token => token.startsWith(word) || word.startsWith(token))) score += 16;
    else if (fuzzyWordMatch(text, word)) score += 9;
  });
  return score;
}

function getPlaceLabel(place) {
  const address = place.address || {};
  const namedetails = place.namedetails || {};
  const displayParts = String(place.display_name || "").split(",").map(part => cleanSearchTerm(part)).filter(Boolean);
  const name = cleanSearchTerm(namedetails.name || namedetails["name:en"] || place.name || displayParts[0]);
  const detailParts = [
    name,
    address.house_name,
    address.house_number,
    address.building,
    address.amenity,
    address.shop,
    address.office,
    address.tourism,
    address.road || address.pedestrian || address.footway || address.path,
    address.neighbourhood || address.suburb || address.quarter || address.residential || address.locality,
    address.village || address.town || address.city_district
  ].map(cleanSearchTerm).filter(Boolean);

  const seen = new Set();
  const labelParts = [];
  detailParts.forEach(part => {
    const key = normalizeSearchKey(part);
    if (!key || seen.has(key)) return;
    seen.add(key);
    labelParts.push(part);
  });

  if (labelParts.length) return labelParts.slice(0, 4).join(", ");
  return displayParts.slice(0, 3).join(", ") || "Location";
}

function getPlaceSubLabel(place) {
  const address = place.address || {};
  const displayParts = String(place.display_name || "").split(",").map(part => cleanSearchTerm(part)).filter(Boolean);
  const parts = [
    address.city || address.town || address.village || address.county || "Pune",
    address.state || "Maharashtra",
    address.postcode
  ].filter(Boolean);
  const compact = parts.join(", ");
  const tail = displayParts.slice(3, 7).join(", ");
  return compact || tail || LOCATION_CONTEXT;
}

function osmPlaceToSuggestion(place, icon = "travel_explore") {
  const label = getPlaceLabel(place);
  return {
    source: "map",
    label,
    subLabel: getPlaceSubLabel(place),
    icon,
    lat: Number(place.lat),
    lon: Number(place.lon),
    displayName: place.display_name || label,
    _score: Number(place.importance || 0) * 100 + scoreFuzzyLabel(place.display_name || label, getCurrentSearchText(), true)
  };
}

async function fetchJsonSafe(url) {
  const response = await fetch(url, { headers: { "Accept": "application/json" } });
  if (!response.ok) throw new Error(`Location service error ${response.status}`);
  return await response.json();
}

async function fetchMapSuggestions(searchText) {
  const term = cleanSearchTerm(searchText);
  if (term.length < 1) return [];

  const base = "https://nominatim.openstreetmap.org/search";
  const common = "format=json&addressdetails=1&namedetails=1&extratags=1&dedupe=0&countrycodes=in&limit=12";
  const queries = [
    `${base}?${common}&viewbox=${encodeURIComponent(PUNE_SEARCH_VIEWBOX)}&bounded=1&q=${encodeURIComponent(term + " Pune Maharashtra India")}`,
    `${base}?${common}&viewbox=${encodeURIComponent(PUNE_SEARCH_VIEWBOX)}&bounded=1&q=${encodeURIComponent(term)}`,
    `${base}?${common}&q=${encodeURIComponent(term + " Pune Maharashtra India")}`
  ];

  const results = [];
  for (const url of queries) {
    try {
      const data = await fetchJsonSafe(url);
      (data || []).forEach(place => {
        if (!Number.isFinite(Number(place.lat)) || !Number.isFinite(Number(place.lon))) return;
        const suggestion = osmPlaceToSuggestion(place, "travel_explore");
        const haystack = [suggestion.label, suggestion.subLabel, suggestion.displayName].join(" ");
        if (fuzzyTextMatch(haystack, term, false) || results.length < 4) results.push(suggestion);
      });
      if (results.length >= 10) break;
      await sleep(90);
    } catch (err) {
      console.warn("Map suggestion source failed", err);
    }
  }

  return mergeLocationSuggestions(results)
    .sort((a, b) => (b._score || 0) - (a._score || 0))
    .slice(0, 10);
}

function findBestLocalPunePlace(searchText) {
  const term = normalizeSearchKey(searchText);
  if (!term) return null;
  const words = uniqueWords(term);
  let best = null;

  LOCAL_PUNE_PLACES.forEach(place => {
    const text = normalizeSearchKey(`${place.label} ${place.subLabel} ${place.aliases || ""}`);
    if (!fuzzyTextMatch(text, term, words.length > 1)) return;
    const score = scoreFuzzyLabel(`${place.label} ${place.aliases || ""}`, term, false);
    if (!best || score > best._score) best = { ...place, _score: score };
  });

  return best;
}

function getLocalPuneAreaSuggestions(searchText, existingSuggestions = []) {
  const term = cleanSearchTerm(searchText);
  if (!term) return [];
  const existing = new Set((existingSuggestions || []).map(item => normalizeSearchKey(item.label)));

  return LOCAL_PUNE_PLACES
    .filter(place => !existing.has(normalizeSearchKey(place.label)))
    .map(place => ({
      source: "map",
      label: place.label,
      subLabel: place.subLabel,
      icon: "travel_explore",
      lat: place.lat,
      lon: place.lon,
      displayName: `${place.label}, ${place.subLabel}`,
      _score: scoreFuzzyLabel(`${place.label} ${place.aliases || ""}`, term, false)
    }))
    .filter(place => fuzzyTextMatch(`${place.label} ${place.subLabel} ${place.displayName}`, term, false) || (place._score || 0) >= 30)
    .sort((a, b) => (b._score || 0) - (a._score || 0))
    .slice(0, 8);
}

function mergeLocationSuggestions(list) {
  const seen = new Set();
  const merged = [];
  (list || []).forEach(item => {
    const key = normalizeSearchKey(item.displayName || item.label);
    const labelKey = normalizeSearchKey(item.label);
    if (!key || seen.has(key) || seen.has(labelKey)) return;
    seen.add(key);
    seen.add(labelKey);
    merged.push(item);
  });
  return merged;
}

async function geocodeLocation(text) {
  const locationText = cleanSearchTerm(text);
  if (!locationText) return null;

  const cacheKey = "geo_v2_" + normalizeSearchKey(locationText);
  try {
    const cached = JSON.parse(localStorage.getItem(cacheKey) || "null");
    if (cached && Number.isFinite(Number(cached.lat)) && Number.isFinite(Number(cached.lon))) return cached;
  } catch (e) {}

  const local = findBestLocalPunePlace(locationText);
  if (local) {
    const result = { label: local.label, displayName: `${local.label}, ${local.subLabel}`, lat: Number(local.lat), lon: Number(local.lon) };
    try { localStorage.setItem(cacheKey, JSON.stringify(result)); } catch (e) {}
    return result;
  }

  try {
    const suggestions = await fetchMapSuggestions(locationText);
    const first = suggestions.find(item => Number.isFinite(Number(item.lat)) && Number.isFinite(Number(item.lon)));
    if (!first) return null;
    const result = { label: first.label, displayName: first.displayName || first.label, lat: Number(first.lat), lon: Number(first.lon) };
    try { localStorage.setItem(cacheKey, JSON.stringify(result)); } catch (e) {}
    return result;
  } catch (err) {
    console.warn("Geocoding error", err);
    return null;
  }
}

function textSearchRows(rows, searchText) {
  const term = cleanSearchTerm(searchText);
  if (!term) return rows;

  return (rows || []).filter(item => {
    const haystack = [
      item.location,
      item.title,
      item.description,
      item.type,
      item.brokerage_type,
      item.name,
      item.users?.name
    ].filter(Boolean).join(" ");

    return fuzzyTextMatch(haystack, term, true) || fuzzyTextMatch(haystack, term, false);
  }).sort((a, b) => {
    const aScore = scoreFuzzyLabel([a.location, a.title, a.type].filter(Boolean).join(" "), term, true);
    const bScore = scoreFuzzyLabel([b.location, b.title, b.type].filter(Boolean).join(" "), term, true);
    return bScore - aScore;
  });
}

async function fetchDatabaseSuggestions(searchText) {
  const tableName = activePostMode === "needed" ? "room_requirements" : "room_posts";
  const term = cleanSearchTerm(searchText);
  const safeTerm = term.replace(/[%_,]/g, " ").replace(/\s+/g, " ").trim();

  async function runSuggestionQuery(selectFields, mode = "broad") {
    let query = db.from(tableName).select(selectFields).limit(mode === "quick" ? 140 : 700);
    if (activePostMode === "available") query = query.eq("status", "active");
    query = applyFiltersToQuery(query);
    if (mode === "quick" && safeTerm) {
      query = query.or(`location.ilike.%${safeTerm}%,title.ilike.%${safeTerm}%,type.ilike.%${safeTerm}%,description.ilike.%${safeTerm}%`);
    }
    return await query;
  }

  async function collectRows(selectFields) {
    const all = [];
    const seen = new Set();
    const addRows = rows => (rows || []).forEach(row => {
      const key = String(row.id || `${row.title}|${row.location}`);
      if (seen.has(key)) return;
      seen.add(key);
      all.push(row);
    });

    const quick = safeTerm ? await runSuggestionQuery(selectFields, "quick") : { data: [], error: null };
    if (!quick.error) addRows(quick.data);

    // Broad local filtering is what makes typo searches work, because SQL ilike cannot fix spelling mistakes.
    const broad = await runSuggestionQuery(selectFields, "broad");
    if (!broad.error) addRows(broad.data);

    return quick.error && broad.error ? broad : { data: all, error: null };
  }

  let { data, error } = await collectRows("id, title, location, type, description, latitude, longitude");

  if (error) {
    const message = String(error.message || "").toLowerCase();
    if (message.includes("latitude") || message.includes("longitude") || message.includes("description") || message.includes("column") || message.includes("schema")) {
      const fallback = await collectRows("id, title, location, type");
      data = fallback.data;
      error = fallback.error;
    }
  }

  if (error) {
    console.warn("Database suggestion error", error);
    return [];
  }

  const rows = (data || []).filter(row => {
    const text = [row.location, row.title, row.type, row.description].filter(Boolean).join(" ");
    return fuzzyTextMatch(text, term, false);
  });

  return buildDatabaseSuggestions(rows, searchText);
}

function buildDatabaseSuggestions(rows, searchText) {
  const suggestions = [];
  const seen = new Set();
  const term = cleanSearchTerm(searchText);

  function add(label, subLabel, icon, value, row, isFullAddress = false) {
    const cleanLabel = cleanSearchTerm(label);
    if (!cleanLabel) return;
    const key = normalizeSearchKey(cleanLabel);
    if (seen.has(key)) return;
    seen.add(key);
    const coords = roomHasCoordinates(row || {});
    suggestions.push({
      source: "database",
      label: cleanLabel,
      subLabel,
      icon,
      value: cleanSearchTerm(value || cleanLabel),
      lat: coords?.lat,
      lon: coords?.lon,
      displayName: row?.location || cleanLabel,
      _score: scoreFuzzyLabel(cleanLabel, term, isFullAddress)
    });
  }

  (rows || []).forEach(row => {
    const location = row.location || "";
    const cleanLocation = cleanSearchTerm(location);
    const parts = String(location).split(",").map(part => cleanSearchTerm(part)).filter(Boolean);

    if (cleanLocation && fuzzyTextMatch(cleanLocation, term, false)) {
      add(cleanLocation, activePostMode === "needed" ? "Requirement preferred full address" : "Listed full address — tap to search nearby", "location_on", cleanLocation, row, true);
    }

    const chunks = [];
    for (let i = 0; i < parts.length; i++) {
      chunks.push(parts[i]);
      if (parts[i + 1]) chunks.push(`${parts[i]}, ${parts[i + 1]}`);
      if (parts[i + 2]) chunks.push(`${parts[i]}, ${parts[i + 1]}, ${parts[i + 2]}`);
    }

    chunks.forEach(chunk => {
      if (fuzzyTextMatch(chunk, term, false)) {
        add(chunk, cleanLocation ? `From ${cleanLocation}` : "Saved detailed location", "near_me", chunk, row, false);
      }
    });

    if (row.title && fuzzyTextMatch(row.title, term, false)) {
      add(row.title, cleanLocation || "Listed post", activePostMode === "needed" ? "person_search" : "home_work", row.location || row.title, row, false);
    }
  });

  suggestions.sort((a, b) => (b._score || 0) - (a._score || 0));
  return suggestions.slice(0, 16);
}

async function fetchLocationSearchSuggestions(value) {
  const searchText = cleanSearchTerm(value);
  const box = document.getElementById("searchSuggestions");

  if (!box || searchText.length < 1) {
    hideSuggestionBox();
    return;
  }

  const requestId = ++suggestionRequestId;
  showSuggestionBox(`<div class="suggestion-empty">Searching detailed addresses, buildings and gallis...</div>`);

  try {
    const databaseSuggestions = await fetchDatabaseSuggestions(searchText);
    let mapSuggestions = getLocalPuneAreaSuggestions(searchText, databaseSuggestions);

    try {
      const liveMapSuggestions = await fetchMapSuggestions(searchText);
      mapSuggestions = mergeLocationSuggestions([...databaseSuggestions, ...mapSuggestions, ...liveMapSuggestions])
        .filter(item => item.source !== "database")
        .slice(0, 10);
    } catch (mapErr) {
      console.warn("Map suggestion error", mapErr);
    }

    if (requestId !== suggestionRequestId) return;
    showSuggestionBox(renderSuggestionList(databaseSuggestions, mapSuggestions));
    attachSuggestionEvents(databaseSuggestions, mapSuggestions);
  } catch (err) {
    console.warn("Location suggestion error", err);
    hideSuggestionBox();
  }
}

   SMOOTH UI PERFORMANCE UPDATE
   Cache-first feed + reduced polling + visible-card sliders
   ========================================= */
const TINGO_FEED_CACHE_PREFIX = "tingo_home_feed_v5";
const TINGO_RAW_CACHE_PREFIX = "tingo_home_rows_v5";
const TINGO_PROFILE_CACHE_KEY = "tingo_public_profiles_v3";
const TINGO_FILTER_CACHE_KEY = "tingo_filter_html_v3";
const TINGO_SUGGESTION_CACHE_PREFIX = "tingo_suggestions_v4";
const TINGO_CACHE_TTL = 90 * 1000;
const TINGO_FILTER_CACHE_TTL = 10 * 60 * 1000;
let tingoLoadRoomsSeq = 0;
let tingoFeedRealtimeChannel = null;
let tingoLastFeedKey = "";
let tingoInitialFeedPainted = false;

function tingoSafeJsonRead(key, fallback = null) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}

function tingoSafeJsonWrite(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

function tingoNow() {
  return Date.now ? Date.now() : new Date().getTime();
}

function tingoCacheKeyForFeed(search = "", selectedPlace = null) {
  const filters = getActiveFilters ? getActiveFilters() : { type: "", brokerage: "" };
  const placeKey = selectedPlace ? (selectedPlace.label || selectedPlace.displayName || `${selectedPlace.lat || ""},${selectedPlace.lon || ""}`) : "";
  return [
    TINGO_FEED_CACHE_PREFIX,
    activePostMode || "available",
    normalizeSearchKey(cleanSearchTerm(search || "")),
    normalizeSearchKey(filters.type || ""),
    normalizeSearchKey(filters.brokerage || ""),
    normalizeSearchKey(placeKey || "")
  ].join("|");
}

function tingoRawRowsCacheKey() {
  const filters = getActiveFilters ? getActiveFilters() : { type: "", brokerage: "" };
  return [
    TINGO_RAW_CACHE_PREFIX,
    activePostMode || "available",
    normalizeSearchKey(filters.type || ""),
    normalizeSearchKey(filters.brokerage || "")
  ].join("|");
}

function tingoClearFeedCaches() {
  try {
    Object.keys(localStorage).forEach(key => {
      if (key.startsWith(TINGO_FEED_CACHE_PREFIX) || key.startsWith(TINGO_RAW_CACHE_PREFIX) || key.startsWith(TINGO_SUGGESTION_CACHE_PREFIX)) {
        localStorage.removeItem(key);

}

function tingoShowFeedSkeleton() {
  const container = document.getElementById("roomList");
  if (!container || tingoInitialFeedPainted) return;

  container.innerHTML = Array.from({ length: count }).map(() => `

      </div>
    </div>
  `).join("");
}

function tingoRenderCachedFeed(search = "", selectedPlace = null) {
  const key = tingoCacheKeyForFeed(search, selectedPlace);
  const cached = tingoSafeJsonRead(key);
  if (!cached || !Array.isArray(cached.items)) return false;

  tingoLastFeedKey = key;
  window.__tingoSkipNextFeedCacheWrite = true;
  renderRooms(cached.items, cached.statusText || "");
  window.__tingoSkipNextFeedCacheWrite = false;

  const container = document.getElementById("roomList");
  if (container) {
    container.classList.add("instant-cache-flash");
    setTimeout(() => container.classList.remove("instant-cache-flash"), 220);
  }

  tingoInitialFeedPainted = true;
  return true;
}

const tingoOriginalAttachOwnerProfiles = attachOwnerProfiles;
attachOwnerProfiles = async function(items) {
  const rows = Array.isArray(items) ? items : [];
  if (!rows.length) return rows;

  const profileCache = tingoSafeJsonRead(TINGO_PROFILE_CACHE_KEY, {}) || {};
  const ids = [...new Set(rows.map(item => item && item.user_id).filter(Boolean).map(String))];
  const missingIds = ids.filter(id => !profileCache[id]);

  if (missingIds.length) {
    try {
      const { data, error } = await db
        .from("public_user_profiles")
        .select("id,name,avatar_url,gender")
        .in("id", missingIds);

      if (!error && data) {
        data.forEach(profile => {
          if (profile && profile.id) profileCache[String(profile.id)] = profile;
        });
        tingoSafeJsonWrite(TINGO_PROFILE_CACHE_KEY, profileCache);
      }
    } catch (e) {
      console.warn("Cached owner profile load skipped", e);
    }
  }

  return rows.map(item => {
    const profile = profileCache[String(item && item.user_id)] || null;
    return {
      ...item,
      user: item.user || item.users || item.owner || profile,
      users: item.users || item.user || item.owner || profile,
      owner: item.owner || item.user || item.users || profile
    };
  });
};

}

function tingoEnsureSliderObserver() {
  if (window.__tingoSliderObserver) return window.__tingoSliderObserver;
  window.__tingoSliderObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const wrapper = entry.target;
      const track = wrapper.querySelector('.slides-track');
      const slides = track ? track.querySelectorAll('img.slide') : [];
      if (!track || slides.length <= 1) return;

      function stopSlider() {
        if (wrapper._sliderInterval) {
          clearInterval(wrapper._sliderInterval);
          wrapper._sliderInterval = null;
        }
      }

      function startSlider() {
        // Mobile scrolling remains smoother when large listing photos do not autoplay.
        if (window.innerWidth < 900 || wrapper._sliderInterval) return;
        let idx = Number(wrapper.dataset.sliderIndex || 0);
        wrapper._sliderInterval = setInterval(() => {
          if (document.hidden || !entry.isIntersecting) return;
          idx = (idx + 1) % slides.length;
          wrapper.dataset.sliderIndex = String(idx);
          track.style.transform = `translateX(-${idx * 100}%)`;
        }, 5000);
      }

      if (entry.isIntersecting) startSlider();
      else stopSlider();
    });
  }, { root: document.querySelector('.app-container') || null, rootMargin: '160px 0px', threshold: 0.01 });
  return window.__tingoSliderObserver;
}

initCardSliders = function() {
  const observer = tingoEnsureSliderObserver();
  document.querySelectorAll('.card-img-wrapper').forEach(wrapper => {
    if (wrapper.dataset.sliderBound === '1') return;
    wrapper.dataset.sliderBound = '1';
    wrapper.dataset.sliderIndex = '0';
    const track = wrapper.querySelector('.slides-track');
    if (track) track.style.transform = 'translateX(0)';
    observer.observe(wrapper);

    wrapper.addEventListener('mouseenter', () => {
      if (wrapper._sliderInterval) {
        clearInterval(wrapper._sliderInterval);
        wrapper._sliderInterval = null;
      }
    }, { passive: true });

    wrapper.addEventListener('mouseleave', () => {
      observer.unobserve(wrapper);
      observer.observe(wrapper);
    }, { passive: true });
  });
};

function tingoBuildFeedSignature(items, statusText = "") {
  try {
    const compactItems = (Array.isArray(items) ? items : []).map(item => {
      const profile = item?.user || item?.users || item?.owner || {};
      return {
        id: item?.id || '',
        updated_at: item?.updated_at || '',
        created_at: item?.created_at || '',
        status: item?.status || '',
        title: item?.title || '',
        location: item?.location || '',
        type: item?.type || item?.category || '',
        rent: item?.rent ?? '',
        deposit: item?.deposit ?? '',
        budget: item?.budget ?? item?.expected_rent ?? '',
        brokerage_type: item?.brokerage_type || '',
        images: item?.images || item?.image_urls || item?.image_url || '',
        views: item?.views ?? item?.view_count ?? '',
        distance: Number.isFinite(Number(item?._distanceKm)) ? Number(item._distanceKm).toFixed(3) : '',
        owner_id: profile?.id || item?.user_id || '',
        owner_name: profile?.name || profile?.full_name || '',
        owner_avatar: profile?.avatar_url || ''
      };
    });
    return JSON.stringify({ mode: activePostMode || 'available', statusText: statusText || '', items: compactItems });
  } catch (_) {
    return `${activePostMode || 'available'}|${statusText || ''}|${Array.isArray(items) ? items.length : 0}`;
  }
}

const tingoOriginalRenderRooms = renderRooms;
renderRooms = function(items, statusText = "") {
  const container = document.getElementById('roomList');
  const signature = tingoBuildFeedSignature(items, statusText);
  const sameFeedAlreadyVisible = Boolean(
    container &&
    container.dataset.feedSignature === signature &&
    container.children.length
  );

  // Cache-first loading can return the exact same rows from Supabase a moment
  // later. Keep the existing DOM and decoded images instead of clearing it.
  if (!sameFeedAlreadyVisible) {
    tingoOriginalRenderRooms(items, statusText);
    if (container) container.dataset.feedSignature = signature;
  }

  tingoInitialFeedPainted = true;

  if (!window.__tingoSkipNextFeedCacheWrite && tingoLastFeedKey && Array.isArray(items)) {
    tingoSafeJsonWrite(tingoLastFeedKey, {
      savedAt: tingoNow(),
      statusText,
      items: items.slice(0, 48)
    });
  }
};

const tingoOriginalLoadRooms = loadRooms;
loadRooms = async function(search = "", selectedPlace = null) {
  const seq = ++tingoLoadRoomsSeq;
  const key = tingoCacheKeyForFeed(search, selectedPlace);
  tingoLastFeedKey = key;

  const hasCache = tingoRenderCachedFeed(search, selectedPlace);
  if (!hasCache) tingoShowFeedSkeleton();

  try {
    await tingoOriginalLoadRooms(search, selectedPlace);
  } catch (error) {
    console.error(error);
    if (!hasCache) showAppPopup(error.message || "Unable to load posts right now.", "Network issue");
  } finally {
    if (seq === tingoLoadRoomsSeq) tingoInitialFeedPainted = true;
  }
};

const tingoOriginalFetchDatabaseSuggestions = fetchDatabaseSuggestions;
fetchDatabaseSuggestions = async function(searchText) {
  const term = cleanSearchTerm(searchText);
  const key = `${TINGO_SUGGESTION_CACHE_PREFIX}|${activePostMode}|${normalizeSearchKey(term)}|${normalizeSearchKey(getActiveFilters().type || "")}|${normalizeSearchKey(getActiveFilters().brokerage || "")}`;
  const cached = tingoSafeJsonRead(key);
  if (cached && Array.isArray(cached.items) && (tingoNow() - Number(cached.savedAt || 0)) < TINGO_CACHE_TTL) {
    return cached.items;
  }

  const items = await tingoOriginalFetchDatabaseSuggestions(searchText);
  tingoSafeJsonWrite(key, { savedAt: tingoNow(), items });
  return items;
};

function formatListingRent(value) {
  const raw = String(value ?? '').trim();
  if (!raw) return '₹0';
  const numeric = raw.replace(/[^0-9.]/g, '');
  if (numeric && !Number.isNaN(Number(numeric))) {
    return '₹' + Number(numeric).toLocaleString('en-IN', { maximumFractionDigits: 0 });
  }
  if (raw.startsWith('₹') || /[a-zA-Z]/.test(raw)) return raw;
  return `₹${raw}`;
}

function getListingViews(item) {
  const value = item?.views_count ?? item?.view_count ?? item?.views ?? item?.visit_count ?? item?.viewed_count ?? 0;
  const numberValue = Number(value);
  return Number.isFinite(numberValue) && numberValue >= 0 ? Math.round(numberValue) : 0;
}

function getListingBadgeText(item) {
  const brokerage = String(item?.brokerage_type || '').trim().toLowerCase();
  if (!brokerage || brokerage === 'no brokerage' || brokerage === 'no_brokerage' || brokerage.includes('no broker')) {
    return 'INDEPENDENT';
  }
  if (brokerage.includes('owner')) return 'OWNER';
  if (brokerage.includes('broker')) return 'BROKER';
  return String(item?.brokerage_type || 'INDEPENDENT').trim().toUpperCase();
}

function getCompactType(value, fallback = '1 Room ...') {
  const text = cleanSearchTerm(value || fallback);
  if (!text) return fallback;
  return text.length > 18 ? `${text.slice(0, 17).trim()}...` : text;
}

window.addEventListener('resize', () => {
  clearTimeout(tingoResizeRenderTimer);

    const nowDesktop = tingoIsDesktopFeed();
    if (nowDesktop === tingoLastFeedWasDesktop) return;
    tingoLastFeedWasDesktop = nowDesktop;

    const cached = tingoLastFeedKey ? tingoSafeJsonRead(tingoLastFeedKey) : null;
    if (cached && Array.isArray(cached.items)) {

  checkNewMessages();
}, 45000); // gentle fallback every 45 sec

<script id="tingo-final-fit-card-script">
(function() {
  function setTextIfFound(selector, text) {
    const el = document.querySelector(selector);
    if (el) el.textContent = text;
  }

  setTextIfFound('#modeAvailableBtn .mode-label', 'Rooms Available');
  setTextIfFound('#modeNeededBtn .mode-label', 'Rooms Required');

  window.updateModeSwitchCompact = function() {
    const wrap = document.getElementById('modeSwitchWrap');
    if (!wrap) return;
    wrap.classList.remove('compact');
  };

  window.tingoFormatMoney = function(value, fallback = '0') {
    const raw = String(value ?? '').trim();
    if (!raw) return formatListingRent(fallback);
    return formatListingRent(raw);
  };

  window.tingoOwnerName = function(item, fallback = 'Posted by user') {
    const ownerObj = item?.users || item?.user || item?.owner || {};
    return item?.name || ownerObj?.name || fallback;
  };

  window.tingoBrokerageText = function(room) {
    const type = String(room?.brokerage_type || '').trim();
    const amount = String(room?.brokerage_amount || '').trim();
    if (!type || type.toLowerCase() === 'no brokerage' || type.toLowerCase().includes('no broker')) return 'No Brokerage';
    if (amount) return `${type}: ${tingoFormatMoney(amount)}`;
    return type;
  };

  window.tingoIsNoBrokerage = function(room) {
    const type = String(room?.brokerage_type || '').trim().toLowerCase();
    return !type || type === 'no brokerage' || type.includes('no broker');
  };

  window.tingoActionButtons = function(item, source) {
    const safeId = escapeHtml(item?.id || '');
    const safeUserId = escapeHtml(item?.user_id || '');
    const sourceType = source === 'requirement' ? 'requirement' : 'available';
    let actions = '';

    if (item?.show_contact && item?.contact_number) {
      actions += `<button class="mobile-action-btn call" type="button" onclick="triggerAction(event, 'call', '${safeId}', '${escapeHtml(item.contact_number)}', '${sourceType}')"><span class="material-symbols-rounded">call</span>Call</button>`;
    }

    if (item?.show_whatsapp && item?.whatsapp_number) {
      actions += `<button class="mobile-action-btn whatsapp" type="button" onclick="triggerAction(event, 'wa', '${safeId}', '${escapeHtml(item.whatsapp_number)}', '${sourceType}')"><span class="material-symbols-rounded">chat</span>WP</button>`;
    }

    if (safeUserId) {
      actions += `<button class="mobile-action-btn message" type="button" onclick="startChat(event, '${safeId}', '${safeUserId}')"><span class="material-symbols-rounded">forum</span>Msg</button>`;
    }

    if (!actions) {
      actions = `<button class="mobile-action-btn message" type="button" onclick="event.stopPropagation(); openRoom('${safeId}', '${sourceType === 'requirement' ? 'requirement' : 'available'}')"><span class="material-symbols-rounded">visibility</span>Details</button>`;
    }
    return actions;
  };

  function buildMobileField(label, value, extraClass = '') {
    const safeValue = String(value ?? '').trim() || 'Not added';
    const fieldKey = String(label || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    const fieldClass = fieldKey ? ` field-${fieldKey}` : '';
    return `<div class="mobile-field ${extraClass}${fieldClass}"><span class="mobile-field-label">${escapeHtml(label)}</span><span class="mobile-field-value ${extraClass.includes('price-field') ? 'price' : ''} ${extraClass.includes('muted-field') ? 'muted' : ''}">${escapeHtml(safeValue)}</span></div>`;
  }

  window.tingoMobileAvailableCard = function(room) {
    let imagesArr = [];
    if (room.images && room.images.length > 0) imagesArr = room.images.split(',').map(s => s.trim()).filter(Boolean);
    if (!imagesArr.length) imagesArr = ['https://via.placeholder.com/600x420?text=No+Image'];

    const ownerName = tingoOwnerName(room);
    const titleText = room.title || room.type || 'Room For Rent';
    const locationText = room.location || 'Address not added';
    const rentText = `${tingoFormatMoney(room.rent || 0)}/mo`;
    const depositText = room.deposit ? tingoFormatMoney(room.deposit) : 'Not added';
    const categoryText = cleanSearchTerm(room.category || room.type || 'Room');
    const brokerageText = tingoBrokerageText(room);
    const views = getListingViews(room);
    const slidesHtml = imagesArr.map(src => `<img class="slide" loading="lazy" decoding="async" src="${escapeHtml(src)}" alt="${escapeHtml(titleText)}">`).join('');
    const distanceField = Number.isFinite(Number(room._distanceKm)) ? buildMobileField('Distance', `${Number(room._distanceKm).toFixed(Number(room._distanceKm) < 10 ? 1 : 0)} km`, 'full muted-field') : '';

    return `
      <div class="card mobile-full-listing-card" onclick="openRoom('${escapeHtml(room.id)}', 'available')">
        <div class="mobile-card-top">
          <div class="mobile-card-thumb card-img-wrapper">
            <div class="slides-track">${slidesHtml}</div>
          </div>

          <div class="mobile-card-info">
            <div class="mobile-title-row">
              <div class="mobile-card-title">${escapeHtml(titleText)}</div>
              <div class="mobile-views"><span class="material-symbols-rounded">visibility</span>${escapeHtml(views)}</div>
            </div>

            <div class="mobile-owner-line"><span class="material-symbols-rounded">account_circle</span><span>Uploaded by ${escapeHtml(ownerName)}</span></div>
            <div class="mobile-address-line"><span class="material-symbols-rounded">location_on</span><span class="mobile-address-text">${escapeHtml(locationText)}</span></div>

            <div class="mobile-field-list">
              ${buildMobileField('Rent', rentText, 'price-field')}
              ${buildMobileField('Deposit', depositText, 'muted-field')}
              ${buildMobileField('Category', categoryText, 'full')}
              ${buildMobileField('Brokerage', brokerageText, `full ${tingoIsNoBrokerage(room) ? 'no-broker' : ''}`)}
              ${distanceField}
            </div>

            <div class="mobile-card-actions">${tingoActionButtons(room, 'available')}</div>
          </div>
        </div>
      </div>
    `;
  };

  window.tingoMobileRequirementCard = function(req) {
    const ownerName = tingoOwnerName(req);
    const titleText = req.title || 'Room Required';
    const locationText = req.location || 'Preferred address not added';
    const budgetText = req.budget || req.rent || req.expected_rent ? tingoFormatMoney(req.budget || req.rent || req.expected_rent) : 'Not added';
    const depositText = req.deposit ? tingoFormatMoney(req.deposit) : 'Not added';
    const categoryText = cleanSearchTerm(req.category || req.type || 'Any type');
    const statusText = req.status || 'active';
    const views = getListingViews(req);
    const distanceField = Number.isFinite(Number(req._distanceKm)) ? buildMobileField('Distance', `${Number(req._distanceKm).toFixed(Number(req._distanceKm) < 10 ? 1 : 0)} km`, 'full muted-field') : '';

    return `
      <div class="card mobile-full-listing-card" onclick="openRoom('${escapeHtml(req.id)}', 'requirement')">
        <div class="mobile-card-top">
          <div class="mobile-requirement-thumb">
            <div class="mobile-requirement-icon"><span class="material-symbols-rounded">person_search</span></div>
          </div>

          <div class="mobile-card-info">
            <div class="mobile-title-row">
              <div class="mobile-card-title">${escapeHtml(titleText)}</div>
              <div class="mobile-views"><span class="material-symbols-rounded">visibility</span>${escapeHtml(views)}</div>
            </div>

            <div class="mobile-owner-line"><span class="material-symbols-rounded">account_circle</span><span>Uploaded by ${escapeHtml(ownerName)}</span></div>
            <div class="mobile-address-line"><span class="material-symbols-rounded">location_on</span><span class="mobile-address-text">${escapeHtml(locationText)}</span></div>

            <div class="mobile-field-list">
              ${buildMobileField('Budget', budgetText, 'price-field')}
              ${buildMobileField('Deposit', depositText, 'muted-field')}
              ${buildMobileField('Category', categoryText, 'full')}
              ${buildMobileField('Status', statusText, 'full no-broker')}
              ${distanceField}
            </div>

            <div class="mobile-card-actions">${tingoActionButtons(req, 'requirement')}</div>
          </div>
        </div>
      </div>
    `;
  };

  window.renderAvailableCard = function(room) {
    return tingoIsDesktopFeed() ? tingoLazyDesktopAvailable(room) : tingoMobileAvailableCard(room);
  };

  window.renderRequirementCard = function(req) {
    return tingoIsDesktopFeed() ? tingoDesktopRequirementCard(req) : tingoMobileRequirementCard(req);
  };

  async function fetchPostOptionRows() {
    const active = await db.from('room_posts').select('type,brokerage_type,status').eq('status', 'active').limit(1000);
    if (!active.error) return active;
    return await db.from('room_posts').select('type,brokerage_type').limit(1000);
  }

  async function fetchRequirementOptionRows() {
    const withStatus = await db.from('room_requirements').select('type,status').limit(1000);
    if (!withStatus.error) return withStatus;
    return await db.from('room_requirements').select('type').limit(1000);
  }

  function isActiveOptionRow(row) {
    const status = String(row?.status || 'active').trim().toLowerCase();
    return !status || status === 'active' || (!status.includes('inactive') && !status.includes('disabled') && !status.includes('rejected'));
  }

  function tingoOptionExists(select, value) {
    if (!select || !value) return false;
    return Array.from(select.options || []).some(option => option.value === value);
  }

  window.updateFilterUI = function() {
    const filters = getActiveFilters();
    const typeFilter = document.getElementById('filterType');
    const brokerageFilter = document.getElementById('filterBrokerage');
    const clearBtn = document.getElementById('clearFilters');

    typeFilter?.classList.toggle('filter-active', Boolean(filters.type));

    if (brokerageFilter) {
      if (activePostMode === 'needed') {
        brokerageFilter.value = '';
        brokerageFilter.classList.add('hidden-for-mode');
        brokerageFilter.classList.remove('filter-active');
      } else {
        brokerageFilter.classList.remove('hidden-for-mode');
        brokerageFilter.classList.toggle('filter-active', Boolean(filters.brokerage));
      }
    }

    const hasFilters = Boolean((typeFilter && typeFilter.value) || (activePostMode === 'available' && brokerageFilter && brokerageFilter.value));
    clearBtn?.classList.toggle('visible', hasFilters);
  };

  window.loadFilterOptions = async function() {
    const typeSelect = document.getElementById('filterType');
    const brokerageSelect = document.getElementById('filterBrokerage');
    if (!typeSelect) return;

    const selectedType = typeSelect.value;
    const selectedBrokerage = brokerageSelect ? brokerageSelect.value : '';

    if (activePostMode === 'needed') {
      const requirements = await fetchRequirementOptionRows();
      if (requirements.error) console.warn('Requirement type option loading error', requirements.error);
      const rows = (requirements.data || []).filter(isActiveOptionRow);
      fillSelectOptions('filterType', rows.map(row => row.type), 'All required types');
      if (tingoOptionExists(typeSelect, selectedType)) typeSelect.value = selectedType;
      if (brokerageSelect) brokerageSelect.value = '';
      updateFilterUI();
      return;
    }

    const posts = await fetchPostOptionRows();
    if (posts.error) console.warn('Room post type option loading error', posts.error);
    const rows = (posts.data || []).filter(isActiveOptionRow);
    fillSelectOptions('filterType', rows.map(row => row.type), 'All room types');
    fillSelectOptions('filterBrokerage', rows.map(row => row.brokerage_type || 'No Brokerage'), 'All brokerage');
    if (tingoOptionExists(typeSelect, selectedType)) typeSelect.value = selectedType;
    if (brokerageSelect && tingoOptionExists(brokerageSelect, selectedBrokerage)) brokerageSelect.value = selectedBrokerage;
    updateFilterUI();
  };

  window.setPostMode = function(mode) {
    const nextMode = mode === 'needed' ? 'needed' : 'available';
    activePostMode = nextMode;

    // Invalidate every older in-flight feed request immediately. This prevents
    // an Available response from painting after the user has opened Required.
    if (typeof tingoModeAwareLoadSeq !== 'undefined') tingoModeAwareLoadSeq += 1;
    if (typeof tingoLoadRoomsSeq !== 'undefined') tingoLoadRoomsSeq += 1;

    document.getElementById('modeAvailableBtn')?.classList.toggle('active', activePostMode === 'available');
    document.getElementById('modeNeededBtn')?.classList.toggle('active', activePostMode === 'needed');

    const typeFilter = document.getElementById('filterType');
    const brokerageFilter = document.getElementById('filterBrokerage');
    if (typeFilter) typeFilter.value = '';
    if (brokerageFilter) brokerageFilter.value = '';

    selectedSearchPlace = null;
    hideSuggestionBox();
    if (typeof tingoClearFeedCaches === 'function') tingoClearFeedCaches();
    try { localStorage.removeItem('tingo_filter_html_v3'); } catch (e) {}

    // Remove the previous tab's cards before any network or filter work begins.
    const roomList = document.getElementById('roomList');
    if (roomList) roomList.innerHTML = '';
    if (typeof tingoInitialFeedPainted !== 'undefined') tingoInitialFeedPainted = false;
    if (typeof tingoShowFeedSkeleton === 'function') tingoShowFeedSkeleton();

    // Feed and filter options load together; the user never sees stale cards.
    const feedPromise = Promise.resolve(loadRooms(getCurrentSearchText(), null));
    const filterPromise = Promise.resolve(loadFilterOptions()).catch(error => {
      console.warn('Filter options could not be refreshed after tab change', error);
    });

    return Promise.allSettled([feedPromise, filterPromise]);
  };

  const originalBindFilterEvents = window.bindFilterEvents;
  window.bindFilterEvents = function() {
    if (originalBindFilterEvents && !document.body.dataset.finalFilterBound) {
      originalBindFilterEvents();
      document.body.dataset.finalFilterBound = '1';
    }
    ['filterType', 'filterBrokerage'].forEach(id => {
      const element = document.getElementById(id);
      if (!element || element.dataset.finalBound === '1') return;
      element.dataset.finalBound = '1';
      element.addEventListener('change', () => {
        selectedSearchPlace = null;
        hideSuggestionBox();
        updateFilterUI();
        if (typeof tingoClearFeedCaches === 'function') tingoClearFeedCaches();
        loadRooms(getCurrentSearchText());
      });
    });
  };

  function finalRefreshVisibleFeed() {
    // UI-only finalisation. The feed is started exactly once by the final boot
    // script after all renderers are ready. Do not clear cache or rebuild here.
    updateModeSwitchCompact();
    if (typeof updateFilterUI === 'function') updateFilterUI();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', finalRefreshVisibleFeed, { once: true });
  } else {
    setTimeout(finalRefreshVisibleFeed, 60);
  }
})();
</script>

<script id="tingo-instagram-portrait-ui-final-script">
(function() {
  function esc(value) {
    if (typeof escapeHtml === 'function') return escapeHtml(value ?? '');
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function cssPhotoUrl(value) {
    return String(value || '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/\n/g, '')
      .replace(/\r/g, '');
  }

  function money(value) {
    if (typeof tingoFormatMoney === 'function') return tingoFormatMoney(value || 0);
    const raw = String(value ?? '').trim();
    if (!raw) return '₹0';
    if (raw.includes('₹')) return raw;
    const n = Number(raw.replace(/[^0-9.]/g, ''));
    if (!Number.isFinite(n)) return `₹${raw}`;
    return `₹${n.toLocaleString('en-IN')}`;
  }

  function ownerData(item) {
    const ownerObj = item?.users || item?.user || item?.owner || {};
    const name = item?.name || ownerObj?.name || 'Posted by user';
    const avatar = ownerObj?.avatar_url && String(ownerObj.avatar_url).trim()
      ? ownerObj.avatar_url
      : (typeof getDefaultAvatar === 'function' ? getDefaultAvatar(ownerObj?.gender) : 'https://i.ibb.co/N2ZhwrRn/Gemini-Generated-Image-h4mxnvh4mxnvh4mx-2.gif');
    return { name, avatar };
  }

  function timeAgo(item) {
    const raw = (typeof getPostTimestamp === 'function') ? getPostTimestamp(item) : (item?.updated_at || item?.created_at || '');
    if (!raw) return 'New';
    const d = new Date(raw);
    if (Number.isNaN(d.getTime())) return 'New';
    const diff = Date.now() - d.getTime();
    const mins = Math.max(1, Math.floor(diff / 60000));
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    if (days < 7) return `${days}d ago`;
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
  }

  function brokerage(room) {
    if (typeof tingoBrokerageText === 'function') return tingoBrokerageText(room);
    const type = String(room?.brokerage_type || '').trim();
    if (!type || type.toLowerCase().includes('no broker')) return 'No Brokerage';
    if (room?.brokerage_amount) return `${type}: ${money(room.brokerage_amount)}`;
    return type;
  }

  function imagesFrom(item) {
    let arr = [];
    if (item?.images && String(item.images).trim()) {
      arr = String(item.images).split(',').map(s => s.trim()).filter(Boolean);
    }
    if (!arr.length && item?.image_url) arr = [String(item.image_url).trim()].filter(Boolean);
    if (!arr.length) arr = ['https://via.placeholder.com/900x1200?text=No+Image'];
    return arr;
  }

  function actionButtons(item, source) {
    const sourceType = source === 'requirement' ? 'requirement' : 'available';
    const safeId = esc(item?.id || '');
    const safeUser = esc(item?.user_id || '');
    let html = '';

    if (item?.show_contact && item?.contact_number) {
      html += `<button class="ig-action-btn call" type="button" onclick="triggerAction(event, 'call', '${safeId}', '${esc(item.contact_number)}', '${sourceType}')"><span class="material-symbols-rounded">call</span>Call</button>`;
    } else {
      html += `<button class="ig-action-btn call" type="button" onclick="event.stopPropagation(); showAppPopup && showAppPopup('Contact number is not visible for this post.', 'Contact hidden')"><span class="material-symbols-rounded">call</span>Call</button>`;
    }

    if (item?.show_whatsapp && item?.whatsapp_number) {
      html += `<button class="ig-action-btn whatsapp" type="button" onclick="triggerAction(event, 'wa', '${safeId}', '${esc(item.whatsapp_number)}', '${sourceType}')"><span class="material-symbols-rounded">chat</span>WhatsApp</button>`;
    } else {
      html += `<button class="ig-action-btn whatsapp" type="button" onclick="event.stopPropagation(); showAppPopup && showAppPopup('WhatsApp is not visible for this post.', 'WhatsApp hidden')"><span class="material-symbols-rounded">chat</span>WhatsApp</button>`;
    }

    html += `<button class="ig-action-btn message" type="button" onclick="startChat(event, '${safeId}', '${safeUser}')"><span class="material-symbols-rounded">forum</span>Message</button>`;
    return html;
  }

  function distanceField(item) {
    const km = Number(item?._distanceKm);
    if (!Number.isFinite(km)) return '';
    const value = `${km.toFixed(km < 10 ? 1 : 0)} km away`;
    return `<div class="ig-field full"><span class="ig-field-label">Distance</span><span class="ig-field-value">${esc(value)}</span></div>`;
  }

  function availableCard(room) {
    const images = imagesFrom(room);
    const owner = ownerData(room);
    const title = room?.title || room?.type || 'Room available';
    const location = room?.location || 'Location not added';
    const type = room?.type || room?.category || 'Room';
    const photoCount = images.length || 1;
    const slides = images.map(src => {
      const safe = esc(src);
      return `<div class="ig-slide-frame" style="--photo: url('${cssPhotoUrl(safe)}')"><img class="slide" loading="lazy" decoding="async" src="${safe}" alt="${esc(title)}"></div>`;
    }).join('');

    return `
      <div class="card ig-listing-card" onclick="openRoom('${esc(room?.id || '')}', 'available')">
        <div class="ig-image-box card-img-wrapper">
          <div class="slides-track">${slides}</div>
          <div class="ig-heart-btn"><span class="material-symbols-rounded">favorite</span></div>
          <div class="ig-count-badge">1/${photoCount}</div>
        </div>

        <div class="ig-details">
          <div class="ig-meta-row">
            <img class="ig-owner-avatar" src="${esc(owner.avatar)}" alt="owner">
            <div class="ig-owner-lines">
              <div class="ig-owner-name"><span class="material-symbols-rounded">account_circle</span><span>Uploaded by ${esc(owner.name)}</span></div>
              <div class="ig-location"><span class="material-symbols-rounded">location_on</span><span class="ig-location-text">${esc(location)}</span></div>
            </div>
            <div class="ig-time">${esc(timeAgo(room))}</div>
          </div>

          <div class="ig-title">${esc(title)}</div>

          <div class="ig-field-grid">
            <div class="ig-field"><span class="ig-field-label">Rent</span><span class="ig-field-value price">${esc(money(room?.rent || 0))}/mo</span></div>
            <div class="ig-field"><span class="ig-field-label">Deposit</span><span class="ig-field-value">${esc(money(room?.deposit || 0))}</span></div>
            <div class="ig-field"><span class="ig-field-label">Category</span><span class="ig-field-value">${esc(type)}</span></div>
            <div class="ig-field"><span class="ig-field-label">Brokerage</span><span class="ig-field-value">${esc(brokerage(room))}</span></div>
            ${distanceField(room)}
          </div>

          <div class="ig-actions">${actionButtons(room, 'available')}</div>
        </div>
      </div>
    `;
  }

  function requirementCard(req) {
    const owner = ownerData(req);
    const title = req?.title || 'Room requirement';
    const location = req?.location || 'Preferred location not added';
    const type = req?.type || req?.category || 'Any type';
    const budget = req?.budget || req?.rent || req?.expected_rent || 0;

    return `
      <div class="card ig-listing-card" onclick="openRoom('${esc(req?.id || '')}', 'requirement')">
        <div class="ig-requirement-image">
          <div class="ig-requirement-icon"><span class="material-symbols-rounded">person_search</span></div>
          <div class="ig-count-badge">NEEDED</div>
        </div>

        <div class="ig-details">
          <div class="ig-meta-row">
            <img class="ig-owner-avatar" src="${esc(owner.avatar)}" alt="owner">
            <div class="ig-owner-lines">
              <div class="ig-owner-name"><span class="material-symbols-rounded">account_circle</span><span>Uploaded by ${esc(owner.name)}</span></div>
              <div class="ig-location"><span class="material-symbols-rounded">location_on</span><span class="ig-location-text">${esc(location)}</span></div>
            </div>
            <div class="ig-time">${esc(timeAgo(req))}</div>
          </div>

          <div class="ig-title">${esc(title)}</div>

          <div class="ig-field-grid">
            <div class="ig-field"><span class="ig-field-label">Budget</span><span class="ig-field-value price">${esc(money(budget))}</span></div>
            <div class="ig-field"><span class="ig-field-label">Deposit</span><span class="ig-field-value">${esc(req?.deposit ? money(req.deposit) : 'Not added')}</span></div>
            <div class="ig-field"><span class="ig-field-label">Category</span><span class="ig-field-value">${esc(type)}</span></div>
            <div class="ig-field"><span class="ig-field-label">Status</span><span class="ig-field-value">${esc(req?.status || 'pending')}</span></div>
            ${distanceField(req)}
          </div>

          <div class="ig-actions">${actionButtons(req, 'requirement')}</div>
        </div>
      </div>
    `;
  }

  function addBrandTitle() {
    const header = document.querySelector('.header');
    const logo = header?.querySelector('.logo');
    if (!header || !logo || header.querySelector('.tingo-brand-title')) return;
    const brand = document.createElement('div');
    brand.className = 'tingo-brand-title';
    brand.innerHTML = 'TINGO<span>ROOMS</span>';
    logo.insertAdjacentElement('afterend', brand);
  }

  function addSafetyBanner() {
    const list = document.getElementById('roomList');
    if (!list || list.querySelector('.ig-safe-banner')) return;
    const banner = document.createElement('div');
    banner.className = 'ig-safe-banner';
    banner.innerHTML = `
      <div class="ig-safe-banner-icon"><span class="material-symbols-rounded">verified_user</span></div>
      <div>
        <div class="ig-safe-banner-title">Secure. Verified. Hassle-Free.</div>
        <div class="ig-safe-banner-sub">All listings are verified for your safety</div>
      </div>
    `;
    list.appendChild(banner);
  }

  const previousAvailable = (typeof renderAvailableCard === 'function') ? renderAvailableCard : null;
  const previousRequirement = (typeof renderRequirementCard === 'function') ? renderRequirementCard : null;
  const previousRenderRooms = (typeof renderRooms === 'function') ? renderRooms : null;

  const nextAvailableRenderer = function(room) {
    if (window.innerWidth >= 900 && previousAvailable) return previousAvailable(room);
    return availableCard(room);
  };

  const nextRequirementRenderer = function(req) {
    if (window.innerWidth >= 900 && previousRequirement) return previousRequirement(req);
    return requirementCard(req);
  };

  window.renderAvailableCard = nextAvailableRenderer;
  window.renderRequirementCard = nextRequirementRenderer;
  try { renderAvailableCard = nextAvailableRenderer; } catch (e) {}
  try { renderRequirementCard = nextRequirementRenderer; } catch (e) {}

  if (previousRenderRooms) {
    const nextRenderRooms = function(items, statusText = '') {
      previousRenderRooms(items, statusText);
      if (window.innerWidth < 900 && items && items.length) {
        addSafetyBanner();
      }
    };
    window.renderRooms = nextRenderRooms;
    try { renderRooms = nextRenderRooms; } catch (e) {}
  }

  window.updateModeSwitchCompact = function() {
    const wrap = document.getElementById('modeSwitchWrap');
    if (wrap) wrap.classList.remove('compact');
  };

  function prepareInstagramRenderer() {
    addBrandTitle();
    const wrap = document.getElementById('modeSwitchWrap');
    if (wrap) wrap.classList.remove('compact', 'switch-hidden');

    const list = document.getElementById('roomList');
    if (!list) return;

    let refreshTriggered = false;
    const refreshOnlyWhenNeeded = () => {
      const card = list.querySelector('.card');
      if (!card) return false;

      // Desktop intentionally keeps its original card renderer. Treat its first
      // card as ready instead of starting a redundant compatibility refresh.
      if (window.innerWidth >= 900) return true;

      if (!card.classList.contains('ig-listing-card') && !refreshTriggered && typeof loadRooms === 'function') {
        refreshTriggered = true;
        loadRooms(
          typeof getCurrentSearchText === 'function' ? getCurrentSearchText() : '',
          typeof selectedSearchPlace !== 'undefined' ? selectedSearchPlace : null
        );
      }
      return true;
    };

    if (refreshOnlyWhenNeeded()) return;

    const observer = new MutationObserver(() => {
      if (refreshOnlyWhenNeeded()) observer.disconnect();
    });
    observer.observe(list, { childList: true });
    setTimeout(() => observer.disconnect(), 3500);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', prepareInstagramRenderer, { once: true });
  } else {
    prepareInstagramRenderer();
  }

  window.addEventListener('resize', () => {
    clearTimeout(window.__tingoInstagramUiResizeTimer);
    window.__tingoInstagramUiResizeTimer = setTimeout(() => {
      addBrandTitle();
      document.getElementById('modeSwitchWrap')?.classList.remove('compact', 'switch-hidden');
    }, 180);
  }, { passive: true });
})();
</script>

<script>
/* =====================================================
   INDEX AUTH + REALTIME SESSION BRIDGE
   Public listings remain readable. Every private action first validates the
   Supabase Auth session and current account state through tingo-auth.
   ===================================================== */
(function () {
  'use strict';

  let activeAuthUserId = null;
  let privilegedStarted = false;

  function clearPrivateUi() {
    try {
      if (notificationChannel) db.removeChannel(notificationChannel);
    } catch (_) {}
    notificationChannel = null;
    notificationItems = [];
    notificationKnownIds = new Set();
    notificationsInitialised = false;
    updateNotificationBadge(0);
    closeNotifications();

    const navFrame = document.getElementById('bottomNavFrame');
    try {
      navFrame?.contentWindow?.postMessage({ type: 'TINGO_MSG_BADGE', count: 0 }, '*');
    } catch (_) {}
  }

  async function getVerifiedIndexUser(reason = 'index-protected-action') {
    if (window.TingoAuthGuard) {
      const result = await window.TingoAuthGuard.validate({ reason, force: true, silent: true });
      return result?.valid ? result.user : null;
    }

    // Conservative fallback while the shared guard is still loading.
    try {
      const { data } = await db.auth.getSession();
      if (!data?.session) return null;
      return getLoggedInUser();
    } catch (_) {
      return null;
    }
  }

  function sendToLogin(redirectBack) {
    const target = redirectBack || 'index.html';
    if (window.innerWidth >= 900 && typeof openPanel === 'function') {
      openPanel(`user.html?redirect=${encodeURIComponent(target)}`);
    } else {
      window.location.href = `user.html?redirect=${encodeURIComponent(target)}`;
    }
  }

  const legacyLoadNotifications = window.loadNotifications;
  const legacyCheckNewMessages = window.checkNewMessages;
  const legacyMarkAllNotificationsSeen = window.markAllNotificationsSeen;

  window.loadNotifications = async function secureLoadNotifications(options = {}) {
    const user = await getVerifiedIndexUser('load-notifications');
    if (!user) {
      clearPrivateUi();
      return;
    }
    return legacyLoadNotifications.call(this, options);
  };

  window.checkNewMessages = async function secureCheckNewMessages() {
    const user = await getVerifiedIndexUser('check-new-messages');
    if (!user) {
      const navFrame = document.getElementById('bottomNavFrame');
      try { navFrame?.contentWindow?.postMessage({ type: 'TINGO_MSG_BADGE', count: 0 }, '*'); } catch (_) {}
      return;
    }
    return legacyCheckNewMessages.call(this);
  };

  window.markAllNotificationsSeen = async function secureMarkAllNotificationsSeen() {
    const user = await getVerifiedIndexUser('mark-notifications-read');
    if (!user) return;
    return legacyMarkAllNotificationsSeen.call(this, user);
  };

  window.checkLogin = async function secureCheckLogin(page) {
    const user = await getVerifiedIndexUser(`open-${page}`);
    if (!user) {
      showAppPopup('Please login to continue.', 'Login required');
      sendToLogin(page);
      return;
    }

    if (window.innerWidth >= 900) openPanel(page);
    else window.location.href = page;
  };

  window.checkLoginForChat = async function secureCheckLoginForChat(roomId, ownerId) {
    const target = `chat.html?room=${encodeURIComponent(roomId)}&user=${encodeURIComponent(ownerId)}&source=index`;
    const user = await getVerifiedIndexUser('start-chat');
    if (!user) {
      localStorage.setItem('chat_redirect', JSON.stringify({ roomId, ownerId }));
      sendToLogin('chat');
      return;
    }

    if (window.innerWidth >= 900) openPanel(target);
    else window.location.href = target;
  };

  window.openChatList = async function secureOpenChatList() {
    const user = await getVerifiedIndexUser('open-chat-list');
    if (!user) {
      sendToLogin('chatlist');
      return;
    }

    if (window.innerWidth >= 900) openPanel('chat.html');
    else window.location.href = 'chat.html';
  };

  window.openNotifications = async function secureOpenNotifications() {
    ensureNotificationAudioContext();

    if (isNotificationPanelOpen()) {
      closeNotifications();
      return;
    }

    const user = await getVerifiedIndexUser('open-notifications');
    if (!user) {
      try {
        localStorage.setItem('tingo_open_notifications_after_login', '1');
        localStorage.setItem('tingo_post_login_redirect', 'index.html?openNotifications=1');
      } catch (_) {}
      sendToLogin('index.html?openNotifications=1');
      return;
    }

    showNotificationsPanel();
  };

  document.addEventListener('tingo:auth-state', (event) => {
    const detail = event.detail || {};

    if (!detail.valid || !detail.user?.id) {
      activeAuthUserId = null;
      privilegedStarted = false;
      clearPrivateUi();
      return;
    }

    const nextUserId = String(detail.user.id);
    const changedUser = activeAuthUserId !== nextUserId;
    activeAuthUserId = nextUserId;

    if (!privilegedStarted || changedUser) {
      privilegedStarted = true;
      subscribeNotifications();
      loadNotifications({ markSeen: false, announceNew: false });
      checkNewMessages();
      syncOneSignalId(detail.user);
      maybeOpenNotificationsAfterLogin(detail.user);
    }
  });
})();
</script>

<script id="tingo-home-filter-and-return-fix">
(function () {
  'use strict';

  const STATE_KEY = 'tingo_home_ui_state_v2';
  const OPTIONS_KEY = 'tingo_home_filter_options_v2';
  const BROKERAGE_APPLICABLE = '__brokerage_applicable__';
  const NO_BROKERAGE = '__no_brokerage__';

  function safeRead(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (_) {
      return fallback;
    }
  }

  function safeWrite(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (_) {}
  }

  function isNoBrokerageValue(value) {
    const normalized = String(value || '').trim().toLowerCase().replace(/[_-]+/g, ' ');
    return !normalized ||
      normalized === 'no brokerage' ||
      normalized === 'non brokerage' ||
      normalized === 'without brokerage' ||
      normalized.includes('no broker');
  }

  function saveHomeUiState() {
    const type = document.getElementById('filterType')?.value || '';
    const brokerage = activePostMode === 'available'
      ? (document.getElementById('filterBrokerage')?.value || '')
      : '';
    safeWrite(STATE_KEY, { mode: activePostMode, type, brokerage });
  }

  function stableSetOptions(select, html, selectedValue) {
    if (!select) return;
    if (select.innerHTML !== html) select.innerHTML = html;
    if (selectedValue && Array.from(select.options).some(option => option.value === selectedValue)) {
      select.value = selectedValue;
    } else if (!selectedValue) {
      select.value = '';
    }
  }

  function typeOptionsHtml(values, defaultLabel) {
    const unique = [...new Set((values || []).map(normalizeOptionText).filter(Boolean))]
      .sort((a, b) => a.localeCompare(b));
    const html = `<option value="">${escapeHtml(defaultLabel)}</option>` + unique
      .map(value => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`)
      .join('');
    return { unique, html };
  }

  function brokerageOptionsHtml() {
    return [
      '<option value="">All brokerage options</option>',
      `<option value="${BROKERAGE_APPLICABLE}">Brokerage applicable</option>`,
      `<option value="${NO_BROKERAGE}">No brokerage</option>`
    ].join('');
  }

  async function fetchAvailableFilterRows() {
    const active = await db.from('room_posts').select('type,brokerage_type,status').eq('status', 'active').limit(1000);
    if (!active.error) return active;
    return db.from('room_posts').select('type,brokerage_type,status').limit(1000);
  }

  async function fetchNeededFilterRows() {
    const withStatus = await db.from('room_requirements').select('type,status').limit(1000);
    if (!withStatus.error) return withStatus;
    return db.from('room_requirements').select('type').limit(1000);
  }

  function isVisibleFilterRow(row) {
    const status = String(row?.status || 'active').trim().toLowerCase();
    return !status || status === 'active' || (!status.includes('inactive') && !status.includes('disabled') && !status.includes('rejected'));
  }

  /* Use meaningful brokerage categories while keeping the existing database query path. */
  window.applyFiltersToQuery = function(query) {
    const filters = getActiveFilters();
    if (filters.type) query = query.ilike('type', `%${filters.type}%`);
    return query;
  };

  window.roomMatchesActiveFilters = function(room) {
    const filters = getActiveFilters();
    if (filters.type && !includesText(room?.type, filters.type)) return false;
    if (activePostMode !== 'available' || !filters.brokerage) return true;
    const noBrokerage = isNoBrokerageValue(room?.brokerage_type);
    if (filters.brokerage === NO_BROKERAGE) return noBrokerage;
    if (filters.brokerage === BROKERAGE_APPLICABLE) return !noBrokerage;
    return true;
  };

  const loadRowsBeforeStableBrokerageFilter = loadAllSearchRowsForMode;
  window.loadAllSearchRowsForMode = async function() {
    const rows = await loadRowsBeforeStableBrokerageFilter();
    return (Array.isArray(rows) ? rows : []).filter(roomMatchesActiveFilters);
  };

  window.loadFilterOptions = async function() {
    const typeSelect = document.getElementById('filterType');
    const brokerageSelect = document.getElementById('filterBrokerage');
    if (!typeSelect) return;

    const selectedType = typeSelect.value || window.__TINGO_HOME_PREPAINT_STATE?.type || '';
    const selectedBrokerage = brokerageSelect?.value || window.__TINGO_HOME_PREPAINT_STATE?.brokerage || '';
    const optionsCache = safeRead(OPTIONS_KEY, {}) || {};
    const cacheValues = Array.isArray(optionsCache[activePostMode]) ? optionsCache[activePostMode] : [];
    const defaultLabel = activePostMode === 'needed' ? 'All required room types' : 'All room types';

    if (cacheValues.length) {
      const cached = typeOptionsHtml(cacheValues, defaultLabel);
      stableSetOptions(typeSelect, cached.html, selectedType);
    }
    stableSetOptions(brokerageSelect, brokerageOptionsHtml(), activePostMode === 'available' ? selectedBrokerage : '');
    updateFilterUI();

    const requestedMode = activePostMode;
    let result;
    if (requestedMode === 'needed') {
      result = await fetchNeededFilterRows();
    } else {
      result = await fetchAvailableFilterRows();
    }

    if (result.error) {
      console.warn('Filter options could not be refreshed', result.error);
      updateFilterUI();
      return;
    }

    const rows = (result.data || []).filter(isVisibleFilterRow);
    const built = typeOptionsHtml(rows.map(row => row.type), defaultLabel);

    /* A tab may have changed while the request was in flight. Never paint stale options. */
    if (requestedMode !== activePostMode) return;

    stableSetOptions(typeSelect, built.html, selectedType);
    stableSetOptions(brokerageSelect, brokerageOptionsHtml(), activePostMode === 'available' ? selectedBrokerage : '');

    optionsCache[activePostMode] = built.unique;
    safeWrite(OPTIONS_KEY, optionsCache);
    updateFilterUI();
    saveHomeUiState();
  };

  /* Bind only once. The previous implementation attached both legacy and final listeners. */
  window.bindFilterEvents = function() {
    ['filterType', 'filterBrokerage'].forEach(id => {
      const element = document.getElementById(id);
      if (!element || element.dataset.stableFilterBound === '1') return;
      element.dataset.stableFilterBound = '1';
      element.addEventListener('change', () => {
        selectedSearchPlace = null;
        hideSuggestionBox();
        updateFilterUI();
        saveHomeUiState();
        loadRooms(getCurrentSearchText(), null);
      });
    });

    const clearBtn = document.getElementById('clearFilters');
    if (clearBtn && clearBtn.dataset.stableFilterBound !== '1') {
      clearBtn.dataset.stableFilterBound = '1';
      clearBtn.addEventListener('click', () => {
        const type = document.getElementById('filterType');
        const brokerage = document.getElementById('filterBrokerage');
        if (type) type.value = '';
        if (brokerage) brokerage.value = '';
        selectedSearchPlace = null;
        hideSuggestionBox();
        updateFilterUI();
        saveHomeUiState();
        loadRooms(getCurrentSearchText(), null);
      });
    }
  };

  window.setPostMode = function(mode) {
    const nextMode = mode === 'needed' ? 'needed' : 'available';
    if (nextMode === activePostMode) return Promise.resolve();

    activePostMode = nextMode;
    if (typeof tingoModeAwareLoadSeq !== 'undefined') tingoModeAwareLoadSeq += 1;
    if (typeof tingoLoadRoomsSeq !== 'undefined') tingoLoadRoomsSeq += 1;

    document.getElementById('modeAvailableBtn')?.classList.toggle('active', activePostMode === 'available');
    document.getElementById('modeNeededBtn')?.classList.toggle('active', activePostMode === 'needed');

    const state = safeRead(STATE_KEY, {}) || {};
    const typeFilter = document.getElementById('filterType');
    const brokerageFilter = document.getElementById('filterBrokerage');
    if (typeFilter) typeFilter.value = '';
    if (brokerageFilter) brokerageFilter.value = '';

    selectedSearchPlace = null;
    hideSuggestionBox();
    updateFilterUI();
    safeWrite(STATE_KEY, { ...state, mode: activePostMode, type: '', brokerage: '' });

    /* Keep mode-specific feed caches. loadRooms paints them immediately when present. */
    if (typeof tingoInitialFeedPainted !== 'undefined') tingoInitialFeedPainted = false;
    const roomList = document.getElementById('roomList');
    if (roomList) {
      roomList.removeAttribute('data-feed-signature');
      roomList.innerHTML = '';
    }

    const feedPromise = Promise.resolve(loadRooms(getCurrentSearchText(), null));
    const filterPromise = Promise.resolve(loadFilterOptions()).catch(error => {
      console.warn('Filter options could not be refreshed after tab change', error);
    });
    return Promise.allSettled([feedPromise, filterPromise]);
  };

  /* Ensure the restored state is applied before the single home boot starts. */
  const restored = window.__TINGO_HOME_PREPAINT_STATE || {};
  activePostMode = restored.mode === 'needed' ? 'needed' : 'available';
  document.getElementById('modeAvailableBtn')?.classList.toggle('active', activePostMode === 'available');
  document.getElementById('modeNeededBtn')?.classList.toggle('active', activePostMode === 'needed');
  updateFilterUI();

  window.addEventListener('pagehide', saveHomeUiState, { passive: true });
  window.addEventListener('pageshow', event => {
    document.querySelectorAll('.card.preparing-open').forEach(card => card.classList.remove('preparing-open'));
    if (event.persisted) {
      updateFilterUI();
      requestAnimationFrame(() => document.documentElement.classList.add('tingo-home-restored'));
    }
  }, { passive: true });
})();
</script>

<script>
/* =====================================================
   SINGLE-PAINT HOME BOOT
   Runs once, after every renderer/override in this file is installed.
   ===================================================== */
(function () {
  'use strict';

  function clearTransientNavigationState() {
    document.querySelectorAll('.card.preparing-open').forEach(card => {
      card.classList.remove('preparing-open');
    });
  }

  function bootHomeOnce() {
    if (window.__tingoHomeBooted) return;
    window.__tingoHomeBooted = true;
    clearTransientNavigationState();

    if (typeof initSmoothHomePage === 'function') {
      initSmoothHomePage();
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootHomeOnce, { once: true });
  } else {
    bootHomeOnce();
  }

  // A browser back/forward-cache restore must reuse the already painted page,
  // not replay click opacity or start a second feed request.
  window.addEventListener('pageshow', () => {
    clearTransientNavigationState();
    bootHomeOnce();
  }, { passive: true });
})();
</script>

<!-- FINAL MAP NAVIGATION SAFETY PATCH -->
<script>
(function () {
  'use strict';
  const originalCloseNotifications = window.closeNotifications;
  window.__TINGO_NAVIGATION_STARTED = false;

  window.tingoNavigateToMap = function () {
    try { originalCloseNotifications?.(); } catch (_) {}
    try {
      document.getElementById('notificationOverlay')?.classList.remove('open');
      document.getElementById('notificationPanel')?.classList.remove('open');
      document.body.classList.remove('notification-open');
      document.querySelector('.app-container')?.classList.remove('notification-open');
    } catch (_) {}
    if (typeof window.go === 'function') window.go('map.html');
  };
})();
</script>

<script>
(function () {
  const wrap = document.getElementById('modeSwitchWrap');
  const app = document.querySelector('.app-container');
  if (!wrap || !app) return;

  let lastScroll = app.scrollTop || 0;
  let ticking = false;

  function showModeSwitch() {
    wrap.classList.remove('tingo-mode-tabs-hidden', 'switch-hidden');
  }

  function hideModeSwitch() {
    wrap.classList.add('tingo-mode-tabs-hidden');
    wrap.classList.remove('switch-hidden');
  }

  function updateModeSwitchVisibility() {
    ticking = false;
    if (window.innerWidth >= 900) {
      showModeSwitch();
      lastScroll = app.scrollTop || 0;
      return;
    }

    const current = app.scrollTop || 0;
    const delta = current - lastScroll;

    /* Finger/swipe upward = page scrollTop increases: hide the switch. */
    if (current <= 12) {
      showModeSwitch();
    } else if (delta > 3) {
      hideModeSwitch();
    } else if (delta < -3) {
      /* Finger/swipe downward = page scrollTop decreases: show it again. */
      showModeSwitch();
    }

    lastScroll = current;
  }

  function requestUpdate() {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(updateModeSwitchVisibility);
  }

  app.addEventListener('scroll', requestUpdate, { passive: true });
  window.addEventListener('resize', () => {
    lastScroll = app.scrollTop || 0;
    showModeSwitch();
  }, { passive: true });

  showModeSwitch();
})();
</script>
